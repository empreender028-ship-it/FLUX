<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<title>Flux • IA Analytics</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:Inter,sans-serif;
 -webkit-tap-highlight-color:transparent;
}

:root{

 --bg:#020617;

 --card:rgba(15,23,42,.78);
 --card2:rgba(255,255,255,.05);

 --line:rgba(255,255,255,.08);

 --primary:#00d9ff;
 --blue:#2563ff;

 --green:#00ffa3;
 --yellow:#ffb800;
 --red:#ff5470;

 --text:#fff;
 --muted:#94a3b8;

 --shadow:0 24px 80px rgba(0,0,0,.38);

}

body.light{

 --bg:#f1f5f9;

 --card:rgba(255,255,255,.92);
 --card2:rgba(15,23,42,.045);

 --line:rgba(15,23,42,.12);

 --text:#0f172a;
 --muted:#475569;

 --shadow:0 18px 55px rgba(15,23,42,.12);

}

*::-webkit-scrollbar{
 width:0;
 height:0;
}

body{

 min-height:100vh;

 overflow-x:hidden;

 color:var(--text);

 padding:18px;
 padding-bottom:118px;

 background:
 radial-gradient(circle at top left,rgba(37,99,255,.38),transparent 30%),
 radial-gradient(circle at bottom right,rgba(0,217,255,.24),transparent 32%),
 linear-gradient(180deg,#020617,#000814,#000);

}

body.light{

 background:
 radial-gradient(circle at top left,rgba(37,99,255,.18),transparent 30%),
 radial-gradient(circle at bottom right,rgba(0,217,255,.12),transparent 32%),
 #f1f5f9;

}

.bg{

 position:fixed;
 inset:0;

 pointer-events:none;

 z-index:0;

}

.bg::before{

 content:"";

 position:absolute;
 inset:0;

 background-image:
 linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
 linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);

 background-size:44px 44px;

 mask-image:linear-gradient(to bottom,black,transparent 82%);

}

.glow{

 position:absolute;

 border-radius:50%;

 filter:blur(120px);

 opacity:.34;

}

.glow1{

 width:340px;
 height:340px;

 background:#2563ff;

 top:-120px;
 left:-120px;

}

.glow2{

 width:260px;
 height:260px;

 background:#00d9ff;

 right:-80px;
 bottom:-80px;

}

.app{

 position:relative;
 z-index:2;

 max-width:1450px;

 margin:auto;

}

.top{

 display:flex;
 justify-content:space-between;
 align-items:center;

 gap:14px;

 flex-wrap:wrap;

 margin-bottom:26px;

}

.brand{

 display:flex;
 align-items:center;

 gap:14px;

}

.logo{

 width:26px;
 height:26px;

 border:3px solid var(--primary);

 transform:rotate(45deg);

 border-radius:6px;

 box-shadow:
 0 0 24px rgba(0,217,255,.9),
 inset 0 0 12px rgba(0,217,255,.4);

}

.brand h1{

 font-size:23px;

 font-weight:950;

 letter-spacing:4px;

}

.brand span{

 display:block;

 font-size:12px;

 color:var(--muted);

 margin-top:2px;

}

.actions{

 display:flex;

 gap:10px;

 flex-wrap:wrap;

}

.btn{

 height:48px;

 padding:0 18px;

 border:none;

 border-radius:16px;

 cursor:pointer;

 color:var(--text);

 font-weight:850;

 background:var(--card2);

 border:1px solid var(--line);

 transition:.22s;

}

.btn:hover{

 transform:translateY(-2px);

}

.btn.primary{

 background:linear-gradient(90deg,var(--blue),var(--primary));

 border:none;

 color:white;

 box-shadow:0 16px 45px rgba(0,217,255,.22);

}

.hero{

 display:flex;
 justify-content:space-between;
 align-items:flex-end;

 gap:20px;

 flex-wrap:wrap;

 margin-bottom:22px;

}

.title{

 font-size:44px;

 line-height:.96;

 font-weight:950;

 letter-spacing:-2px;

}

.title b{

 background:linear-gradient(90deg,#fff,var(--primary));

 -webkit-background-clip:text;

 color:transparent;

}

body.light .title b{

 background:linear-gradient(90deg,#0f172a,#2563ff);

 -webkit-background-clip:text;

 color:transparent;

}

.subtitle{

 margin-top:12px;

 max-width:760px;

 color:var(--muted);

 line-height:1.7;

 font-size:14px;

}

.live{

 display:flex;
 align-items:center;

 gap:8px;

 padding:12px 14px;

 border-radius:999px;

 background:rgba(0,255,163,.08);

 border:1px solid rgba(0,255,163,.18);

 color:#b8ffe3;

 font-size:12px;

 font-weight:900;

}

.dot{

 width:8px;
 height:8px;

 border-radius:50%;

 background:var(--green);

 box-shadow:0 0 20px var(--green);

}

.grid{

 display:grid;

 grid-template-columns:repeat(4,1fr);

 gap:14px;

 margin-bottom:18px;

}

.card{

 background:var(--card);

 border:1px solid var(--line);

 border-radius:28px;

 padding:22px;

 backdrop-filter:blur(24px);

 box-shadow:var(--shadow);

 position:relative;

 overflow:hidden;

}

.card::after{

 content:"";

 position:absolute;

 right:-35px;
 top:-35px;

 width:90px;
 height:90px;

 border-radius:50%;

 background:rgba(0,217,255,.10);

}

.value{

 font-size:35px;

 font-weight:950;

}

.label{

 margin-top:7px;

 color:var(--muted);

 font-size:13px;

 font-weight:700;

}

.change{

 margin-top:12px;

 color:var(--green);

 font-size:12px;

 font-weight:850;

}

.main{

 display:grid;

 grid-template-columns:1.3fr .7fr;

 gap:18px;

}

.panel{

 background:var(--card);

 border:1px solid var(--line);

 border-radius:30px;

 padding:22px;

 backdrop-filter:blur(24px);

 box-shadow:var(--shadow);

}

.panel h2{

 font-size:18px;

 font-weight:950;

 margin-bottom:14px;

}

.chart-box{

 height:360px;

}

.insight{

 padding:18px;

 border-radius:22px;

 background:rgba(0,217,255,.06);

 border:1px solid rgba(0,217,255,.15);

 margin-bottom:12px;

}

.insight b{

 display:block;

 margin-bottom:7px;

 font-size:14px;

}

.insight p{

 color:#dbeafe;

 line-height:1.6;

 font-size:13px;

}

.table-panel{

 margin-top:18px;

 background:var(--card);

 border:1px solid var(--line);

 border-radius:30px;

 overflow:hidden;

 backdrop-filter:blur(24px);

 box-shadow:var(--shadow);

}

.table-head{

 padding:20px;

 display:flex;
 justify-content:space-between;
 align-items:center;

 gap:12px;

 flex-wrap:wrap;

 border-bottom:1px solid var(--line);

}

.table-head h2{

 font-size:18px;

 font-weight:950;

}

.table{

 overflow:auto;

}

table{

 width:100%;

 min-width:900px;

 border-collapse:collapse;

}

th,
td{

 padding:16px;

 text-align:left;

 font-size:13px;

 border-bottom:1px solid rgba(255,255,255,.05);

}

th{

 color:var(--muted);

 background:rgba(255,255,255,.025);

 text-transform:uppercase;

 font-size:12px;

}

.company{

 display:flex;
 align-items:center;

 gap:12px;

}

.avatar{

 width:46px;
 height:46px;

 border-radius:15px;

 background:linear-gradient(135deg,var(--blue),var(--primary));

 display:grid;
 place-items:center;

 font-weight:950;

 color:white;

 border:1px solid var(--line);

}

.company b{

 display:block;

}

.company small{

 color:var(--muted);

}

.tag{

 display:inline-flex;

 padding:7px 10px;

 border-radius:999px;

 font-size:11px;

 font-weight:900;

 background:rgba(0,217,255,.12);

 color:#c8f7ff;

}

.status{

 color:var(--green);

 font-weight:900;

}

.toast{

 position:fixed;

 left:50%;
 bottom:96px;

 transform:translateX(-50%) translateY(20px);

 padding:14px 18px;

 border-radius:999px;

 background:rgba(2,6,23,.96);

 border:1px solid rgba(0,217,255,.22);

 color:white;

 opacity:0;

 transition:.25s;

 z-index:999;

 font-size:13px;

 font-weight:850;

}

.toast.show{

 opacity:1;

 transform:translateX(-50%) translateY(0);

}

.bottom-nav{

 position:fixed;

 left:50%;
 bottom:14px;

 transform:translateX(-50%);

 width:calc(100% - 28px);

 max-width:780px;

 display:flex;

 justify-content:space-around;

 gap:8px;

 padding:10px;

 border-radius:24px;

 background:rgba(2,6,23,.9);

 backdrop-filter:blur(24px);

 border:1px solid rgba(255,255,255,.08);

 z-index:99;

}

.bottom-nav button{

 flex:1;

 border:none;

 background:transparent;

 color:#94a3b8;

 padding:10px;

 border-radius:16px;

 font-size:12px;

 font-weight:900;

 cursor:pointer;

}

.bottom-nav button.active{

 background:linear-gradient(90deg,var(--blue),var(--primary));

 color:white;

}

@media(max-width:1000px){

 .grid{
  grid-template-columns:repeat(2,1fr);
 }

 .main{
  grid-template-columns:1fr;
 }

}

@media(max-width:650px){

 body{
  padding:12px;
 }

 .title{
  font-size:33px;
 }

 .grid{
  grid-template-columns:1fr;
 }

 .actions{
  width:100%;
 }

 .btn{
  flex:1;
 }

 .chart-box{
  height:280px;
 }

 .brand h1{
  font-size:19px;
 }

}

</style>
</head>

<body>

<div class="bg">

 <div class="glow glow1"></div>
 <div class="glow glow2"></div>

</div>

<div class="app">

<header class="top">

 <div class="brand">

  <div class="logo"></div>

  <div>

   <h1>FLUX IA</h1>

   <span>
    Inteligência da plataforma em tempo real
   </span>

  </div>

 </div>

 <div class="actions">

  <button class="btn" onclick="toggleTheme()">
   Tema
  </button>

  <button class="btn" onclick="go('/feed')">
   Feed
  </button>

  <button class="btn" onclick="go('/fluxo')">
   Fluxo
  </button>

  <button class="btn primary" onclick="go('/painel')">
   Painel
  </button>

 </div>

</header>

<section class="hero">

 <div>

  <div class="title">
   Inteligência <b>em tempo real</b>
  </div>

  <div class="subtitle">

   Visualizações, seguidores, receita,
   conversão, retenção e desempenho
   do Feed, Fluxo e Marketplace
   em um único painel premium.

  </div>

 </div>

 <div class="live">

  <div class="dot"></div>

  <span id="apiStatus">
   Conectando API...
  </span>

 </div>

</section>

<section class="grid">

 <div class="card">

  <div class="value" id="views">0</div>

  <div class="label">
   Visualizações
  </div>

  <div class="change" id="viewsChange">
   +0%
  </div>

 </div>

 <div class="card">

  <div class="value" id="seguidores">0</div>

  <div class="label">
   Seguidores
  </div>

  <div class="change" id="seguidoresChange">
   +0%
  </div>

 </div>

 <div class="card">

  <div class="value" id="posts">0</div>

  <div class="label">
   Posts publicados
  </div>

  <div class="change" id="postsChange">
   +0%
  </div>

 </div>

 <div class="card">

  <div class="value" id="receita">R$0</div>

  <div class="label">
   Receita
  </div>

  <div class="change" id="receitaChange">
   +0%
  </div>

 </div>

</section>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,
initial-scale=1.0,
viewport-fit=cover,
user-scalable=no">

<title>FLUX • Posts</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
 --bg:#050816;
 --card:rgba(255,255,255,.065);
 --stroke:rgba(255,255,255,.09);
 --text:#fff;
 --muted:#9aa4b2;
 --primary:#00d9ff;
 --blue:#2563ff;
 --green:#18f2a3;
 --red:#ff4d6d;
 --shadow:0 28px 80px rgba(0,0,0,.42);
}

body.light{
 --bg:#f5f7fb;
 --card:#fff;
 --stroke:rgba(0,0,0,.08);
 --text:#0f172a;
 --muted:#475569;
 --shadow:0 22px 60px rgba(15,23,42,.12);
}

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 -webkit-tap-highlight-color:transparent;
 font-family:Inter,sans-serif;
}

html,
body{
 width:100%;
 min-height:100%;
 overflow-x:hidden;
}

body{
 background:
 radial-gradient(circle at top left,
 rgba(37,99,255,.30),
 transparent 30%),

 radial-gradient(circle at top right,
 rgba(0,217,255,.18),
 transparent 30%),

 linear-gradient(
 180deg,
 #00194d 0%,
 var(--bg) 48%,
 #000 100%
 );

 color:var(--text);
 transition:.25s;
}

body.light{
 background:
 radial-gradient(circle at top left,
 rgba(37,99,255,.14),
 transparent 30%),

 radial-gradient(circle at top right,
 rgba(0,217,255,.10),
 transparent 30%),

 linear-gradient(
 180deg,
 #f7faff,
 #eef4ff,
 #fff
 );
}

a{
 color:inherit;
 text-decoration:none;
}

button,
input,
select{
 font-family:inherit;
}

button{
 cursor:pointer;
 touch-action:manipulation;
}

.app{
 width:100%;
 max-width:980px;
 margin:auto;
 padding:16px 14px 110px;
}

/* TOP */

.top{
 position:sticky;
 top:0;
 z-index:40;

 display:flex;
 justify-content:space-between;
 align-items:center;

 gap:12px;

 margin:0 -14px 18px;

 padding:14px;

 background:rgba(3,7,18,.76);

 backdrop-filter:blur(30px);

 border-bottom:
 1px solid rgba(255,255,255,.06);
}

body.light .top{
 background:rgba(255,255,255,.86);
}

.brand{
 display:flex;
 align-items:center;
 gap:11px;
}

.logo-box{
 width:44px;
 height:44px;

 border-radius:17px;

 background:rgba(255,255,255,.06);

 border:1px solid var(--stroke);

 display:flex;
 align-items:center;
 justify-content:center;

 box-shadow:
 0 0 34px rgba(0,217,255,.18);
}

.logo-core{
 width:16px;
 height:16px;

 border:3px solid var(--primary);

 transform:rotate(45deg);

 border-radius:4px;

 box-shadow:
 0 0 20px rgba(0,217,255,.7);
}

.logo{
 font-size:22px;
 font-weight:900;
 letter-spacing:3px;

 background:
 linear-gradient(
 90deg,
 #fff,
 #00d9ff,
 #2563ff
 );

 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

body.light .logo{
 background:
 linear-gradient(
 90deg,
 #0f172a,
 #2563ff,
 #00a6ff
 );

 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.top-actions{
 display:flex;
 gap:8px;
}

.btn{
 height:44px;
 padding:0 14px;

 border-radius:16px;

 border:1px solid var(--stroke);

 background:var(--card);

 color:var(--text);

 font-weight:900;
 font-size:12px;
}

.primary{
 border:none;

 background:
 linear-gradient(
 90deg,
 var(--blue),
 var(--primary)
 );

 color:#fff;

 box-shadow:
 0 18px 46px rgba(0,217,255,.20);
}

/* HERO */

.hero{
 border-radius:34px;

 padding:24px;

 margin-bottom:14px;

 background:
 linear-gradient(
 135deg,
 rgba(37,99,255,.30),
 rgba(0,217,255,.10)
 ),

 rgba(255,255,255,.035);

 border:1px solid var(--stroke);

 backdrop-filter:blur(24px);

 box-shadow:var(--shadow);
}

.title{
 font-size:34px;
 font-weight:900;

 line-height:1;

 margin-bottom:10px;

 letter-spacing:-1px;
}

.sub{
 color:#dbeafe;

 font-size:13px;

 line-height:1.6;

 max-width:560px;
}

/* STATS */

.stats{
 display:grid;

 grid-template-columns:
 repeat(4,1fr);

 gap:10px;

 margin:14px 0 18px;
}

.stat{
 border-radius:24px;

 padding:15px;

 background:var(--card);

 border:1px solid var(--stroke);

 backdrop-filter:blur(22px);
}

.stat small{
 display:block;

 font-size:10px;

 font-weight:900;

 color:var(--muted);

 text-transform:uppercase;

 letter-spacing:.08em;
}

.stat strong{
 display:block;

 margin-top:7px;

 font-size:21px;

 font-weight:900;
}

/* FILTER */

.filter{
 display:grid;

 grid-template-columns:
 1fr 130px;

 gap:10px;

 margin:0 0 16px;
}

input,
select{
 height:56px;

 border-radius:20px;

 border:1px solid var(--stroke);

 background:var(--card);

 color:var(--text);

 outline:none;

 padding:0 14px;

 font-size:13px;

 font-weight:800;
}

input::placeholder{
 color:var(--muted);
}

/* POSTS */

.list{
 display:flex;
 flex-direction:column;
 gap:12px;
}

.post{
 background:var(--card);

 border:1px solid var(--stroke);

 border-radius:27px;

 padding:12px;

 display:grid;

 grid-template-columns:
 108px 1fr;

 gap:14px;

 align-items:center;

 transition:.18s ease;

 backdrop-filter:blur(22px);

 box-shadow:
 0 20px 60px rgba(0,0,0,.24);

 animation:enter .35s ease both;
}

.post:hover{
 transform:translateY(-2px);

 border-color:
 rgba(0,217,255,.24);
}

.media{
 width:108px;
 height:108px;

 border-radius:22px;

 object-fit:cover;

 background:
 radial-gradient(circle at top,
 rgba(255,255,255,.14),
 transparent 32%),

 linear-gradient(
 135deg,
 #2563ff,
 #00d9ff
 );

 display:flex;
 align-items:center;
 justify-content:center;

 overflow:hidden;

 color:white;

 font-size:24px;
 font-weight:900;

 flex-shrink:0;
}

.media img,
.media video{
 width:100%;
 height:100%;
 object-fit:cover;
 display:block;
}

.content{
 min-width:0;
}

.text{
 font-weight:900;

 font-size:15px;

 line-height:1.4;

 display:-webkit-box;

 -webkit-line-clamp:2;

 -webkit-box-orient:vertical;

 overflow:hidden;

 margin-bottom:6px;
}

.meta{
 font-size:12px;

 color:var(--muted);

 margin-bottom:10px;

 font-weight:800;
}

.actions{
 display:flex;
 gap:8px;
 flex-wrap:wrap;
}

.actions button,
.actions a{
 height:38px;

 padding:0 12px;

 border:none;

 border-radius:14px;

 cursor:pointer;

 font-size:12px;

 font-weight:900;

 display:flex;
 align-items:center;
 justify-content:center;
}

.view{
 background:rgba(59,130,246,.18);
 color:#60a5fa;
}

.delete{
 background:rgba(255,77,109,.14);
 color:var(--red);
}

.boost{
 background:rgba(0,217,255,.14);
 color:var(--primary);
}

.copy{
 background:rgba(255,255,255,.08);
 color:var(--text);
 border:1px solid var(--stroke)!important;
}

.badge{
 display:inline-flex;

 height:28px;

 padding:0 10px;

 border-radius:999px;

 align-items:center;
 justify-content:center;

 margin-bottom:8px;

 font-size:10px;
 font-weight:900;

 background:rgba(0,217,255,.12);

 color:var(--primary);
}

.badge.feed{
 color:#93c5fd;
 background:rgba(37,99,255,.16);
}

.badge.fluxo{
 color:var(--green);
 background:rgba(24,242,163,.12);
}

.empty{
 padding:28px;

 border-radius:28px;

 background:var(--card);

 border:1px solid var(--stroke);

 color:var(--muted);

 text-align:center;

 font-size:13px;

 line-height:1.6;
}

/* TOAST */

.toast{
 position:fixed;

 left:50%;
 bottom:102px;

 transform:
 translateX(-50%)
 translateY(18px);

 z-index:200;

 max-width:92%;

 padding:13px 16px;

 border-radius:18px;

 background:rgba(0,0,0,.76);

 border:
 1px solid rgba(255,255,255,.14);

 backdrop-filter:blur(22px);

 color:#fff;

 font-size:12px;
 font-weight:900;

 opacity:0;

 pointer-events:none;

 transition:.22s ease;
}

.toast.show{
 opacity:1;

 transform:
 translateX(-50%)
 translateY(0);
}

/* BOTTOM */

.bottom{
 position:fixed;

 left:0;
 bottom:0;

 width:100%;

 z-index:100;

 background:rgba(0,0,0,.78);

 backdrop-filter:blur(32px);

 border-top:
 1px solid rgba(255,255,255,.07);

 padding:
 8px
 8px
 calc(8px + env(safe-area-inset-bottom));
}

body.light .bottom{
 background:rgba(255,255,255,.86);
}

.bottom-wrap{
 max-width:760px;

 margin:auto;

 display:grid;

 grid-template-columns:
 repeat(5,1fr);

 gap:8px;
}

.nav{
 height:62px;

 border-radius:22px;

 background:var(--card);

 border:1px solid var(--stroke);

 display:flex;
 flex-direction:column;
 align-items:center;
 justify-content:center;

 gap:5px;

 color:var(--muted);

 font-size:10px;
 font-weight:900;
}

.nav.active{
 background:
 linear-gradient(
 180deg,
 #2563ff,
 #00d9ff
 );

 color:white;

 border:none;
}

.icon{
 width:18px;
 height:18px;

 border-radius:7px;

 border:2px solid currentColor;
}

@keyframes enter{

 from{
  opacity:0;
  transform:translateY(8px)
 }

 to{
  opacity:1;
  transform:translateY(0)
 }

}

@media(max-width:720px){

 .stats{
  grid-template-columns:repeat(2,1fr)
 }

 .filter{
  grid-template-columns:1fr
 }

 .post{
  grid-template-columns:96px 1fr
 }

 .media{
  width:96px;
  height:96px
 }

}

@media(max-width:520px){

 .post{
  grid-template-columns:1fr;
 }

 .media{
  width:100%;
  height:190px;
 }

 .title{
  font-size:29px
 }

 .logo{
  font-size:19px
 }

 .btn{
  padding:0 11px
 }

 .top-actions .btn:first-child{
  display:none
 }

}

@media(max-width:370px){

 .stats{
  grid-template-columns:1fr
 }

}

</style>

</head>

<body>

<div class="app">

<header class="top">

 <a class="brand" href="/feed">

  <div class="logo-box">
   <div class="logo-core"></div>
  </div>

  <div class="logo">
   FLUX POSTS
  </div>

 </a>

 <div class="top-actions">

  <button
  class="btn"
  onclick="toggleTheme()">

   Tema

  </button>

  <button
  class="btn primary"
  onclick="location.href='/painel'">

   Novo Post

  </button>

 </div>

</header>

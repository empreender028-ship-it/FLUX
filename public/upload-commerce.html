
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Flux Upload Commerce</title>
<style>
body{margin:0;background:#050505;color:white;font-family:Arial;padding:24px}
.box{max-width:520px;margin:auto;background:#101010;border:1px solid #222;border-radius:24px;padding:22px}
input,textarea,button{width:100%;box-sizing:border-box;margin:8px 0;padding:14px;border-radius:14px;border:1px solid #333;background:#050505;color:white}
button{background:#00d9ff;color:#001018;font-weight:900;cursor:pointer}
.preview{display:flex;gap:8px;overflow:auto;margin:12px 0}
.preview img,.preview video{width:90px;height:90px;object-fit:cover;border-radius:14px}

.drop{
  border:2px dashed rgba(0,217,255,.35);
  border-radius:22px;
  padding:22px;
  text-align:center;
  margin:12px 0;
  background:rgba(0,217,255,.06);
  cursor:pointer;
  font-weight:900;
}
.drop.drag{
  background:rgba(0,217,255,.14);
}
.preview{
  display:grid!important;
  grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
}
.preview img,.preview video{
  width:100%!important;
  height:160px!important;
  object-fit:cover;
  border-radius:18px;
  background:#000;
}
.preview-item{
  position:relative;
}
.preview-item span{
  position:absolute;
  top:6px;
  left:6px;
  background:#00d9ff;
  color:#001018;
  border-radius:999px;
  padding:4px 8px;
  font-size:11px;
  font-weight:900;
}
.progress{
  height:10px;
  background:#111;
  border-radius:999px;
  overflow:hidden;
  margin:12px 0;
}
.progress div{
  height:100%;
  width:0%;
  background:#00d9ff;
  transition:.2s;
}
</style>
</head>
<body>
<div class="box">
<h1>Subir Produto + Reel</h1>

<input id="nome" placeholder="Nome do produto">
<textarea id="descricao" placeholder="Descrição"></textarea>
<textarea id="hashtags" placeholder="Hashtags automáticas"></textarea>
<textarea id="postDescricao" placeholder="Legenda do post/reel"></textarea>
<input id="preco" placeholder="Preço" type="number" step="0.01">
<input id="estoque" placeholder="Estoque" type="number">
<input id="link" placeholder="Link externo opcional">
<div class="drop" id="drop">
  Arraste fotos/vídeos aqui ou clique para selecionar
</div>
<input id="medias" type="file" multiple accept="image/*,video/*" style="display:none">
<div class="preview" id="preview"></div>
<div class="progress"><div id="bar"></div></div>

<button onclick="gerarIA()" type="button">Gerar descrição com IA</button>
<button onclick="enviar()">Publicar na Flux</button>
<p id="status"></p>
</div>

<script>
const medias = document.getElementById("medias");
const preview = document.getElementById("preview");
const drop = document.getElementById("drop");
const bar = document.getElementById("bar");

drop.onclick = () => medias.click();

drop.ondragover = e => {
 e.preventDefault();
 drop.classList.add("drag");
};

drop.ondragleave = () => drop.classList.remove("drag");

drop.ondrop = e => {
 e.preventDefault();
 drop.classList.remove("drag");
 medias.files = e.dataTransfer.files;
 medias.onchange();
};

medias.onchange = () => {
 preview.innerHTML = "";
 [...medias.files].forEach((file,i)=>{
  const url = URL.createObjectURL(file);
  const wrap = document.createElement("div");
  wrap.className = "preview-item";

  const badge = document.createElement("span");
  badge.textContent = i === 0 ? "CAPA" : (file.type.startsWith("video") ? "VÍDEO" : "FOTO");

  const el = file.type.startsWith("video") ? document.createElement("video") : document.createElement("img");
  el.src = url;

  if(el.tagName==="VIDEO"){
   el.controls = true;
   el.muted = true;
   el.playsInline = true;
  }

  wrap.appendChild(el);
  wrap.appendChild(badge);
  preview.appendChild(wrap);
 });
};

function gerarIA(){
 const n = document.getElementById("nome").value || "produto incrível";
 const precoV = document.getElementById("preco").value;

 const texto =
`${n} é uma escolha perfeita para quem busca estilo, praticidade e desejo de compra imediato. Produto selecionado para a vitrine Flux com visual atrativo, descrição clara e chamada forte para conversão.

✨ Destaques:
• Produto com alto potencial de interesse
• Ideal para descoberta no feed
• Perfeito para compra rápida
• Oferta apresentada em formato social commerce

#Flux #Achadinhos #ProdutoDoDia #Oferta #Marketplace #SocialCommerce`;

 document.getElementById("descricao").value = texto;
document.getElementById("hashtags").value = "#Flux #Achadinhos #ProdutoDoDia #Oferta #Marketplace #SocialCommerce #Promoção #ComprarOnline";
document.getElementById("postDescricao").value = "Achei esse produto na Flux e ele merece aparecer no seu feed 👀✨";
 document.getElementById("status").textContent = "Descrição gerada automaticamente.";
}


async function compressImageFile(file, quality = 0.72, maxWidth = 1280){
 return new Promise(resolve=>{
  if(!file.type.startsWith("image/")) return resolve(file);

  const img = new Image();
  const url = URL.createObjectURL(file);

  img.onload = ()=>{
   const scale = Math.min(1, maxWidth / img.width);
   const canvas = document.createElement("canvas");
   canvas.width = Math.round(img.width * scale);
   canvas.height = Math.round(img.height * scale);

   const ctx = canvas.getContext("2d");
   ctx.drawImage(img,0,0,canvas.width,canvas.height);

   canvas.toBlob(blob=>{
    if(!blob) return resolve(file);
    const compressed = new File(
     [blob],
     file.name.replace(/\.[^.]+$/,"") + ".jpg",
     {type:"image/jpeg"}
    );
    resolve(compressed);
   },"image/jpeg",quality);
  };

  img.onerror = ()=>resolve(file);
  img.src = url;
 });
}

async function enviar(){
 const token = localStorage.getItem("token") || localStorage.getItem("flux_token") || "";
 const fd = new FormData();

 fd.append("nome", nome.value);
 fd.append("descricao", descricao.value);
 fd.append("preco", preco.value);
 fd.append("estoque", estoque.value || 1);
 fd.append("link", link.value);
 fd.append("postDescricao", postDescricao.value || descricao.value);
fd.append("hashtags", hashtags.value);

 for(const f of [...medias.files]){
  const finalFile = await compressImageFile(f);
  fd.append("medias", finalFile);
}

 status.textContent = "Otimizando mídia e enviando...";
 bar.style.width = "35%";

 const res = await fetch("/api/commerce/postar-produto", {
  method:"POST",
  headers: token ? { Authorization:"Bearer " + token } : {},
  body: fd
 });

 bar.style.width = "75%";
 const data = await res.json();
 bar.style.width = "100%";
 console.log(data);

 status.textContent = data.ok ? "Publicado com sucesso!" : "Erro: " + (data.erro || "falha");
}
</script>
</body>
</html>

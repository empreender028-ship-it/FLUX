<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<title>Assinatura • Flux</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 -webkit-tap-highlight-color:transparent;
}

:root{
 --bg:#020617;
 --card:rgba(15,23,42,.72);
 --line:rgba(255,255,255,.08);
 --primary:#00d9ff;
 --secondary:#2563ff;
 --text:#ffffff;
 --muted:#94a3b8;
 --success:#00ffa3;
}

html,body{
 width:100%;
 min-height:100%;
 overflow-x:hidden;
 font-family:'Inter',sans-serif;
 background: radial-gradient(circle at top,#00194d 0%,#000814 45%,#000 100%);
 color:var(--text);
}

body{ padding:22px; }

/* ================= BG ================= */

.bg{
 position:fixed;
 inset:0;
 z-index:0;
 overflow:hidden;
}

.glow{
 position:absolute;
 border-radius:50%;
 filter:blur(140px);
 opacity:.40;
 transform:scale(1);
 animation: float 8s ease-in-out infinite;
}

@keyframes float{
 0%,100%{ transform:translateY(0px); }
 50%{ transform:translateY(25px); }
}

.glow1{
 width:380px;
 height:380px;
 background:#2563ff;
 top:-140px;
 left:-140px;
}

.glow2{
 width:300px;
 height:300px;
 background:#00d9ff;
 right:-120px;
 bottom:-120px;
}

/* ================= APP ================= */

.app{
 position:relative;
 z-index:5;
 max-width:1200px;
 margin:auto;
}

/* ================= TOP ================= */

.top{
 display:flex;
 justify-content:space-between;
 align-items:center;
 flex-wrap:wrap;
 gap:12px;
 margin-bottom:34px;
}

.brand{
 display:flex;
 align-items:center;
 gap:14px;
}

.logo{
 width:22px;
 height:22px;
 border:3px solid var(--primary);
 transform:rotate(45deg);
 border-radius:6px;
 box-shadow:0 0 25px rgba(0,217,255,.9);
}

.brand span{
 font-size:28px;
 font-weight:900;
 letter-spacing:5px;
 background:linear-gradient(90deg,#fff,#00d9ff,#2563ff);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.top-actions{
 display:flex;
 gap:10px;
 flex-wrap:wrap;
}

.top-btn{
 height:48px;
 padding:0 18px;
 border-radius:14px;
 border:1px solid rgba(255,255,255,.08);
 background:rgba(255,255,255,.04);
 color:#fff;
 font-weight:700;
 font-size:14px;
 cursor:pointer;
 transition:.25s;
}

.top-btn:hover{
 transform:translateY(-2px);
 border-color:rgba(0,217,255,.4);
}

.primary-btn{
 background:linear-gradient(90deg,#2563ff,#00d9ff);
 border:none;
 box-shadow:0 18px 50px rgba(0,217,255,.25);
}

/* ================= HEADER ================= */

.title{
 font-size:42px;
 font-weight:900;
}

.subtitle{
 margin-top:10px;
 color:var(--muted);
 font-size:15px;
 max-width:700px;
 line-height:1.8;
}

/* ================= CURRENT ================= */

.current{
 margin-top:26px;
 margin-bottom:26px;
 padding:30px;
 border-radius:34px;
 background:var(--card);
 border:1px solid rgba(255,255,255,.08);
 backdrop-filter:blur(26px);
 box-shadow:0 25px 70px rgba(0,0,0,.55);
 transition:.3s;
}

.current:hover{
 transform:translateY(-2px);
 border-color:rgba(0,217,255,.18);
}

.plan-badge{
 display:inline-flex;
 padding:10px 18px;
 border-radius:999px;
 background:rgba(0,217,255,.12);
 border:1px solid rgba(0,217,255,.25);
 color:#9ff7ff;
 font-weight:800;
 font-size:12px;
 letter-spacing:1px;
}

.current-price{
 margin-top:16px;
 font-size:46px;
 font-weight:900;
}

.current-price span{
 font-size:15px;
 color:var(--muted);
}

.status{
 margin-top:10px;
 color:var(--success);
 font-weight:700;
}

/* ================= PLANS ================= */

.plans{
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:18px;
}

.plan-card{
 background:var(--card);
 border:1px solid rgba(255,255,255,.06);
 border-radius:34px;
 padding:28px;
 backdrop-filter:blur(26px);
 transition:.25s;
 box-shadow:0 25px 70px rgba(0,0,0,.45);
 position:relative;
 overflow:hidden;
}

.plan-card:hover{
 transform:translateY(-6px) scale(1.01);
 border-color:rgba(0,217,255,.25);
}

.popular{
 border:1px solid rgba(0,217,255,.3);
}

.popular::before{
 content:"";
 position:absolute;
 inset:-2px;
 background:linear-gradient(45deg,#00d9ff,transparent,#2563ff);
 opacity:.08;
}

.popular-tag{
 position:absolute;
 top:18px;
 right:18px;
 padding:8px 12px;
 border-radius:999px;
 background:rgba(0,217,255,.14);
 border:1px solid rgba(0,217,255,.25);
 font-size:11px;
 font-weight:900;
 color:#9ff7ff;
}

.plan-name{
 font-size:26px;
 font-weight:900;
}

.plan-desc{
 margin-top:10px;
 color:var(--muted);
 font-size:14px;
 line-height:1.7;
}

.plan-price{
 margin-top:18px;
 font-size:44px;
 font-weight:900;
}

.plan-price span{
 font-size:14px;
 color:var(--muted);
}

/* FEATURES */

.features{
 margin-top:18px;
 display:flex;
 flex-direction:column;
 gap:12px;
}

.feature{
 display:flex;
 gap:10px;
 align-items:center;
 font-size:14px;
 color:#dbe4ef;
}

.check{
 color:var(--success);
 font-weight:900;
}

/* BUTTON */

.plan-btn{
 margin-top:22px;
 width:100%;
 height:56px;
 border-radius:18px;
 border:1px solid rgba(255,255,255,.08);
 background:rgba(255,255,255,.04);
 color:white;
 font-weight:800;
 cursor:pointer;
 transition:.25s;
}

.plan-btn:hover{
 transform:translateY(-2px);
 border-color:rgba(0,217,255,.35);
}

.plan-btn.primary{
 background:linear-gradient(90deg,#2563ff,#00d9ff);
 border:none;
 box-shadow:0 18px 45px rgba(0,217,255,.25);
}

/* ================= MOBILE ================= */

@media(max-width:900px){
 .plans{ grid-template-columns:1fr; }
 .title{ font-size:32px; }
}

</style>

</head>

<body>

<div class="bg">
 <div class="glow glow1"></div>
 <div class="glow glow2"></div>
</div>

<div class="app">

<div class="top">
 <div class="brand">
  <div class="logo"></div>
  <span>FLUX</span>
 </div>

 <div class="top-actions">
  <button class="top-btn">Feed</button>
  <button class="top-btn">Perfil</button>
  <button class="top-btn primary-btn">Analytics</button>
 </div>
</div>

<div class="title">Assinatura</div>

<div class="subtitle">
Gerencie seu plano e desbloqueie recursos premium da Flux.
</div>

<div class="current">

 <div class="plan-badge">Plano Premium Ativo</div>

 <div class="current-price">
  R$49 <span>/mês</span>
 </div>

 <div class="status">Ativo e funcionando</div>

</div>

<div class="plans">

<div class="plan-card">
 <div class="plan-name">Start</div>
 <div class="plan-price">R$0 <span>/mês</span></div>

 <div class="features">
  <div class="feature"><span class="check">✓</span>Feed básico</div>
  <div class="feature"><span class="check">✓</span>Perfil</div>
  <div class="feature"><span class="check">✓</span>10 posts</div>
 </div>

 <button class="plan-btn">Atual</button>
</div>

<div class="plan-card popular">
 <div class="popular-tag">POPULAR</div>

 <div class="plan-name">Pro</div>
 <div class="plan-price">R$29 <span>/mês</span></div>

 <div class="features">
  <div class="feature"><span class="check">✓</span>Analytics</div>
  <div class="feature"><span class="check">✓</span>Alcance</div>
  <div class="feature"><span class="check">✓</span>Ilimitado</div>
 </div>

 <button class="plan-btn primary">Assinar</button>
</div>

<div class="plan-card">
 <div class="plan-name">Premium</div>
 <div class="plan-price">R$49 <span>/mês</span></div>

 <div class="features">
  <div class="feature"><span class="check">✓</span>IA crescimento</div>
  <div class="feature"><span class="check">✓</span>Prioridade</div>
  <div class="feature"><span class="check">✓</span>Painel total</div>
 </div>

 <button class="plan-btn primary">Assinar</button>
</div>

</div>

</div>

</body>
</html>

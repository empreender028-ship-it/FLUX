<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>Flux • Obrigado</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
 --primary:#00d9ff;
 --secondary:#2563ff;
 --green:#18f2a3;
 --bg:#000814;
 --card:rgba(7,15,35,.84);
 --line:rgba(255,255,255,.09);
 --muted:#94a3b8;
}

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 -webkit-tap-highlight-color:transparent;
 font-family:Inter,sans-serif;
}

html,body{
 width:100%;
 min-height:100%;
 overflow:hidden;
 background:#000;
 color:white;
}

body{
 min-height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 padding:20px;
 background:
  radial-gradient(circle at top left,rgba(37,99,255,.38),transparent 32%),
  radial-gradient(circle at bottom right,rgba(0,217,255,.24),transparent 32%),
  linear-gradient(180deg,#00194d 0%,#000814 45%,#000 100%);
}

.bg{
 position:fixed;
 inset:0;
 overflow:hidden;
 z-index:0;
 pointer-events:none;
}

.glow{
 position:absolute;
 border-radius:50%;
 filter:blur(95px);
 opacity:.35;
}

.glow1{
 width:320px;
 height:320px;
 background:#2563ff;
 top:-120px;
 left:-80px;
}

.glow2{
 width:280px;
 height:280px;
 background:#00d9ff;
 right:-100px;
 bottom:-100px;
}

.card{
 position:relative;
 z-index:5;
 width:100%;
 max-width:440px;
 background:var(--card);
 backdrop-filter:blur(26px);
 border:1px solid var(--line);
 border-radius:34px;
 padding:38px 28px;
 text-align:center;
 box-shadow:0 30px 90px rgba(0,0,0,.62);
 overflow:hidden;
}

.card::before{
 content:"";
 position:absolute;
 inset:-90%;
 background:radial-gradient(circle,rgba(255,255,255,.10),transparent 30%);
 animation:spin 14s linear infinite;
}

.content{
 position:relative;
 z-index:2;
}

.brand{
 display:flex;
 align-items:center;
 justify-content:center;
 gap:12px;
 margin-bottom:26px;
}

.logo{
 width:24px;
 height:24px;
 border:3px solid var(--primary);
 transform:rotate(45deg);
 border-radius:5px;
 box-shadow:0 0 24px rgba(0,217,255,.75);
}

.brand-text{
 font-size:26px;
 font-weight:900;
 letter-spacing:5px;
 background:linear-gradient(90deg,#fff,#00d9ff,#2563ff);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.check-wrap{
 width:112px;
 height:112px;
 margin:auto;
 margin-bottom:28px;
 border-radius:50%;
 display:flex;
 justify-content:center;
 align-items:center;
 background:linear-gradient(180deg,rgba(37,99,255,.25),rgba(0,217,255,.15));
 border:1px solid rgba(255,255,255,.10);
 box-shadow:0 0 55px rgba(0,217,255,.26);
}

.check{
 font-size:56px;
 font-weight:900;
 background:linear-gradient(180deg,#ffffff,#18f2a3,#00d9ff);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.title{
 font-size:34px;
 font-weight:900;
 letter-spacing:-1px;
 margin-bottom:14px;
}

.desc{
 color:#cbd5e1;
 font-size:15px;
 line-height:1.7;
 margin-bottom:24px;
}

.summary{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
 margin-bottom:24px;
}

.box{
 border-radius:20px;
 padding:14px;
 background:rgba(255,255,255,.055);
 border:1px solid rgba(255,255,255,.08);
}

.box small{
 display:block;
 color:var(--muted);
 font-size:10px;
 font-weight:900;
 text-transform:uppercase;
 letter-spacing:.08em;
}

.box strong{
 display:block;
 margin-top:6px;
 font-size:14px;
 font-weight:900;
}

.btn{
 width:100%;
 height:58px;
 border:none;
 border-radius:20px;
 background:linear-gradient(90deg,#2563ff,#00d9ff);
 color:white;
 font-size:15px;
 font-weight:900;
 cursor:pointer;
 box-shadow:0 15px 45px rgba(0,217,255,.25);
}

.btn:active{
 transform:scale(.98);
}

.secondary{
 margin-top:10px;
 background:rgba(255,255,255,.06);
 border:1px solid rgba(255,255,255,.08);
 box-shadow:none;
}

.small{
 margin-top:18px;
 font-size:12px;
 color:#94a3b8;
}

@keyframes spin{
 to{transform:rotate(360deg)}
}

@media(max-width:768px){
 .card{
  border-radius:28px;
  padding:34px 24px;
 }

 .title{
  font-size:29px;
 }

 .desc{
  font-size:14px;
 }

 .summary{
  grid-template-columns:1fr;
 }
}
</style>
</head>

<body>

<div class="bg">
 <div class="glow glow1"></div>
 <div class="glow glow2"></div>
</div>

<main class="card">
 <div class="content">

  <div class="brand">
   <div class="logo"></div>
   <div class="brand-text">FLUX</div>
  </div>

  <div class="check-wrap">
   <div class="check">✓</div>
  </div>

  <div class="title" id="title">Obrigado!</div>

  <div class="desc" id="desc">
   Sua ação foi concluída com sucesso.<br>
   Agora você já faz parte da nova geração da Flux.
  </div>

  <div class="summary">
   <div class="box">
    <small>Status</small>
    <strong id="statusText">Concluído</strong>
   </div>

   <div class="box">
    <small>Próximo passo</small>
    <strong id="nextText">Entrar na Flux</strong>
   </div>
  </div>

  <button class="btn" onclick="goFlux()">Entrar na Flux</button>
  <button class="btn secondary" onclick="goPainel()">Ir para o painel</button>

  <div class="small">Flux © Plataforma inteligente</div>

 </div>
</main>

<script>
const params = new URLSearchParams(location.search);
const plano = params.get("plano") || localStorage.getItem("plano_flux") || "";
const tipo = params.get("tipo") || localStorage.getItem("tipo_plano_flux") || "";

if(plano){
 document.getElementById("title").textContent = "Plano ativado!";
 document.getElementById("desc").innerHTML =
  "Seu plano " + plano.toUpperCase() + " foi selecionado com sucesso.<br>Continue para publicar e crescer na Flux.";

 document.getElementById("statusText").textContent = plano.toUpperCase();
 document.getElementById("nextText").textContent = tipo ? tipo.toUpperCase() : "Painel";
}

function goFlux(){
 location.href = "/fluxo";
}

function goPainel(){
 location.href = "/painel";
}
</script>

</body>
</html>

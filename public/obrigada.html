<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>Flux • Obrigado</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
 --primary:#00d9ff;
 --secondary:#2563ff;
 --green:#18f2a3;
 --bg:#000814;
 --card:rgba(7,15,35,.84);
 --line:rgba(255,255,255,.09);
 --muted:#94a3b8;
 --red:#ff4d6d;
}

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 -webkit-tap-highlight-color:transparent;
 font-family:Inter,sans-serif;
}

html,body{
 width:100%;
 min-height:100%;
 overflow:hidden;
 background:#000;
 color:white;
}

body{
 min-height:100dvh;
 display:flex;
 justify-content:center;
 align-items:center;
 padding:18px;
 background:
 radial-gradient(circle at top left,rgba(37,99,255,.38),transparent 32%),
 radial-gradient(circle at bottom right,rgba(0,217,255,.24),transparent 32%),
 linear-gradient(180deg,#00194d 0%,#000814 45%,#000 100%);
}

.bg{
 position:fixed;
 inset:0;
 overflow:hidden;
 z-index:0;
 pointer-events:none;
}

.grid-bg{
 position:absolute;
 inset:0;
 background-image:
 linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),
 linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);
 background-size:44px 44px;
 mask-image:linear-gradient(to bottom,#000,transparent 82%);
}

.glow{
 position:absolute;
 border-radius:50%;
 filter:blur(95px);
 opacity:.35;
}

.glow1{
 width:320px;
 height:320px;
 background:#2563ff;
 top:-120px;
 left:-80px;
}

.glow2{
 width:280px;
 height:280px;
 background:#00d9ff;
 right:-100px;
 bottom:-100px;
}

.confetti{
 position:fixed;
 inset:0;
 z-index:1;
 pointer-events:none;
 overflow:hidden;
}

.piece{
 position:absolute;
 top:-20px;
 width:8px;
 height:14px;
 border-radius:4px;
 background:linear-gradient(180deg,#00d9ff,#2563ff);
 animation:fall 3.4s linear forwards;
 opacity:.9;
}

@keyframes fall{
 to{
  transform:translateY(110vh) rotate(680deg);
  opacity:0;
 }
}

.card{
 position:relative;
 z-index:5;
 width:100%;
 max-width:460px;
 max-height:94dvh;
 overflow:auto;
 background:var(--card);
 backdrop-filter:blur(26px);
 border:1px solid var(--line);
 border-radius:34px;
 padding:34px 24px;
 text-align:center;
 box-shadow:0 30px 90px rgba(0,0,0,.62);
}

.card::-webkit-scrollbar{
 display:none;
}

.card::before{
 content:"";
 position:absolute;
 inset:-90%;
 background:radial-gradient(circle,rgba(255,255,255,.10),transparent 30%);
 animation:spin 14s linear infinite;
}

.content{
 position:relative;
 z-index:2;
}

.brand{
 display:flex;
 align-items:center;
 justify-content:center;
 gap:12px;
 margin-bottom:22px;
}

.logo{
 width:24px;
 height:24px;
 border:3px solid var(--primary);
 transform:rotate(45deg);
 border-radius:5px;
 box-shadow:0 0 24px rgba(0,217,255,.75);
}

.brand-text{
 font-size:26px;
 font-weight:950;
 letter-spacing:5px;
 background:linear-gradient(90deg,#fff,#00d9ff,#2563ff);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.check-wrap{
 width:112px;
 height:112px;
 margin:auto;
 margin-bottom:24px;
 border-radius:50%;
 display:flex;
 justify-content:center;
 align-items:center;
 background:linear-gradient(180deg,rgba(37,99,255,.25),rgba(0,217,255,.15));
 border:1px solid rgba(255,255,255,.10);
 box-shadow:0 0 55px rgba(0,217,255,.26);
 animation:pulse 2.2s infinite ease-in-out;
}

.check{
 font-size:56px;
 font-weight:950;
 background:linear-gradient(180deg,#ffffff,#18f2a3,#00d9ff);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.title{
 font-size:32px;
 font-weight:950;
 letter-spacing:-1px;
 margin-bottom:12px;
}

.desc{
 color:#cbd5e1;
 font-size:14px;
 line-height:1.65;
 margin-bottom:20px;
}

.summary{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
 margin-bottom:18px;
}

.box{
 border-radius:20px;
 padding:14px;
 background:rgba(255,255,255,.055);
 border:1px solid rgba(255,255,255,.08);
}

.box small{
 display:block;
 color:var(--muted);
 font-size:10px;
 font-weight:950;
 text-transform:uppercase;
 letter-spacing:.08em;
}

.box strong{
 display:block;
 margin-top:6px;
 font-size:14px;
 font-weight:950;
}

.progress-wrap{
 margin:8px 0 18px;
}

.progress-label{
 display:flex;
 justify-content:space-between;
 color:#94a3b8;
 font-size:11px;
 font-weight:900;
 margin-bottom:8px;
}

.progress{
 width:100%;
 height:8px;
 border-radius:999px;
 background:rgba(255,255,255,.08);
 overflow:hidden;
}

.bar{
 height:100%;
 width:0%;
 border-radius:999px;
 background:linear-gradient(90deg,#2563ff,#00d9ff,#18f2a3);
 transition:1s ease;
}

.steps{
 text-align:left;
 margin-bottom:18px;
 display:flex;
 flex-direction:column;
 gap:9px;
}

.step{
 display:flex;
 gap:10px;
 align-items:flex-start;
 padding:12px;
 border-radius:18px;
 background:rgba(255,255,255,.045);
 border:1px solid rgba(255,255,255,.06);
}

.step-icon{
 width:26px;
 height:26px;
 border-radius:10px;
 background:linear-gradient(135deg,#2563ff,#00d9ff);
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:11px;
 font-weight:950;
 flex-shrink:0;
}

.step b{
 display:block;
 font-size:13px;
 margin-bottom:3px;
}

.step span{
 display:block;
 color:#94a3b8;
 font-size:11px;
 line-height:1.45;
 font-weight:700;
}

.btn{
 width:100%;
 height:56px;
 border:none;
 border-radius:20px;
 background:linear-gradient(90deg,#2563ff,#00d9ff);
 color:white;
 font-size:14px;
 font-weight:950;
 cursor:pointer;
 box-shadow:0 15px 45px rgba(0,217,255,.25);
 margin-top:9px;
}

.btn:active{
 transform:scale(.98);
}

.secondary{
 background:rgba(255,255,255,.06);
 border:1px solid rgba(255,255,255,.08);
 box-shadow:none;
}

.green{
 background:rgba(24,242,163,.12);
 border:1px solid rgba(24,242,163,.18);
 color:#b8ffe3;
 box-shadow:none;
}

.small{
 margin-top:16px;
 font-size:12px;
 color:#94a3b8;
}

.toast{
 position:fixed;
 left:50%;
 bottom:26px;
 transform:translateX(-50%) translateY(14px);
 z-index:40;
 max-width:92%;
 padding:13px 16px;
 border-radius:999px;
 background:rgba(0,0,0,.78);
 border:1px solid rgba(255,255,255,.14);
 color:white;
 font-size:12px;
 font-weight:950;
 opacity:0;
 pointer-events:none;
 transition:.22s;
}

.toast.show{
 opacity:1;
 transform:translateX(-50%) translateY(0);
}

@keyframes spin{
 to{transform:rotate(360deg)}
}

@keyframes pulse{
 0%,100%{transform:scale(1)}
 50%{transform:scale(1.045)}
}

@media(max-width:768px){
 .card{
  border-radius:28px;
  padding:30px 20px;
 }

 .title{
  font-size:28px;
 }

 .desc{
  font-size:13px;
 }

 .summary{
  grid-template-columns:1fr;
 }

 .check-wrap{
  width:96px;
  height:96px;
 }

 .check{
  font-size:48px;
 }
}
</style>
</head>

<body>

<div class="bg">
 <div class="grid-bg"></div>
 <div class="glow glow1"></div>
 <div class="glow glow2"></div>
</div>

<div class="confetti" id="confetti"></div>

<main class="card">

 <div class="content">

  <div class="brand">
   <div class="logo"></div>
   <div class="brand-text">FLUX</div>
  </div>

  <div class="check-wrap">
   <div class="check">✓</div>
  </div>

  <div class="title" id="title">
   Obrigado!
  </div>

  <div class="desc" id="desc">
   Sua ação foi concluída com sucesso.<br>
   Agora você já faz parte da nova geração da Flux.
  </div>

  <div class="summary">

   <div class="box">
    <small>Status</small>
    <strong id="statusText">Concluído</strong>
   </div>

   <div class="box">
    <small>Próximo passo</small>
    <strong id="nextText">Entrar na Flux</strong>
   </div>

  </div>

  <div class="progress-wrap">

   <div class="progress-label">
    <span>Conta Flux</span>
    <span id="progressText">0%</span>
   </div>

   <div class="progress">
    <div class="bar" id="bar"></div>
   </div>

  </div>

  <div class="steps" id="steps"></div>

  <button class="btn" onclick="goMain()" id="mainBtn">
   Entrar na Flux
  </button>

  <button class="btn secondary" onclick="goPainel()">
   Ir para o painel
  </button>

  <button class="btn green" onclick="goMarketplace()">
   Abrir marketplace
  </button>

  <div class="small" id="smallText">
   Flux • Plataforma inteligente
  </div>

 </div>

</main>

<div class="toast" id="toast"></div>

<script>
const params = new URLSearchParams(location.search);

const pagamentoStatus =
 params.get("mp") ||
 params.get("status") ||
 "pending";

const plano =
 params.get("plano") ||
 "";

const tipo =
 params.get("tipo") ||
 localStorage.getItem("tipo_plano_flux") ||
 localStorage.getItem("flux_tipo") ||
 "";

const origem =
 params.get("origem") ||
 params.get("from") ||
 "";

const orderRaw =
 localStorage.getItem("flux_last_order");

let order = null;

try{
 order = orderRaw ? JSON.parse(orderRaw) : null;
}catch{}

function $(id){
 return document.getElementById(id);
}

function toast(msg){
 const box = $("toast");
 box.textContent = msg;
 box.classList.add("show");
 clearTimeout(window.toastTimer);
 window.toastTimer = setTimeout(()=>{
  box.classList.remove("show");
 },1600);
}

function money(v){
 return "R$ " + Number(v || 0).toLocaleString("pt-BR",{
  minimumFractionDigits:2,
  maximumFractionDigits:2
 });
}

function setProgress(value){
 $("bar").style.width = value + "%";
 $("progressText").textContent = value + "%";
}

function setSteps(items){
 $("steps").innerHTML =
 items.map((item,index)=>`
  <div class="step">
   <div class="step-icon">${index + 1}</div>
   <div>
    <b>${item.title}</b>
    <span>${item.text}</span>
   </div>
  </div>
 `).join("");
}

function confetti(){
 const box = $("confetti");
 for(let i = 0; i < 34; i++){
  const p = document.createElement("div");
  p.className = "piece";
  p.style.left = Math.random() * 100 + "%";
  p.style.animationDelay = Math.random() * .9 + "s";
  p.style.background =
   i % 3 === 0
   ? "linear-gradient(180deg,#18f2a3,#00d9ff)"
   : i % 3 === 1
   ? "linear-gradient(180deg,#2563ff,#00d9ff)"
   : "linear-gradient(180deg,#ffffff,#00d9ff)";
  box.appendChild(p);
  setTimeout(()=>{
   p.remove();
  },4200);
 }
}

function applyContext(){
 let title = "Obrigado!";
 let desc =
 "Sua ação foi concluída com sucesso.<br>Agora você já faz parte da nova geração da Flux.";
 let status = "Concluído";
 let next = "Entrar na Flux";
 let progress = 72;
 let steps = [
  {
   title:"Explorar a plataforma",
   text:"Entre no Feed e veja publicações, marcas e tendências."
  },
  {
   title:"Abrir o Fluxo",
   text:"Veja vídeos rápidos e conteúdos verticais em tempo real."
  },
  {
   title:"Completar seu perfil",
   text:"Ajuste sua vitrine, bio, logo e informações de contato."
  }
 ];

 if(plano && pagamentoStatus === "approved"){
  title = "Plano ativado!";
  desc =
  "Seu plano " +
  plano.toUpperCase() +
  " foi confirmado com sucesso pelo Mercado Pago.<br>Continue para publicar, vender e crescer na Flux.";
  status = plano.toUpperCase();
  next = tipo ? tipo.toUpperCase() : "Painel";
  progress = 88;

  localStorage.setItem("flux_plano",plano);
  localStorage.setItem("plano_flux",plano);
  localStorage.setItem("flux_pagamento_ok","true");

  steps = [
   {
    title:"Pagamento aprovado",
    text:"O Mercado Pago confirmou o pagamento do seu plano."
   },
   {
    title:"Configurar vitrine",
    text:"Personalize perfil, logo, capa e links para vender melhor."
   },
   {
    title:"Publicar no Feed e Fluxo",
    text:"Use vídeos rápidos, posts e marketplace para gerar alcance."
   }
  ];
 }

 if(plano && pagamentoStatus !== "approved"){
  title = "Pagamento pendente";
  desc =
  "Seu pagamento ainda está aguardando confirmação do Mercado Pago.<br>Assim que aprovado, seu plano será ativado automaticamente.";
  status = "Pendente";
  next = "Aguardar confirmação";
  progress = 44;

  localStorage.removeItem("flux_pagamento_ok");

  steps = [
   {
    title:"Pagamento iniciado",
    text:"Seu PIX, boleto ou cartão foi enviado ao Mercado Pago."
   },
   {
    title:"Aguardando confirmação",
    text:"A aprovação pode levar alguns instantes dependendo do método escolhido."
   },
   {
    title:"Ativação automática",
    text:"Após aprovação, sua conta Flux será liberada automaticamente."
   }
  ];
 }

 if(order && !plano){
  title = "Pedido criado!";
  desc =
  "Seu pedido foi gerado com sucesso dentro do Marketplace Flux.<br>Total: " +
  money(order.total);
  status = order.status ? order.status.toUpperCase() : "PENDENTE";
  next = "Checkout";
  progress = 92;
  steps = [
   {
    title:"Pedido salvo",
    text:"Código " + order.id + " foi registrado no dispositivo."
   },
   {
    title:"Finalizar pagamento",
    text:"Continue para o checkout ou finalize pelo WhatsApp da loja."
   },
   {
    title:"Acompanhar alertas",
    text:"A Flux pode avisar sobre atualizações do pedido nas notificações."
   }
  ];
 }

 if(origem === "cadastro"){
  title = "Cadastro concluído!";
  desc =
  "Sua conta foi criada com sucesso.<br>Agora escolha interesses ou entre direto no Feed.";
  status = "Conta criada";
  next = "Interesses";
  progress = 68;
  steps = [
   {
    title:"Escolher interesses",
    text:"Personalize seu Feed com temas, marcas e produtos."
   },
   {
    title:"Explorar conteúdos",
    text:"Entre no Feed, Fluxo e Marketplace."
   },
   {
    title:"Completar dados",
    text:"Adicione informações para melhorar sua experiência."
   }
  ];
 }

 $("title").innerHTML = title;
 $("desc").innerHTML = desc;
 $("statusText").textContent = status;
 $("nextText").textContent = next;
 setSteps(steps);
 setTimeout(()=>{
  setProgress(progress);
 },300);
 localStorage.setItem("flux_onboarding_ok","true");
}

function goMain(){
 if(origem === "cadastro"){
  location.href = "/interesses";
  return;
 }
 if(order && !plano){
  location.href = "/checkout";
  return;
 }
 if(plano && pagamentoStatus === "approved"){
  location.href = "/painel";
  return;
 }
 if(plano && pagamentoStatus !== "approved"){
  location.href = "/pagamento.html?plano=" + encodeURIComponent(plano);
  return;
 }
 location.href = "/fluxo";
}

function goPainel(){
 if(plano && pagamentoStatus !== "approved"){
  location.href = "/pagamento.html?plano=" + encodeURIComponent(plano);
  return;
 }
 location.href = "/painel";
}

function goMarketplace(){
 location.href = "/marketplace";
}

function preload(){
 ["/feed","/fluxo","/painel","/marketplace"].forEach(url=>{
  const link = document.createElement("link");
  link.rel = "prefetch";
  link.href = url;
  document.head.appendChild(link);
 });
}

applyContext();
preload();

if(pagamentoStatus === "approved"){
 confetti();
 setTimeout(()=>{
  toast("Plano aprovado e Flux pronta para continuar");
 },600);
}else{
 setTimeout(()=>{
  toast("Pagamento aguardando confirmação");
 },600);
}
</script>

</body>
</html>

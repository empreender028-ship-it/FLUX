<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<title>Flux • Admin Moderação</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:Inter,sans-serif;
 -webkit-tap-highlight-color:transparent;
}

:root{

 --bg:#020617;

 --card:rgba(15,23,42,.82);
 --card2:rgba(255,255,255,.06);

 --line:rgba(255,255,255,.09);

 --primary:#00d9ff;
 --blue:#2563ff;

 --green:#00ffa3;
 --yellow:#ffb800;
 --red:#ff5470;

 --muted:#94a3b8;
 --text:#ffffff;

 --shadow:0 24px 80px rgba(0,0,0,.38);

}

body.light{

 --bg:#f1f5f9;

 --card:rgba(255,255,255,.94);
 --card2:rgba(15,23,42,.045);

 --line:rgba(15,23,42,.13);

 --text:#0f172a;
 --muted:#475569;

 --shadow:0 18px 55px rgba(15,23,42,.12);

}

body{

 min-height:100vh;

 padding:18px;
 padding-bottom:116px;

 color:var(--text);

 background:
 radial-gradient(circle at 8% 0%,rgba(37,99,255,.36),transparent 30%),
 radial-gradient(circle at 92% 16%,rgba(0,217,255,.26),transparent 32%),
 linear-gradient(180deg,#020617,#000814,#000);

 overflow-x:hidden;

}

body.light{

 background:
 radial-gradient(circle at 8% 0%,rgba(37,99,255,.18),transparent 30%),
 radial-gradient(circle at 92% 16%,rgba(0,217,255,.15),transparent 32%),
 #f1f5f9;

}

.bg{

 position:fixed;
 inset:0;

 z-index:0;

 pointer-events:none;

}

.bg::before{

 content:"";

 position:absolute;
 inset:0;

 background-image:
 linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
 linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);

 background-size:44px 44px;

 mask-image:linear-gradient(to bottom,black,transparent 80%);

}

.glow{

 position:absolute;

 border-radius:50%;

 filter:blur(120px);

 opacity:.35;

}

.glow1{

 width:340px;
 height:340px;

 background:#2563ff;

 top:-100px;
 left:-100px;

}

.glow2{

 width:260px;
 height:260px;

 background:#00d9ff;

 right:-80px;
 bottom:-80px;

}

.app{

 position:relative;
 z-index:2;

 max-width:1450px;

 margin:auto;

}

.top{

 display:flex;
 justify-content:space-between;
 align-items:center;

 gap:14px;

 flex-wrap:wrap;

 margin-bottom:22px;

}

.brand{

 display:flex;
 align-items:center;

 gap:14px;

}

.logo{

 width:28px;
 height:28px;

 border:3px solid var(--primary);

 transform:rotate(45deg);

 border-radius:7px;

 box-shadow:
 0 0 24px rgba(0,217,255,.9),
 inset 0 0 12px rgba(0,217,255,.4);

 flex:none;

}

.brand h1{

 font-size:23px;
 font-weight:950;

 letter-spacing:4px;

}

.brand span{

 display:block;

 color:var(--muted);

 font-size:12px;

 margin-top:2px;

}

.actions{

 display:flex;

 gap:10px;

 flex-wrap:wrap;

}

.btn{

 height:48px;

 padding:0 18px;

 border:none;

 border-radius:16px;

 cursor:pointer;

 color:var(--text);

 font-weight:850;

 background:var(--card2);

 border:1px solid var(--line);

 transition:.22s;

 white-space:nowrap;

}

.btn:hover{

 transform:translateY(-2px);

}

.btn.primary{

 background:linear-gradient(90deg,var(--blue),var(--primary));

 color:white;

 border:none;

 box-shadow:0 16px 45px rgba(0,217,255,.24);

}

.hero{

 background:var(--card);

 border:1px solid var(--line);

 border-radius:34px;

 padding:28px;

 backdrop-filter:blur(26px);

 box-shadow:var(--shadow);

 margin-bottom:18px;

 display:flex;
 justify-content:space-between;
 align-items:flex-start;

 gap:20px;

 flex-wrap:wrap;

}

.title{

 font-size:44px;

 font-weight:950;

 letter-spacing:-2.2px;

 line-height:.96;

}

.title b{

 background:linear-gradient(90deg,#fff,var(--primary));

 -webkit-background-clip:text;

 color:transparent;

}

body.light .title b{

 background:linear-gradient(90deg,#0f172a,#2563ff);

 -webkit-background-clip:text;

 color:transparent;

}

.subtitle{

 margin-top:12px;

 color:var(--muted);

 line-height:1.7;

 max-width:780px;

 font-size:14px;

}

.live{

 display:flex;
 align-items:center;

 gap:8px;

 padding:12px 14px;

 border-radius:999px;

 background:rgba(0,255,163,.08);

 border:1px solid rgba(0,255,163,.18);

 color:#b8ffe3;

 font-size:12px;

 font-weight:900;

}

.dot{

 width:8px;
 height:8px;

 border-radius:50%;

 background:var(--green);

 box-shadow:0 0 20px var(--green);

}

.stats{

 display:grid;

 grid-template-columns:repeat(4,1fr);

 gap:14px;

 margin-bottom:18px;

}

.card{

 background:var(--card);

 border:1px solid var(--line);

 border-radius:28px;

 padding:22px;

 backdrop-filter:blur(24px);

 box-shadow:var(--shadow);

 position:relative;

 overflow:hidden;

}

.card::after{

 content:"";

 position:absolute;

 right:-35px;
 top:-35px;

 width:90px;
 height:90px;

 border-radius:50%;

 background:rgba(0,217,255,.10);

}

.value{

 font-size:34px;

 font-weight:950;

}

.label{

 color:var(--muted);

 margin-top:7px;

 font-size:13px;

 font-weight:650;

}

.filters{

 display:grid;

 grid-template-columns:1fr 210px 210px;

 gap:12px;

 margin-bottom:18px;

}

input,
select{

 width:100%;

 height:54px;

 border:none;
 outline:none;

 border-radius:18px;

 padding:0 16px;

 background:var(--card2);

 border:1px solid var(--line);

 color:var(--text);

 font-size:14px;

 font-weight:650;

}

.posts{

 display:grid;

 grid-template-columns:repeat(3,1fr);

 gap:18px;

}

.post{

 background:var(--card);

 border:1px solid var(--line);

 border-radius:32px;

 overflow:hidden;

 backdrop-filter:blur(24px);

 box-shadow:var(--shadow);

 transition:.25s;

}

.post:hover{

 transform:translateY(-5px);

 border-color:rgba(0,217,255,.22);

}

.media{

 position:relative;

 background:#020617;

}

.media img,
.media video{

 width:100%;
 height:270px;

 object-fit:cover;

 display:block;

}

.badge{

 position:absolute;

 top:14px;
 left:14px;

 padding:8px 12px;

 border-radius:999px;

 font-size:11px;

 font-weight:950;

 backdrop-filter:blur(18px);

}

.pendente{

 background:rgba(255,184,0,.14);

 color:#ffe29a;

 border:1px solid rgba(255,184,0,.2);

}

.denunciada{

 background:rgba(255,84,112,.14);

 color:#ffb4c2;

 border:1px solid rgba(255,84,112,.2);

}

.aprovada{

 background:rgba(0,255,163,.14);

 color:#b8ffe3;

 border:1px solid rgba(0,255,163,.2);

}

.risk{

 position:absolute;

 top:14px;
 right:14px;

 padding:8px 12px;

 border-radius:999px;

 font-size:11px;

 font-weight:950;

 background:rgba(2,6,23,.76);

 border:1px solid rgba(255,255,255,.12);

 color:white;

}

.content{

 padding:18px;

}

.company{

 display:flex;
 align-items:center;

 gap:12px;

 margin-bottom:14px;

}

.avatar{

 width:46px;
 height:46px;

 border-radius:16px;

 background:linear-gradient(135deg,var(--blue),var(--primary));

 display:grid;
 place-items:center;

 color:white;

 font-weight:950;

 border:1px solid var(--line);

 flex:none;

}

.company b{

 display:block;

 font-size:14px;

}

.company small{

 color:var(--muted);

 font-size:12px;

 font-weight:650;

}

.caption{

 color:var(--text);

 line-height:1.6;

 font-size:14px;

 min-height:66px;

 margin-bottom:14px;

}

.meta{

 display:flex;

 flex-wrap:wrap;

 gap:8px;

 margin-bottom:16px;

}

.meta span{

 padding:7px 10px;

 border-radius:999px;

 background:var(--card2);

 border:1px solid var(--line);

 color:var(--muted);

 font-size:11px;

 font-weight:800;

}

.reason{

 padding:13px;

 border-radius:18px;

 background:rgba(0,217,255,.06);

 border:1px solid rgba(0,217,255,.14);

 color:var(--text);

 font-size:12px;

 line-height:1.5;

 margin-bottom:16px;

}

.reason b{

 color:var(--primary);

}

.row-actions{

 display:flex;

 gap:9px;

 flex-wrap:wrap;

}

.action{

 flex:1;

 min-width:90px;

 height:45px;

 border:none;

 border-radius:15px;

 cursor:pointer;

 font-size:12px;

 font-weight:950;

 color:var(--text);

 background:var(--card2);

 border:1px solid var(--line);

}

.action.green{

 color:#001b12;

 background:linear-gradient(90deg,#00d084,#00ffa3);

 border:none;

}

.action.red{

 color:#ffb4c2;

 background:rgba(255,84,112,.12);

 border:1px solid rgba(255,84,112,.16);

}

.empty{

 display:none;

 padding:38px;

 text-align:center;

 color:var(--muted);

 border-radius:30px;

 background:var(--card);

 border:1px solid var(--line);

}

.toast{

 position:fixed;

 left:50%;
 bottom:96px;

 transform:translateX(-50%) translateY(20px);

 padding:14px 18px;

 border-radius:999px;

 background:rgba(2,6,23,.96);

 border:1px solid rgba(0,217,255,.22);

 color:white;

 opacity:0;

 transition:.25s;

 z-index:999;

 font-size:13px;

 font-weight:850;

}

.toast.show{

 opacity:1;

 transform:translateX(-50%) translateY(0);

}

.bottom-nav{

 position:fixed;

 left:50%;
 bottom:14px;

 transform:translateX(-50%);

 width:calc(100% - 28px);

 max-width:780px;

 display:flex;

 justify-content:space-around;

 gap:8px;

 padding:10px;

 border-radius:24px;

 background:rgba(2,6,23,.9);

 backdrop-filter:blur(24px);

 border:1px solid rgba(255,255,255,.08);

 z-index:99;

}

.bottom-nav button{

 flex:1;

 border:none;

 background:transparent;

 color:#94a3b8;

 padding:10px;

 border-radius:16px;

 font-size:12px;

 font-weight:900;

 cursor:pointer;

}

.bottom-nav button.active{

 background:linear-gradient(90deg,var(--blue),var(--primary));

 color:white;

}

@media(max-width:1100px){

 .posts{
  grid-template-columns:repeat(2,1fr);
 }

 .stats{
  grid-template-columns:repeat(2,1fr);
 }

 .filters{
  grid-template-columns:1fr;
 }

}

@media(max-width:700px){

 body{
  padding:12px;
  padding-bottom:118px;
 }

 .title{
  font-size:31px;
 }

 .hero{
  padding:20px;
  border-radius:26px;
 }

 .posts{
  grid-template-columns:1fr;
 }

 .stats{
  grid-template-columns:1fr;
 }

 .actions{
  width:100%;
  display:grid;
  grid-template-columns:1fr 1fr;
 }

 .btn{
  width:100%;
 }

 .media img,
 .media video{
  height:240px;
 }

 .brand h1{
  font-size:19px;
 }

 .bottom-nav button{
  font-size:11px;
  padding:9px 4px;
 }

 .row-actions{
  display:grid;
  grid-template-columns:1fr;
 }

 .action{
  width:100%;
 }

}

</style>
</head>

<body>

<div class="bg">

 <div class="glow glow1"></div>
 <div class="glow glow2"></div>

</div>

<div class="app">

<header class="top">

 <div class="brand">

  <div class="logo"></div>

  <div>

   <h1>FLUX ADMIN</h1>

   <span>
    Segurança, denúncias e revisão de posts
   </span>

  </div>

 </div>

 <div class="actions">

  <button class="btn" onclick="toggleTheme()">
   Tema
  </button>

  <button class="btn" onclick="go('/admin')">
   Admin
  </button>

  <button class="btn" onclick="go('/admin-pagamentos')">
   Pagamentos
  </button>

  <button class="btn primary" onclick="carregarPosts()">
   Atualizar
  </button>

 </div>

</header>

<section class="hero">

 <div>

  <div class="title">
   Moderação
   <b>inteligente</b>
  </div>

  <div class="subtitle">

   Central da Flux para revisar denúncias,
   risco por IA, aprovações, remoções
   e controle completo do conteúdo.

  </div>

 </div>

 <div class="live">

  <div class="dot"></div>

  <span id="apiStatus">
   Conectando API...
  </span>

 </div>

</section>

<section class="stats">

 <div class="card">
  <div class="value" id="statPendentes">0</div>
  <div class="label">Pendentes</div>
 </div>

 <div class="card">
  <div class="value" id="statDenuncias">0</div>
  <div class="label">Denúncias</div>
 </div>

 <div class="card">
  <div class="value" id="statAprovados">0</div>
  <div class="label">Aprovados</div>
 </div>

 <div class="card">
  <div class="value" id="statRisco">0%</div>
  <div class="label">Risco médio IA</div>
 </div>

</section>

<section class="filters">

 <input
  id="search"
  placeholder="Buscar empresa, legenda ou ID..."
 >

 <select id="statusFilter">

  <option value="all">Todos status</option>
  <option value="pendente">Pendentes</option>
  <option value="denunciada">Denunciadas</option>
  <option value="aprovada">Aprovadas</option>

 </select>

 <select id="destinoFilter">

  <option value="all">Todos destinos</option>
  <option value="feed">Feed</option>
  <option value="fluxo">Fluxo</option>

 </select>

</section>

<section class="posts" id="posts"></section>

<div class="empty" id="empty">
 Nenhum post encontrado.
</div>

</div>

<nav class="bottom-nav">

 <button onclick="go('/admin')">
  Admin
 </button>

 <button onclick="go('/admin-empresas')">
  Empresas
 </button>

 <button onclick="go('/admin-pagamentos')">
  Pagamentos
 </button>

 <button class="active" onclick="go('/admin-moderacao')">
  Moderação
 </button>

</nav>

<div class="toast" id="toast"></div>

<script>

const token =
localStorage.getItem("token");

let posts = [];

const demoPosts = [

 {
  id:"mod-001",
  empresa:"Premium Soles",
  email:"premiumsolesshop@gmail.com",
  legenda:"Nova coleção streetwear chegando com peças limitadas.",
  motivo:"Conteúdo comercial normal. Baixo risco.",
  status:"pendente",
  destino:"feed",
  tipo:"imagem",
  risco:12,
  criadoEm:"Agora",
  midia:"https://images.unsplash.com/photo-1445205170230-053b83016050?q=80&w=1200&auto=format&fit=crop"
 },

 {
  id:"mod-002",
  empresa:"Loja Modelo",
  email:"empresa@flux.com",
  legenda:"Promoção agressiva denunciada por usuários.",
  motivo:"Denúncia recebida. Revisar linguagem antes de aprovar.",
  status:"denunciada",
  destino:"fluxo",
  tipo:"video",
  risco:68,
  criadoEm:"Hoje",
  midia:"https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"
 },

 {
  id:"mod-003",
  empresa:"World Nerd",
  email:"worldnerdlife@gmail.com",
  legenda:"Post aprovado para vitrine de tecnologia.",
  motivo:"Sem alerta crítico.",
  status:"aprovada",
  destino:"feed",
  tipo:"imagem",
  risco:5,
  criadoEm:"Ontem",
  midia:"https://images.unsplash.com/photo-1518779578993-ec3579fee39f?q=80&w=1200&auto=format&fit=crop"
 }

];

function go(url){
 location.href = url;
}

function toast(msg){

 const el =
 document.getElementById("toast");

 el.innerText = msg;

 el.classList.add("show");

 setTimeout(()=>{
  el.classList.remove("show");
 },2200);

}

function toggleTheme(){

 document.body.classList.toggle("light");

 localStorage.setItem(
  "flux_theme",
  document.body.classList.contains("light")
  ? "light"
  : "dark"
 );

}

if(localStorage.getItem("flux_theme")==="light"){

 document.body.classList.add("light");

}

async function carregarPosts(){

 const apiStatus =
 document.getElementById("apiStatus");

 apiStatus.innerText =
 "Buscando posts...";

 try{

  const res =
  await fetch("/api/moderacao/posts",{

   headers:{
    "Content-Type":"application/json",
    "Authorization":
    token
    ? "Bearer " + token
    : ""
   }

  });

  if(!res.ok)
  throw new Error("erro");

  const data =
  await res.json();

  posts = data.posts || [];

  aplicarResumo(
   data.resumo || gerarResumo(posts)
  );

  render();

  apiStatus.innerText =
  "API conectada";

  toast("Moderação atualizada");

 }catch{

  posts = demoPosts;

  aplicarResumo(
   gerarResumo(posts)
  );

  render();

  apiStatus.innerText =
  "Modo local";

  toast("API offline • usando prévia");

 }

}

function gerarResumo(lista){

 const pendentes =
 lista.filter(
  p=>p.status==="pendente"
 ).length;

 const denuncias =
 lista.filter(
  p=>p.status==="denunciada"
 ).length;

 const aprovados =
 lista.filter(
  p=>p.status==="aprovada"
 ).length;

 const soma =
 lista.reduce(
  (acc,p)=>
  acc + Number(p.risco || 0),
  0
 );

 const riscoMedio =
 lista.length
 ? Math.round(soma/lista.length)
 : 0;

 return {
  pendentes,
  denuncias,
  aprovados,
  riscoMedio
 };

}

function aplicarResumo(resumo){

 document.getElementById(
  "statPendentes"
 ).innerText =
 resumo.pendentes || 0;

 document.getElementById(
  "statDenuncias"
 ).innerText =
 resumo.denuncias || 0;

 document.getElementById(
  "statAprovados"
 ).innerText =
 resumo.aprovados || 0;

 document.getElementById(
  "statRisco"
 ).innerText =
 (resumo.riscoMedio || 0) + "%";

}

function render(){

 const q =
 document.getElementById("search")
 .value
 .toLowerCase();

 const status =
 document.getElementById(
  "statusFilter"
 ).value;

 const destino =
 document.getElementById(
  "destinoFilter"
 ).value;

 const box =
 document.getElementById("posts");

 const empty =
 document.getElementById("empty");

 const lista =
 posts.filter(p=>{

  const texto = [

   p.id,
   p.empresa,
   p.email,
   p.legenda,
   p.motivo,
   p.status,
   p.destino

  ].join(" ").toLowerCase();

  return texto.includes(q)
   && (status==="all" || p.status===status)
   && (destino==="all" || p.destino===destino);

 });

 if(!lista.length){

  box.innerHTML = "";

  empty.style.display = "block";

  return;

 }

 empty.style.display = "none";

 box.innerHTML =
 lista.map(p=>`

  <article class="post">

   <div class="media">

    <span class="badge ${p.status}">
     ${labelStatus(p.status)}
    </span>

    <span class="risk">
     IA ${Number(p.risco || 0)}%
    </span>

    ${renderMidia(p)}

   </div>

   <div class="content">

    <div class="company">

     <div class="avatar">
      ${iniciais(p.empresa)}
     </div>

     <div>

      <b>
       ${p.empresa}
      </b>

      <small>
       ${p.email}
      </small>

     </div>

    </div>

    <div class="caption">
     ${p.legenda}
    </div>

    <div class="meta">

     <span>
      ${(p.destino || "feed").toUpperCase()}
     </span>

     <span>
      ${p.tipo}
     </span>

     <span>
      ${p.criadoEm}
     </span>

    </div>

    <div class="reason">

     <b>
      Motivo IA:
     </b>

     ${p.motivo}

    </div>

    <div class="row-actions">

     <button
      class="action green"
      onclick="aprovarPost('${p.id}')"
     >
      Aprovar
     </button>

     <button
      class="action red"
      onclick="removerPost('${p.id}')"
     >
      Remover
     </button>

     <button
      class="action"
      onclick="abrirPost('${p.id}')"
     >
      Abrir
     </button>

    </div>

   </div>

  </article>

 `).join("");

}

function renderMidia(p){

 const url =
 p.midia ||
 p.imagem;

 if(p.tipo === "video"){

  return `
   <video
    src="${url}"
    muted
    controls
    playsinline
    preload="metadata"
   ></video>
  `;

 }

 return `
  <img
   src="${url}"
   loading="lazy"
   alt="Post"
  >
 `;

}

function labelStatus(status){

 if(status==="pendente")
 return "PENDENTE";

 if(status==="denunciada")
 return "DENUNCIADA";

 if(status==="aprovada")
 return "APROVADA";

 return "PENDENTE";

}

function iniciais(nome){

 return String(nome || "F")
 .split(" ")
 .slice(0,2)
 .map(p=>p[0])
 .join("")
 .toUpperCase();

}

async function aprovarPost(id){

 try{

  const res =
  await fetch(
   `/api/moderacao/posts/${id}/aprovar`,
   {
    method:"POST",

    headers:{
     "Content-Type":"application/json",
     "Authorization":
     token
     ? "Bearer " + token
     : ""
    }

   }
  );

  if(!res.ok)
  throw new Error("erro");

  toast("Post aprovado");

  carregarPosts();

 }catch{

  const post =
  posts.find(p=>p.id===id);

  if(post)
  post.status = "aprovada";

  aplicarResumo(
   gerarResumo(posts)
  );

  render();

  toast("Modo local • post aprovado");

 }

}

async function removerPost(id){

 const ok =
 confirm("Remover publicação?");

 if(!ok) return;

 try{

  const res =
  await fetch(
   `/api/moderacao/posts/${id}/remover`,
   {
    method:"DELETE",

    headers:{
     "Content-Type":"application/json",
     "Authorization":
     token
     ? "Bearer " + token
     : ""
    }

   }
  );

  if(!res.ok)
  throw new Error("erro");

  toast("Post removido");

  carregarPosts();

 }catch{

  posts =
  posts.filter(p=>p.id!==id);

  aplicarResumo(
   gerarResumo(posts)
  );

  render();

  toast("Modo local • post removido");

 }

}

function abrirPost(id){

 location.href =
 "/feed?post=" + id;

}

document
.getElementById("search")
.addEventListener("input",render);

document
.getElementById("statusFilter")
.addEventListener("change",render);

document
.getElementById("destinoFilter")
.addEventListener("change",render);

carregarPosts();

setInterval(
 carregarPosts,
 30000
);

</script>

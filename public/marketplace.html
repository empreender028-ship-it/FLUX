<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">

<title>FLUX • Marketplace</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
 --bg:#050816;
 --card:rgba(255,255,255,.065);
 --stroke:rgba(255,255,255,.09);
 --text:#fff;
 --muted:#9aa4b2;
 --primary:#00d9ff;
 --blue:#2563ff;
 --green:#18f2a3;
 --red:#ff4d6d;
 --shadow:0 28px 80px rgba(0,0,0,.42);
}

body.light{
 --bg:#f5f7fb;
 --card:#fff;
 --stroke:rgba(0,0,0,.08);
 --text:#0f172a;
 --muted:#475569;
 --shadow:0 22px 60px rgba(15,23,42,.12);
}

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 -webkit-tap-highlight-color:transparent;
 font-family:Inter,sans-serif;
}

html,body{
 width:100%;
 min-height:100%;
 overflow-x:hidden;
}

body{
 background:
 radial-gradient(circle at top left,rgba(37,99,255,.30),transparent 30%),
 radial-gradient(circle at top right,rgba(0,217,255,.18),transparent 30%),
 linear-gradient(180deg,#00194d 0%,var(--bg) 48%,#000 100%);
 color:var(--text);
 transition:.25s;
}

body.light{
 background:
 radial-gradient(circle at top left,rgba(37,99,255,.14),transparent 30%),
 radial-gradient(circle at top right,rgba(0,217,255,.10),transparent 30%),
 linear-gradient(180deg,#f7faff,#eef4ff,#fff);
}

button{
 border:none;
 cursor:pointer;
 font-family:inherit;
 touch-action:manipulation;
}

button:active{
 transform:scale(.97);
}

a{
 color:inherit;
 text-decoration:none;
}

.app{
 width:100%;
 max-width:1320px;
 margin:auto;
 padding:16px 14px 120px;
}

.top{
 position:sticky;
 top:0;
 z-index:100;
 display:flex;
 justify-content:space-between;
 align-items:center;
 gap:12px;
 margin:0 -14px 18px;
 padding:14px;
 background:rgba(3,7,18,.76);
 backdrop-filter:blur(30px);
 border-bottom:1px solid rgba(255,255,255,.06);
}

body.light .top{
 background:rgba(255,255,255,.86);
}

.brand{
 display:flex;
 align-items:center;
 gap:11px;
}

.logo-box{
 width:44px;
 height:44px;
 border-radius:17px;
 background:rgba(255,255,255,.06);
 border:1px solid var(--stroke);
 display:flex;
 align-items:center;
 justify-content:center;
 box-shadow:0 0 34px rgba(0,217,255,.18);
}

.logo-core{
 width:16px;
 height:16px;
 border:3px solid var(--primary);
 transform:rotate(45deg);
 border-radius:4px;
 box-shadow:0 0 20px rgba(0,217,255,.7);
}

.logo{
 font-size:22px;
 font-weight:900;
 letter-spacing:3px;
 background:linear-gradient(90deg,#fff,#00d9ff,#2563ff);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

body.light .logo{
 background:linear-gradient(90deg,#0f172a,#2563ff,#00a6ff);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.top-actions{
 display:flex;
 gap:8px;
}

.btn{
 height:44px;
 padding:0 15px;
 border-radius:16px;
 border:1px solid var(--stroke);
 background:var(--card);
 color:var(--text);
 font-size:12px;
 font-weight:900;
}

.primary{
 border:none;
 background:linear-gradient(90deg,var(--blue),var(--primary));
 color:#fff;
 box-shadow:0 18px 46px rgba(0,217,255,.20);
 position:relative;
}

.cart-badge{
 position:absolute;
 top:-6px;
 right:-5px;
 min-width:22px;
 height:22px;
 border-radius:999px;
 background:#ff2f7d;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:10px;
 font-weight:900;
 padding:0 6px;
}

.hero{
 border-radius:36px;
 padding:26px;
 margin-bottom:14px;
 background:
 linear-gradient(135deg,rgba(37,99,255,.30),rgba(0,217,255,.10)),
 rgba(255,255,255,.035);
 border:1px solid var(--stroke);
 backdrop-filter:blur(24px);
 box-shadow:var(--shadow);
 position:relative;
 overflow:hidden;
}

.hero::after{
 content:"";
 position:absolute;
 inset:-90%;
 background:radial-gradient(circle,rgba(255,255,255,.10),transparent 30%);
 animation:spin 14s linear infinite;
}

.hero-content{
 position:relative;
 z-index:2;
}

.title{
 font-size:40px;
 font-weight:900;
 line-height:1;
 letter-spacing:-1px;
 margin-bottom:12px;
}

.sub{
 color:#dbeafe;
 font-size:14px;
 line-height:1.7;
 max-width:650px;
}

.stats{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:10px;
 margin-top:18px;
}

.stat{
 border-radius:24px;
 padding:15px;
 background:rgba(255,255,255,.055);
 border:1px solid rgba(255,255,255,.08);
}

.stat small{
 display:block;
 font-size:10px;
 font-weight:900;
 color:var(--muted);
 text-transform:uppercase;
 letter-spacing:.08em;
}

.stat strong{
 display:block;
 margin-top:6px;
 font-size:22px;
 font-weight:900;
}

.filter{
 display:grid;
 grid-template-columns:1fr 220px;
 gap:12px;
 margin:18px 0;
}

.search{
 height:58px;
 border-radius:22px;
 border:1px solid var(--stroke);
 background:var(--card);
 color:var(--text);
 padding:0 16px;
 outline:none;
 font-size:13px;
 font-weight:800;
}

.search::placeholder{
 color:var(--muted);
}

.select{
 height:58px;
 border-radius:22px;
 border:1px solid var(--stroke);
 background:var(--card);
 color:var(--text);
 padding:0 14px;
 outline:none;
 font-size:13px;
 font-weight:800;
}

.grid{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:14px;
}

.card{
 background:var(--card);
 border:1px solid var(--stroke);
 border-radius:28px;
 overflow:hidden;
 transition:.18s ease;
 backdrop-filter:blur(22px);
 box-shadow:0 18px 55px rgba(0,0,0,.24);
 position:relative;
}

.card:hover{
 transform:translateY(-4px);
 border-color:rgba(0,217,255,.24);
}

.image{
 position:relative;
 height:240px;
 overflow:hidden;
 background:#000;
}

.image img{
 width:100%;
 height:100%;
 object-fit:cover;
 display:block;
 transition:.35s;
}

.card:hover img{
 transform:scale(1.06);
}

.overlay{
 position:absolute;
 inset:0;
 background:linear-gradient(to top,rgba(0,0,0,.72),transparent 50%);
}

.badge{
 position:absolute;
 left:12px;
 top:12px;
 height:30px;
 padding:0 12px;
 border-radius:999px;
 background:rgba(0,217,255,.14);
 border:1px solid rgba(0,217,255,.22);
 display:flex;
 align-items:center;
 font-size:11px;
 font-weight:900;
 color:#c9f7ff;
 backdrop-filter:blur(18px);
}

.favorite{
 position:absolute;
 top:12px;
 right:12px;
 width:38px;
 height:38px;
 border-radius:14px;
 background:rgba(0,0,0,.42);
 backdrop-filter:blur(16px);
 display:flex;
 align-items:center;
 justify-content:center;
 color:white;
 font-size:15px;
 border:1px solid rgba(255,255,255,.08);
}

.content{
 padding:15px;
}

.name{
 font-size:16px;
 font-weight:900;
 margin-bottom:6px;
 line-height:1.3;
}

.price{
 color:var(--primary);
 font-size:22px;
 font-weight:900;
 margin-bottom:8px;
}

.desc{
 color:var(--muted);
 font-size:12px;
 line-height:1.6;
 min-height:38px;
}

.meta{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-top:14px;
}

.rate{
 font-size:12px;
 font-weight:900;
 color:#ffd166;
}

.stock{
 font-size:11px;
 font-weight:900;
 color:var(--green);
}

.actions{
 display:flex;
 gap:8px;
 margin-top:14px;
}

.buy{
 flex:1;
 height:48px;
 border-radius:16px;
 background:linear-gradient(90deg,var(--blue),var(--primary));
 color:white;
 font-size:13px;
 font-weight:900;
 box-shadow:0 18px 42px rgba(0,217,255,.16);
}

.cart{
 width:52px;
 border-radius:16px;
 background:rgba(255,255,255,.07);
 border:1px solid var(--stroke);
 color:var(--text);
 font-size:18px;
}

.empty{
 grid-column:1/-1;
 padding:28px;
 border-radius:28px;
 background:var(--card);
 border:1px solid var(--stroke);
 color:var(--muted);
 text-align:center;
 font-size:13px;
 line-height:1.6;
}

.cart-modal{
 position:fixed;
 inset:0;
 z-index:999;
 background:rgba(0,0,0,.72);
 display:none;
 align-items:flex-end;
 justify-content:center;
}

.cart-modal.active{
 display:flex;
}

.cart-box{
 width:100%;
 max-width:520px;
 background:#0b1220;
 border-radius:32px 32px 0 0;
 padding:20px;
 max-height:84vh;
 overflow:auto;
 animation:up .22s ease;
}

.cart-title{
 font-size:25px;
 font-weight:900;
 margin-bottom:18px;
}

.cart-list{
 display:flex;
 flex-direction:column;
 gap:10px;
}

.cart-item{
 display:flex;
 gap:10px;
 align-items:center;
 background:rgba(255,255,255,.05);
 border:1px solid rgba(255,255,255,.06);
 border-radius:20px;
 padding:10px;
}

.cart-item img{
 width:70px;
 height:70px;
 border-radius:16px;
 object-fit:cover;
}

.cart-info{
 flex:1;
}

.cart-name{
 font-size:13px;
 font-weight:900;
 margin-bottom:5px;
}

.cart-price{
 color:var(--primary);
 font-size:13px;
 font-weight:900;
}

.remove{
 width:42px;
 height:42px;
 border-radius:14px;
 background:rgba(255,0,0,.12);
 color:#ffbcbc;
}

.total{
 margin-top:18px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 font-size:20px;
 font-weight:900;
}

.checkout{
 width:100%;
 height:58px;
 margin-top:18px;
 border-radius:20px;
 background:linear-gradient(90deg,var(--blue),var(--primary));
 color:white;
 font-size:14px;
 font-weight:900;
}

.close{
 width:100%;
 height:52px;
 margin-top:10px;
 border-radius:18px;
 background:rgba(255,255,255,.07);
 border:1px solid rgba(255,255,255,.06);
 color:white;
 font-weight:900;
}

.toast{
 position:fixed;
 left:50%;
 bottom:102px;
 transform:translateX(-50%) translateY(18px);
 z-index:1200;
 max-width:92%;
 padding:13px 16px;
 border-radius:18px;
 background:rgba(0,0,0,.76);
 border:1px solid rgba(255,255,255,.14);
 backdrop-filter:blur(22px);
 color:#fff;
 font-size:12px;
 font-weight:900;
 opacity:0;
 pointer-events:none;
 transition:.22s ease;
}

.toast.show{
 opacity:1;
 transform:translateX(-50%) translateY(0);
}

.bottom{
 position:fixed;
 left:0;
 bottom:0;
 width:100%;
 z-index:100;
 background:rgba(0,0,0,.78);
 backdrop-filter:blur(32px);
 border-top:1px solid rgba(255,255,255,.07);
 padding:8px 8px calc(8px + env(safe-area-inset-bottom));
}

body.light .bottom{
 background:rgba(255,255,255,.86);
}

.bottom-wrap{
 max-width:760px;
 margin:auto;
 display:grid;
 grid-template-columns:repeat(5,1fr);
 gap:8px;
}

.nav{
 height:62px;
 border-radius:22px;
 background:var(--card);
 border:1px solid var(--stroke);
 display:flex;
 flex-direction:column;
 align-items:center;
 justify-content:center;
 gap:5px;
 color:var(--muted);
 font-size:10px;
 font-weight:900;
}

.nav.active{
 background:linear-gradient(180deg,#2563ff,#00d9ff);
 color:white;
 border:none;
}

.icon{
 width:18px;
 height:18px;
 border-radius:7px;
 border:2px solid currentColor;
}

@keyframes spin{
 to{transform:rotate(360deg)}
}

@keyframes up{
 from{transform:translateY(100%)}
 to{transform:translateY(0)}
}

@media(max-width:1100px){
 .grid{
  grid-template-columns:repeat(3,1fr);
 }
}

@media(max-width:850px){
 .grid{
  grid-template-columns:repeat(2,1fr);
 }

 .stats{
  grid-template-columns:repeat(2,1fr);
 }

 .filter{
  grid-template-columns:1fr;
 }
}

@media(max-width:520px){
 .grid{
  grid-template-columns:1fr;
 }

 .title{
  font-size:31px;
 }

 .top-actions .btn:first-child{
  display:none;
 }

 .stats{
  grid-template-columns:1fr;
 }
}
</style>
</head>

<body>

<div class="app">

<header class="top">
 <a class="brand" href="/feed">
  <div class="logo-box"><div class="logo-core"></div></div>
  <div class="logo">FLUX SHOP</div>
 </a>

 <div class="top-actions">
  <button class="btn" onclick="toggleTheme()">Tema</button>

  <button class="btn primary" onclick="openCart()">
   Carrinho
   <div class="cart-badge" id="cartCount">0</div>
  </button>
 </div>
</header>

<section class="hero">
 <div class="hero-content">

  <div class="title">Marketplace</div>

  <div class="sub">
   Produtos premium dentro da Flux. Descubra marcas, tendências e itens mais vendidos da plataforma.
  </div>

  <div class="stats">
   <div class="stat">
    <small>Produtos</small>
    <strong id="productsCount">0</strong>
   </div>

   <div class="stat">
    <small>Pedidos</small>
    <strong>12.4k</strong>
   </div>

   <div class="stat">
    <small>Vendedores</small>
    <strong>984</strong>
   </div>

   <div class="stat">
    <small>Online</small>
    <strong id="onlineCount">0</strong>
   </div>
  </div>

 </div>
</section>

<section class="filter">
 <input class="search" id="search" placeholder="Buscar produto...">
 
 <select class="select" id="category">
  <option value="all">Todas categorias</option>
  <option value="shoes">Tênis</option>
  <option value="clothes">Roupas</option>
  <option value="tech">Tecnologia</option>
 </select>
</section>

<main class="grid" id="grid"></main>

</div>

<div class="cart-modal" id="cartModal">
 <div class="cart-box">

  <div class="cart-title">Seu carrinho</div>

  <div class="cart-list" id="cartList"></div>

  <div class="total">
   <span>Total</span>
   <span id="cartTotal">R$ 0</span>
  </div>

  <button class="checkout" onclick="checkout()">
   Finalizar compra
  </button>

  <button class="close" onclick="closeCart()">
   Fechar
  </button>

 </div>
</div>

<nav class="bottom">
 <div class="bottom-wrap">
  <a class="nav" href="/feed"><span class="icon"></span><span>Feed</span></a>
  <a class="nav" href="/fluxo"><span class="icon"></span><span>Fluxo</span></a>
  <a class="nav active" href="/marketplace"><span class="icon"></span><span>Shop</span></a>
  <a class="nav" href="/posts"><span class="icon"></span><span>Posts</span></a>
  <a class="nav" href="/perfil"><span class="icon"></span><span>Perfil</span></a>
 </div>
</nav>

<div class="toast" id="toast"></div>

<script>
const grid = document.getElementById("grid");
const search = document.getElementById("search");
const category = document.getElementById("category");

let cart = JSON.parse(localStorage.getItem("flux_cart") || "[]");

const products = [
 {
  id:1,
  name:"Sneaker Pro X",
  price:399,
  category:"shoes",
  image:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200&auto=format&fit=crop",
  badge:"Mais vendido",
  rating:"4.9",
  stock:"Disponível",
  desc:"Tênis urbano premium estilo street."
 },
 {
  id:2,
  name:"Urban Jacket",
  price:249,
  category:"clothes",
  image:"https://images.unsplash.com/photo-1520975928313-8a7a7a7a7a7a?q=80&w=1200&auto=format&fit=crop",
  badge:"Nova coleção",
  rating:"4.8",
  stock:"Disponível",
  desc:"Jaqueta leve estilo moderno."
 },
 {
  id:3,
  name:"Smart Watch X",
  price:599,
  category:"tech",
  image:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1200&auto=format&fit=crop",
  badge:"Tech premium",
  rating:"5.0",
  stock:"Poucas unidades",
  desc:"Relógio inteligente premium."
 },
 {
  id:4,
  name:"Runner Fly",
  price:289,
  category:"shoes",
  image:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?q=80&w=1200&auto=format&fit=crop",
  badge:"Performance",
  rating:"4.7",
  stock:"Disponível",
  desc:"Tênis leve para performance."
 },
 {
  id:5,
  name:"Flux Hoodie",
  price:189,
  category:"clothes",
  image:"https://images.unsplash.com/photo-1503341504253-dff4815485f1?q=80&w=1200&auto=format&fit=crop",
  badge:"Flux Edition",
  rating:"4.9",
  stock:"Disponível",
  desc:"Moletom premium oversized."
 },
 {
  id:6,
  name:"Flux Buds",
  price:329,
  category:"tech",
  image:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1200&auto=format&fit=crop",
  badge:"Sem fio",
  rating:"4.8",
  stock:"Disponível",
  desc:"Fone bluetooth premium."
 }
];

function money(v){
 return "R$ " + Number(v).toLocaleString("pt-BR");
}

function showToast(msg){
 const toast = document.getElementById("toast");
 toast.textContent = msg;
 toast.classList.add("show");

 clearTimeout(window.toastTimer);

 window.toastTimer = setTimeout(()=>{
  toast.classList.remove("show");
 },1500);
}

function renderProducts(){
 const q = search.value.toLowerCase();
 const cat = category.value;

 const filtered = products.filter(p=>{
  const okSearch =
   p.name.toLowerCase().includes(q) ||
   p.desc.toLowerCase().includes(q);

  const okCat =
   cat === "all" || p.category === cat;

  return okSearch && okCat;
 });

 document.getElementById("productsCount").textContent = filtered.length;

 if(!filtered.length){
  grid.innerHTML = `
   <div class="empty">
    Nenhum produto encontrado.
   </div>
  `;
  return;
 }

 grid.innerHTML = filtered.map(p=>`
  <article class="card">

   <div class="image">
    <img src="${p.image}" alt="${p.name}" loading="lazy">

    <div class="overlay"></div>

    <div class="badge">${p.badge}</div>

    <button class="favorite">♡</button>
   </div>

   <div class="content">

    <div class="name">${p.name}</div>

    <div class="price">${money(p.price)}</div>

    <div class="desc">${p.desc}</div>

    <div class="meta">
     <div class="rate">★ ${p.rating}</div>
     <div class="stock">${p.stock}</div>
    </div>

    <div class="actions">
     <button class="buy" onclick="buyNow(${p.id})">
      Comprar
     </button>

     <button class="cart" onclick="addCart(${p.id})">
      +
     </button>
    </div>

   </div>

  </article>
 `).join("");
}

function addCart(id){
 const product = products.find(p=>p.id === id);

 if(!product) return;

 cart.push(product);

 localStorage.setItem("flux_cart",JSON.stringify(cart));

 updateCart();

 showToast("Produto adicionado");
}

function updateCart(){
 document.getElementById("cartCount").textContent = cart.length;
}

function openCart(){
 document.getElementById("cartModal").classList.add("active");

 const list = document.getElementById("cartList");

 if(!cart.length){
  list.innerHTML = `
   <div class="empty">
    Seu carrinho está vazio.
   </div>
  `;

  document.getElementById("cartTotal").textContent = "R$ 0";

  return;
 }

 list.innerHTML = cart.map((p,index)=>`
  <div class="cart-item">

   <img src="${p.image}">

   <div class="cart-info">
    <div class="cart-name">${p.name}</div>
    <div class="cart-price">${money(p.price)}</div>
   </div>

   <button class="remove" onclick="removeCart(${index})">
    ×
   </button>

  </div>
 `).join("");

 const total = cart.reduce((s,p)=>s + p.price,0);

 document.getElementById("cartTotal").textContent = money(total);
}

function closeCart(){
 document.getElementById("cartModal").classList.remove("active");
}

function removeCart(index){
 cart.splice(index,1);

 localStorage.setItem("flux_cart",JSON.stringify(cart));

 updateCart();
 openCart();
}

function buyNow(id){
 addCart(id);
 openCart();
}

function checkout(){
 if(!cart.length){
  showToast("Carrinho vazio");
  return;
 }

 showToast("Redirecionando checkout");

 setTimeout(()=>{
  location.href = "/checkout";
 },700);
}

function toggleTheme(){
 document.body.classList.toggle("light");

 localStorage.setItem(
  "theme",
  document.body.classList.contains("light")
   ? "light"
   : "dark"
 );
}

if(localStorage.getItem("theme")==="light"){
 document.body.classList.add("light");
}

async function loadOnline(){
 try{
  const res = await fetch("/online");
  const data = await res.json();

  document.getElementById("onlineCount").textContent =
   data.onlineUsers || 0;
 }catch{
  document.getElementById("onlineCount").textContent = 0;
 }
}

search.addEventListener("input",renderProducts);
category.addEventListener("change",renderProducts);

renderProducts();
updateCart();
loadOnline();

setInterval(loadOnline,5000);
</script>

</body>
</html>

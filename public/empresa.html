<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,
initial-scale=1.0,
viewport-fit=cover,
user-scalable=no">

<title>FLUX • Empresa</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
 --bg:#020617;
 --card:rgba(255,255,255,.05);
 --line:rgba(255,255,255,.08);
 --text:#fff;
 --muted:#94a3b8;
 --primary:#00d9ff;
 --secondary:#2563ff;
 --green:#18f2a3;
}

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 -webkit-tap-highlight-color:transparent;
 font-family:Inter,sans-serif;
}

html,
body{
 width:100%;
 min-height:100%;
 overflow-x:hidden;
}

body{
 background:
 radial-gradient(circle at top left,
 rgba(37,99,255,.32),
 transparent 30%),

 radial-gradient(circle at top right,
 rgba(0,217,255,.18),
 transparent 30%),

 linear-gradient(
 180deg,
 #00194d,
 #020617 45%,
 #000
 );

 color:white;
 padding-bottom:120px;
}

/* BG */

.bg{
 position:fixed;
 inset:0;
 overflow:hidden;
 z-index:0;
 pointer-events:none;
}

.glow{
 position:absolute;
 border-radius:50%;
 filter:blur(110px);
 opacity:.28;
}

.glow1{
 width:340px;
 height:340px;
 background:#2563ff;
 top:-120px;
 left:-120px;
}

.glow2{
 width:280px;
 height:280px;
 background:#00d9ff;
 right:-120px;
 bottom:-120px;
}

/* APP */

.app{
 position:relative;
 z-index:2;
 max-width:1200px;
 margin:auto;
}

/* HEADER */

.header{
 position:sticky;
 top:0;
 z-index:100;

 display:flex;
 justify-content:space-between;
 align-items:center;

 padding:16px 18px;

 background:rgba(0,0,0,.45);

 backdrop-filter:blur(28px);

 border-bottom:
 1px solid rgba(255,255,255,.05);
}

.brand{
 display:flex;
 align-items:center;
 gap:14px;
}

.logo-core{
 width:18px;
 height:18px;
 border:3px solid var(--primary);
 transform:rotate(45deg);
 border-radius:4px;
 box-shadow:0 0 20px var(--primary);
}

.logo{
 font-size:24px;
 font-weight:900;
 letter-spacing:4px;

 background:
 linear-gradient(
 90deg,
 #fff,
 #00d9ff,
 #2563ff
 );

 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.actions{
 display:flex;
 gap:10px;
}

.action{
 height:48px;
 padding:0 16px;

 border:none;
 border-radius:18px;

 background:rgba(255,255,255,.05);

 border:
 1px solid rgba(255,255,255,.08);

 color:white;
 font-size:12px;
 font-weight:800;
 cursor:pointer;
}

/* HERO */

.hero{
 position:relative;
 height:360px;
 overflow:hidden;
}

.cover{
 width:100%;
 height:100%;
 object-fit:cover;
}

.overlay{
 position:absolute;
 inset:0;

 background:
 linear-gradient(
 180deg,
 transparent,
 rgba(0,0,0,.8)
 );
}

.hero-content{
 position:absolute;
 left:30px;
 bottom:28px;

 display:flex;
 gap:18px;
 align-items:flex-end;
 flex-wrap:wrap;
}

.avatar{
 width:130px;
 height:130px;

 border-radius:36px;

 object-fit:cover;

 border:
 4px solid rgba(255,255,255,.08);

 box-shadow:
 0 20px 60px rgba(0,0,0,.5);
}

.info h1{
 font-size:42px;
 font-weight:900;
 margin-bottom:10px;
}

.small{
 color:#cbd5e1;
 font-size:14px;
 margin-bottom:12px;
}

.bio{
 max-width:700px;
 line-height:1.7;
 color:#e2e8f0;
 font-size:14px;
}

/* ACTION BAR */

.bar{
 padding:22px 24px;

 display:flex;
 justify-content:space-between;
 align-items:center;
 gap:20px;
 flex-wrap:wrap;

 border-bottom:
 1px solid rgba(255,255,255,.05);
}

.bar-left{
 display:flex;
 gap:12px;
 flex-wrap:wrap;
}

.btn{
 height:54px;
 padding:0 22px;

 border:none;
 border-radius:20px;

 font-size:14px;
 font-weight:800;

 cursor:pointer;
}

.primary{
 background:
 linear-gradient(
 90deg,
 #2563ff,
 #00d9ff
 );

 color:white;

 box-shadow:
 0 15px 45px rgba(0,217,255,.18);
}

.dark{
 background:rgba(255,255,255,.05);

 border:
 1px solid rgba(255,255,255,.08);

 color:white;
}

.follow.active{
 background:
 rgba(0,217,255,.1);

 border:
 1px solid rgba(0,217,255,.4);

 color:var(--primary);
}

/* STATS */

.stats{
 display:grid;

 grid-template-columns:
 repeat(auto-fit,minmax(180px,1fr));

 gap:14px;

 padding:24px;
}

.stat{
 padding:24px;

 border-radius:28px;

 background:rgba(255,255,255,.05);

 border:
 1px solid rgba(255,255,255,.06);

 backdrop-filter:blur(20px);
}

.stat-number{
 font-size:34px;
 font-weight:900;
 margin-bottom:8px;
}

.stat-label{
 color:#94a3b8;
 font-size:13px;
}

/* FEED */

.feed{
 padding:0 24px 40px;

 display:grid;

 grid-template-columns:
 repeat(auto-fit,minmax(340px,1fr));

 gap:18px;
}

.post{
 overflow:hidden;

 border-radius:30px;

 background:rgba(255,255,255,.05);

 border:
 1px solid rgba(255,255,255,.06);

 transition:.28s;

 backdrop-filter:blur(20px);
}

.post:hover{
 transform:translateY(-5px);

 border-color:
 rgba(0,217,255,.25);
}

.post-media{
 position:relative;
 height:320px;
 overflow:hidden;
}

.post-media img,
.post-media video{
 width:100%;
 height:100%;
 object-fit:cover;
}

.post-body{
 padding:18px;
}

.post-desc{
 line-height:1.7;
 color:#e2e8f0;
 font-size:14px;
 margin-bottom:16px;
}

.post-bottom{
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.post-stats{
 display:flex;
 gap:18px;
 color:#94a3b8;
 font-size:13px;
}

.like{
 color:#ff4d6d;
}

.views{
 color:#00d9ff;
}

/* MOBILE */

@media(max-width:768px){

 .hero{
  height:320px;
 }

 .hero-content{
  left:18px;
  bottom:20px;
 }

 .avatar{
  width:105px;
  height:105px;
 }

 .info h1{
  font-size:30px;
 }

 .feed{
  grid-template-columns:1fr;
  padding:0 14px 40px;
 }

 .stats{
  padding:16px;
 }

}

</style>

</head>

<body>

<div class="bg">

 <div class="glow glow1"></div>
 <div class="glow glow2"></div>

</div>

<div class="app">

<header class="header">

 <div class="brand">

  <div class="logo-core"></div>

  <div class="logo">
   FLUX
  </div>

 </div>

 <div class="actions">

  <button
  class="action"
  onclick="toggleTheme()">

   Tema

  </button>

 </div>

</header>

<section class="hero">

 <img
 class="cover"
 id="banner"
 src="https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?q=80&w=1400&auto=format&fit=crop">

 <div class="overlay"></div>

 <div class="hero-content">

  <img
  class="avatar"
  id="logo"
  src="https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?q=80&w=500&auto=format&fit=crop">

  <div class="info">

   <h1 id="nome">
    Empresa Premium
   </h1>

   <div class="small">
    Negócios • Digital • Flux Verified
   </div>

   <div
   class="bio"
   id="bio">

    Empresa premium dentro da Flux.

   </div>

  </div>

 </div>

</section>

<section class="bar">

 <div class="bar-left">

  <button class="btn primary">
   Comprar
  </button>

  <button class="btn dark">
   WhatsApp
  </button>

  <button
  id="followBtn"
  class="btn dark follow"
  onclick="toggleFollow()">

   Acompanhar

  </button>

 </div>

</section>

<section class="stats">

 <div class="stat">

  <div
  class="stat-number"
  id="views">

   0

  </div>

  <div class="stat-label">
   Views
  </div>

 </div>

 <div class="stat">

  <div
  class="stat-number"
  id="followers">

   0

  </div>

  <div class="stat-label">
   Seguidores
  </div>

 </div>

 <div class="stat">

  <div class="stat-number">
   5.0
  </div>

  <div class="stat-label">
   Avaliação
  </div>

 </div>

 <div class="stat">

  <div class="stat-number">
   98%
  </div>

  <div class="stat-label">
   Resposta
  </div>

 </div>

</section>

<section
class="feed"
id="feed">

</section>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const feed =
document.getElementById("feed")

let following = false

function toggleTheme(){

 document.body.classList.toggle("light")

}

function toggleFollow(){

 const btn =
 document.getElementById("followBtn")

 following = !following

 if(following){

  btn.innerHTML =
  "Acompanhando ✓"

  btn.classList.add("active")

 }else{

  btn.innerHTML =
  "Acompanhar"

  btn.classList.remove("active")

 }

}

function compact(n=0){

 n = Number(n)

 if(n >= 1000000){
  return (n/1000000).toFixed(1)+"M"
 }

 if(n >= 1000){
  return (n/1000).toFixed(1)+"k"
 }

 return n

}

function media(post){

 if(!post.media){

  return `
   <img src="
   https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?q=80&w=1200&auto=format&fit=crop
   ">
  `

 }

 const src =
 post.media.startsWith("http")
 ? post.media
 : "/uploads/" + post.media

 const video =
 /\.(mp4|webm|mov)$/i.test(src)

 if(video){

  return `
   <video
   src="${src}"
   autoplay
   muted
   loop
   playsinline></video>
  `

 }

 return `<img src="${src}">`

}

async function loadFeed(){

 try{

  const r =
  await fetch("/api/feed")

  const data =
  await r.json()

  feed.innerHTML =
  data.map(post=>`

   <article class="post">

    <div class="post-media">

     ${media(post)}

    </div>

    <div class="post-body">

     <div class="post-desc">

      ${post.descricao || ''}

     </div>

     <div class="post-bottom">

      <div class="post-stats">

       <span class="like">
        ♥ ${compact(post.likes || 0)}
       </span>

       <span class="views">
        👁 ${compact(post.views || 0)}
       </span>

      </div>

     </div>

    </div>

   </article>

  `).join("")

 }catch(err){

  console.log(err)

 }

}

function startSocket(){

 try{

  const socket = io()

  socket.on(
   "novo_post",
   loadFeed
  )

 }catch{}

}

loadFeed()

startSocket()

</script>

</body>
</html>

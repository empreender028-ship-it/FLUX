<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Perfis • FLUX</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,Arial}
body{background:radial-gradient(circle at top,#123b88,#050816 45%,#000);color:white;padding-bottom:90px}
.top{position:sticky;top:0;z-index:9;padding:16px;background:rgba(0,0,0,.75);backdrop-filter:blur(20px);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.1)}
.logo{font-size:24px;font-weight:950;letter-spacing:3px;background:linear-gradient(90deg,#fff,#00d9ff,#2563ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.wrap{max-width:1200px;margin:auto;padding:16px}
.hero{padding:24px;border-radius:32px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);margin-bottom:16px}
.hero h1{font-size:34px;margin-bottom:8px}
.hero p{color:#cbd5e1;line-height:1.6}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:26px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.capa{height:150px;background:#111;position:relative}
.capa img{width:100%;height:100%;object-fit:cover}
.avatar{width:70px;height:70px;border-radius:22px;border:3px solid #050816;object-fit:cover;position:absolute;left:14px;bottom:-30px;background:#2563ff}
.info{padding:42px 14px 14px}
.nome{font-weight:950;font-size:17px;margin-bottom:6px}
.meta{color:#94a3b8;font-size:12px;line-height:1.6}
.btn{margin-top:14px;width:100%;height:46px;border:none;border-radius:16px;background:linear-gradient(90deg,#2563ff,#00d9ff);color:white;font-weight:950;cursor:pointer}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.grid{grid-template-columns:1fr}.hero h1{font-size:28px}}
</style>
</head>
<body>
<header class="top"><div class="logo">FLUX</div><a href="/marketplace2.html" style="color:white;text-decoration:none;font-weight:900">Shop</a></header>
<main class="wrap">
<section class="hero">
<h1>Perfis em destaque</h1>
<p>Vitrines reais organizadas pela Flux com produtos, reputação, localização e compra segura.</p>
</section>
<div class="grid" id="grid"></div>
</main>
<script>
function safe(t){return String(t||"").replace(/[<>&"]/g,"")}
async function load(){
 const r=await fetch("/api/afiliados/perfis?limit=50&v="+Date.now());
 const d=await r.json();
 const perfis=d.perfis||[];
 document.getElementById("grid").innerHTML=perfis.map(p=>
 <article class="card">
  <div class="capa">
   <img src="\">
   <img class="avatar" src="\">
  </div>
  <div class="info">
   <div class="nome">\</div>
   <div class="meta">\<br>Reputação: \<br>\ vendas</div>
   <button class="btn" onclick="location.href='/perfil-afiliado.html?seller=\'">Ver perfil</button>
  </div>
 </article>).join("");
}
load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">

<title>FLUX • Comentários</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<script src="/socket.io/socket.io.js"></script>

<style>

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:Inter,sans-serif;
 -webkit-tap-highlight-color:transparent;
}

:root{
 --bg:#020617;
 --card:rgba(15,23,42,.82);
 --line:rgba(255,255,255,.08);
 --primary:#00d9ff;
 --secondary:#2563ff;
 --text:#fff;
 --muted:#94a3b8;
 --green:#18f2a3;
 --red:#ff4d6d;
}

html,
body{
 width:100%;
 min-height:100%;
 overflow-x:hidden;
 background:#020617;
 color:var(--text);
}

body{
 padding-bottom:100px;
 background:
 radial-gradient(circle at top left,rgba(37,99,255,.26),transparent 30%),
 radial-gradient(circle at top right,rgba(0,217,255,.16),transparent 30%),
 linear-gradient(180deg,#00194d,#020617 48%,#000);
}

.page{
 width:100%;
 max-width:760px;
 margin:auto;
 padding:14px;
}

/* HEADER */

.top{
 position:sticky;
 top:0;
 z-index:20;
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin:0 -14px 14px;
 padding:12px 14px;
 background:rgba(3,7,18,.84);
 backdrop-filter:blur(22px);
 border-bottom:1px solid rgba(255,255,255,.06);
}

.brand{
 display:flex;
 align-items:center;
 gap:12px;
}

.logo-core{
 width:22px;
 height:22px;
 border:3px solid var(--primary);
 transform:rotate(45deg);
 border-radius:6px;
 box-shadow:0 0 22px rgba(0,217,255,.8);
}

.brand-text{
 font-size:23px;
 font-weight:900;
 letter-spacing:5px;
 background:linear-gradient(90deg,#fff,#00d9ff,#2563ff);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.back{
 height:42px;
 padding:0 15px;
 border-radius:15px;
 border:1px solid var(--line);
 background:rgba(255,255,255,.06);
 color:#fff;
 font-weight:900;
 cursor:pointer;
}

/* POST */

.post{
 background:var(--card);
 border:1px solid var(--line);
 border-radius:28px;
 overflow:hidden;
 backdrop-filter:blur(20px);
 box-shadow:0 20px 60px rgba(0,0,0,.38);
}

.post-media{
 width:100%;
 max-height:420px;
 background:#000;
 overflow:hidden;
 display:none;
}

.post-media.show{
 display:block;
}

.post-media img,
.post-media video{
 width:100%;
 max-height:420px;
 object-fit:cover;
 display:block;
}

.post-body{
 padding:16px;
}

.user{
 display:flex;
 gap:12px;
 align-items:center;
 margin-bottom:12px;
}

.avatar{
 width:50px;
 height:50px;
 border-radius:18px;
 background:linear-gradient(135deg,#2563ff,#00d9ff);
 display:flex;
 align-items:center;
 justify-content:center;
 font-weight:900;
 color:white;
 box-shadow:0 0 24px rgba(0,217,255,.16);
}

.name{
 font-weight:900;
 font-size:15px;
}

.time{
 color:var(--muted);
 font-size:12px;
 margin-top:3px;
}

.text{
 color:#dbe5f1;
 margin-top:10px;
 line-height:1.65;
 font-size:14px;
}

/* STATS */

.stats{
 display:flex;
 gap:9px;
 flex-wrap:wrap;
 margin-top:14px;
}

.stat{
 height:36px;
 padding:0 12px;
 border-radius:999px;
 background:rgba(255,255,255,.06);
 border:1px solid rgba(255,255,255,.07);
 display:flex;
 align-items:center;
 color:#dbeafe;
 font-size:11px;
 font-weight:900;
 cursor:pointer;
 transition:.18s;
}

.stat.active{
 color:#fff;
 background:linear-gradient(90deg,#2563ff,#00d9ff);
}

/* COMMENTS */

.section-title{
 margin:20px 0 12px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 gap:10px;
}

.section-title b{
 font-size:15px;
 font-weight:900;
 color:#dbeafe;
}

.section-title span{
 color:var(--muted);
 font-size:12px;
}

.comment{
 background:rgba(255,255,255,.045);
 border:1px solid rgba(255,255,255,.07);
 padding:14px;
 border-radius:20px;
 margin-top:10px;
 animation:enter .2s ease;
}

.comment.pinned{
 border-color:rgba(0,217,255,.26);
 background:rgba(0,217,255,.07);
}

.comment-head{
 display:flex;
 justify-content:space-between;
 gap:10px;
 align-items:center;
}

.comment strong{
 font-size:13px;
}

.comment small{
 color:var(--muted);
 font-size:11px;
}

.comment p{
 margin-top:8px;
 font-size:14px;
 line-height:1.55;
 color:#eef4ff;
}

.comment-actions{
 display:flex;
 gap:8px;
 flex-wrap:wrap;
 margin-top:10px;
}

.comment-actions button{
 height:32px;
 padding:0 10px;
 border:none;
 border-radius:999px;
 background:rgba(255,255,255,.06);
 border:1px solid rgba(255,255,255,.06);
 color:#dbeafe;
 font-size:11px;
 font-weight:900;
 cursor:pointer;
}

.comment-actions button.liked{
 background:rgba(255,77,109,.14);
 color:#ffb4c2;
 border-color:rgba(255,77,109,.18);
}

.reply-box{
 margin-top:10px;
 padding-left:12px;
 border-left:2px solid rgba(0,217,255,.28);
 color:#c8f7ff;
 font-size:12px;
 line-height:1.5;
}

/* INPUT */

.inputBox{
 position:fixed;
 left:50%;
 bottom:10px;
 transform:translateX(-50%);
 width:calc(100% - 24px);
 max-width:760px;
 display:grid;
 grid-template-columns:1fr 86px;
 gap:9px;
 padding:10px;
 border-radius:24px;
 background:rgba(0,0,0,.58);
 border:1px solid rgba(255,255,255,.08);
 backdrop-filter:blur(22px);
 z-index:50;
}

.inputBox input{
 width:100%;
 height:52px;
 border-radius:18px;
 border:1px solid rgba(255,255,255,.09);
 background:rgba(255,255,255,.06);
 color:#fff;
 padding:0 14px;
 outline:none;
 font-weight:800;
}

.inputBox input::placeholder{
 color:var(--muted);
}

.send{
 border:none;
 border-radius:18px;
 background:linear-gradient(90deg,#2563ff,#00d9ff);
 color:#fff;
 font-weight:900;
 cursor:pointer;
}

/* EMPTY */

.empty{
 padding:18px;
 color:var(--muted);
 text-align:center;
 line-height:1.6;
 font-size:13px;
}

/* LOADING */

.skeleton{
 height:74px;
 border-radius:20px;
 margin-top:10px;
 background:linear-gradient(
  90deg,
  rgba(255,255,255,.05),
  rgba(255,255,255,.10),
  rgba(255,255,255,.05)
 );
 background-size:200% 100%;
 animation:shimmer 1.1s infinite;
}

/* TOAST */

.toast{
 position:fixed;
 left:50%;
 bottom:84px;
 transform:translateX(-50%) translateY(18px);
 z-index:100;
 max-width:92%;
 padding:13px 16px;
 border-radius:18px;
 background:rgba(0,0,0,.78);
 border:1px solid rgba(255,255,255,.14);
 color:white;
 font-size:12px;
 font-weight:900;
 opacity:0;
 pointer-events:none;
 transition:.22s;
}

.toast.show{
 opacity:1;
 transform:translateX(-50%) translateY(0);
}

/* ANIMATIONS */

@keyframes enter{
 from{
  opacity:0;
  transform:translateY(8px);
 }
 to{
  opacity:1;
  transform:none;
 }
}

@keyframes shimmer{
 from{
  background-position:200% 0;
 }
 to{
  background-position:-200% 0;
 }
}

/* MOBILE */

@media(max-width:430px){

 .post{
  border-radius:24px;
 }

 .inputBox{
  grid-template-columns:1fr 76px;
 }

 .brand-text{
  font-size:21px;
 }

 .page{
  padding:12px;
 }

 .top{
  margin:0 -12px 12px;
  padding:11px 12px;
 }
}

</style>
</head>

<body>

<div class="page">

<header class="top">

 <div class="brand">
  <div class="logo-core"></div>
  <div class="brand-text">FLUX</div>
 </div>

 <button class="back" onclick="history.back()">
  Voltar
 </button>

</header>

<main class="post">

 <div class="post-media" id="postMedia"></div>

 <div class="post-body">

  <div class="user">

   <div class="avatar" id="avatar">
    FX
   </div>

   <div>
    <div class="name" id="postName">
     Empresa Flux
    </div>

    <div class="time" id="postTime">
     agora
    </div>
   </div>

  </div>

  <div class="text" id="postText">
   Carregando publicação...
  </div>

  <div class="stats">

   <div class="stat" id="likeStat" onclick="toggleLike()">
    0 curtidas
   </div>

   <div class="stat" id="viewStat">
    0 views
   </div>

   <div class="stat" id="commentStat">
    0 comentários
   </div>

  </div>

  <div class="section-title">

   <b>Comentários</b>

   <span id="counter">
    carregando
   </span>

  </div>

  <div id="comments">

   <div class="skeleton"></div>
   <div class="skeleton"></div>
   <div class="skeleton"></div>

  </div>

 </div>

</main>

</div>

<form class="inputBox" onsubmit="send(event)">

 <input
  id="input"
  placeholder="Escreva um comentário..."
  maxlength="180"
 >

 <button class="send" type="submit">
  Enviar
 </button>

</form>

<div class="toast" id="toast"></div>

<script>

const params = new URLSearchParams(location.search);

const postId =
 params.get("id") ||
 location.hash.replace("#","") ||
 "demo";

const token =
 localStorage.getItem("token") || "";

const commentsBox =
 document.getElementById("comments");

const input =
 document.getElementById("input");

const toast =
 document.getElementById("toast");

let likedPost =
 localStorage.getItem("flux_like_" + postId) === "1";

let localLikes =
 Number(localStorage.getItem("flux_likes_" + postId) || 0);

let comments = [];

function safe(text){

 return String(text || "")
 .replace(/&/g,"&amp;")
 .replace(/</g,"&lt;")
 .replace(/>/g,"&gt;")
 .replace(/"/g,"&quot;");
}

function compact(num){

 num = Number(num || 0);

 if(num >= 1000000){
  return (
   (num / 1000000).toFixed(
    num % 1000000 ? 1 : 0
   ) + "M"
  );
 }

 if(num >= 1000){
  return (
   (num / 1000).toFixed(
    num % 1000 ? 1 : 0
   ) + "k"
  );
 }

 return String(num);
}

function initials(name){

 return String(name || "FX")
 .split(" ")
 .map(p => p[0])
 .join("")
 .slice(0,2)
 .toUpperCase();
}

function mediaSrc(media){

 if(!media){
  return "";
 }

 return media.startsWith("http")
  ? media
  : "/uploads/" + media;
}

function showToast(msg){

 toast.textContent = msg;

 toast.classList.add("show");

 clearTimeout(window.toastTimer);

 window.toastTimer = setTimeout(() => {
  toast.classList.remove("show");
 },1500);
}

function timeFormat(date){

 if(!date){
  return "agora";
 }

 try{

  return new Date(date).toLocaleString(
   "pt-BR",
   {
    day:"2-digit",
    month:"2-digit",
    hour:"2-digit",
    minute:"2-digit"
   }
  );

 }catch{

  return "agora";
 }
}

function renderComments(){

 if(!comments.length){

  commentsBox.innerHTML = `
   <div class="empty">
    Seja o primeiro a comentar.
   </div>
  `;

 }else{

  commentsBox.innerHTML = comments.map(
   (c,index) => `

   <div class="comment ${c.pinned ? "pinned" : ""}">

    <div class="comment-head">

     <strong>
      ${safe(c.usuarioNome || c.user || "Usuário Flux")}
      ${c.pinned ? " • fixado" : ""}
     </strong>

     <small>
      ${safe(timeFormat(c.createdAt))}
     </small>

    </div>

    <p>
     ${safe(c.texto || c.text || "")}
    </p>

    ${
     c.reply
     ? `
      <div class="reply-box">
       ${safe(c.reply)}
      </div>
     `
     : ""
    }

    <div class="comment-actions">

     <button onclick="likeComment(${index},this)">
      Curtir ${c.likes ? compact(c.likes) : ""}
     </button>

     <button onclick="replyComment(${index})">
      Responder
     </button>

     <button onclick="pinComment(${index})">
      Fixar
     </button>

     ${
      c.local
      ? `
       <button onclick="deleteComment(${index})">
        Excluir
       </button>
      `
      : ""
     }

    </div>

   </div>

  `
  ).join("");
 }

 document.getElementById("counter").textContent =
  comments.length + " comentário(s)";

 document.getElementById("commentStat").textContent =
  comments.length + " comentários";

 localStorage.setItem(
  "flux_comments_cache_" + postId,
  JSON.stringify(comments)
 );
}

function loadCache(){

 const raw =
  localStorage.getItem(
   "flux_comments_cache_" + postId
  );

 if(!raw){
  return false;
 }

 try{

  comments = JSON.parse(raw);

  renderComments();

  return true;

 }catch{

  return false;
 }
}

async function loadPost(){

 try{

  const [feedRes,fluxoRes] = await Promise.all([
   fetch("/api/feed"),
   fetch("/api/fluxo")
  ]);

  const feed =
   feedRes.ok
   ? await feedRes.json()
   : [];

  const fluxo =
   fluxoRes.ok
   ? await fluxoRes.json()
   : [];

  const posts = [...feed,...fluxo];

  const post =
   posts.find(
    p => String(p._id) === String(postId)
   ) || posts[0];

  if(!post){

   document.getElementById("postText")
   .textContent =
    "Publicação não encontrada.";

   document.getElementById("likeStat")
   .textContent =
    compact(localLikes) + " curtidas";

   return;
  }

  const name =
   post.empresaNome || "Empresa Flux";

  const likes =
   Number(post.likes || 0) + localLikes;

  document.getElementById("avatar")
  .textContent =
   initials(name);

  document.getElementById("postName")
  .textContent =
   name;

  document.getElementById("postTime")
  .textContent =
   timeFormat(post.createdAt);

  document.getElementById("postText")
  .textContent =
   post.descricao || "Post na Flux.";

  document.getElementById("likeStat")
  .textContent =
   compact(likes) + " curtidas";

  document.getElementById("viewStat")
  .textContent =
   compact(post.views || 0) + " views";

  if(likedPost){
   document.getElementById("likeStat")
   .classList.add("active");
  }

  const src =
   mediaSrc(post.media || "");

  const media =
   document.getElementById("postMedia");

  if(src){

   const isVideo =
    /\.(mp4|webm|mov|quicktime)$/i
    .test(src);

   media.classList.add("show");

   media.innerHTML =
    isVideo
    ? `
      <video
       src="${safe(src)}"
       controls
       muted
       playsinline
       preload="metadata"
      ></video>
     `
    : `
      <img
       src="${safe(src)}"
       loading="lazy"
       alt="${safe(name)}"
      >
     `;
  }

 }catch{

  document.getElementById("likeStat")
  .textContent =
   compact(localLikes) + " curtidas";
 }
}

async function load(){

 const hasCache = loadCache();

 try{

  const res =
   await fetch("/api/comments/" + postId);

  const data =
   await res.json();

  comments =
   Array.isArray(data)
   ? data.reverse()
   : [];

  renderComments();

 }catch{

  if(!hasCache){

   comments = [];

   renderComments();
  }
 }
}

async function send(e){

 e.preventDefault();

 const text =
  input.value.trim();

 if(!text){
  return;
 }

 const localComment = {
  usuarioNome:"Você",
  texto:text,
  createdAt:new Date().toISOString(),
  likes:0,
  local:true
 };

 comments.push(localComment);

 renderComments();

 input.value = "";

 try{

  await fetch("/api/comments",{
   method:"POST",
   headers:{
    "Content-Type":"application/json",
    ...(token
      ? {
         Authorization:
          "Bearer " + token
        }
      : {})
   },
   body:JSON.stringify({
    postId,
    usuarioNome:"Usuário Flux",
    texto:text
   })
  });

  showToast("Comentário enviado");

 }catch{

  showToast(
   "Comentário salvo localmente"
  );
 }
}

function toggleLike(){

 likedPost = !likedPost;

 localStorage.setItem(
  "flux_like_" + postId,
  likedPost ? "1" : "0"
 );

 const el =
  document.getElementById("likeStat");

 el.classList.toggle(
  "active",
  likedPost
 );

 localLikes += likedPost ? 1 : -1;

 if(localLikes < 0){
  localLikes = 0;
 }

 localStorage.setItem(
  "flux_likes_" + postId,
  localLikes
 );

 el.textContent =
  compact(localLikes) + " curtidas";

 showToast(
  likedPost
  ? "Você curtiu"
  : "Curtida removida"
 );
}

function likeComment(index,btn){

 comments[index].likes =
  Number(comments[index].likes || 0) + 1;

 btn.classList.add("liked");

 btn.textContent =
  "Curtido " +
  compact(comments[index].likes);

 localStorage.setItem(
  "flux_comments_cache_" + postId,
  JSON.stringify(comments)
 );
}

function replyComment(index){

 const resposta =
  prompt("Responder comentário:");

 if(!resposta){
  return;
 }

 comments[index].reply =
  "Você respondeu: " + resposta;

 renderComments();

 showToast("Resposta adicionada");
}

function pinComment(index){

 comments = comments.map(
  (c,i) => ({
   ...c,
   pinned:
    i === index
    ? !c.pinned
    : false
  })
 );

 renderComments();

 showToast(
  comments[index]?.pinned
  ? "Comentário fixado"
  : "Comentário desafixado"
 );
}

function deleteComment(index){

 comments.splice(index,1);

 renderComments();

 showToast("Comentário removido");
}

function startSocket(){

 try{

  const socket = io();

  socket.on(
   "novo_comentario",
   comment => {

    if(
     String(comment.postId)
     !== String(postId)
    ){
     return;
    }

    comments.push(comment);

    renderComments();

    showToast("Novo comentário");
   }
  );

 }catch{}
}

loadPost();
load();
startSocket();

</script>

</body>
</html>

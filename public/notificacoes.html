<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>FLUX â€¢ NotificaÃ§Ãµes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
 --bg:#050816;
 --card:rgba(255,255,255,.065);
 --stroke:rgba(255,255,255,.09);
 --text:#fff;
 --muted:#9aa4b2;
 --primary:#00d9ff;
 --blue:#2563ff;
 --green:#18f2a3;
 --red:#ff4d6d;
 --shadow:0 28px 80px rgba(0,0,0,.42);
}

body.light{
 --bg:#f5f7fb;
 --card:#fff;
 --stroke:rgba(0,0,0,.08);
 --text:#0f172a;
 --muted:#475569;
 --shadow:0 22px 60px rgba(15,23,42,.12);
}

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 -webkit-tap-highlight-color:transparent;
 font-family:Inter,sans-serif;
}

html,body{
 width:100%;
 min-height:100%;
 overflow-x:hidden;
}

body{
 background:
 radial-gradient(circle at top left,rgba(37,99,255,.30),transparent 30%),
 radial-gradient(circle at top right,rgba(0,217,255,.18),transparent 30%),
 linear-gradient(180deg,#00194d 0%,var(--bg) 48%,#000 100%);
 color:var(--text);
 padding-bottom:110px;
}

body.light{
 background:
 radial-gradient(circle at top left,rgba(37,99,255,.14),transparent 30%),
 radial-gradient(circle at top right,rgba(0,217,255,.10),transparent 30%),
 linear-gradient(180deg,#f7faff,#eef4ff,#fff);
}

a{
 color:inherit;
 text-decoration:none;
}

button{
 font-family:inherit;
 cursor:pointer;
 border:none;
 touch-action:manipulation;
}

button:active{
 transform:scale(.96);
}

.app{
 width:100%;
 max-width:900px;
 margin:auto;
 padding:14px;
}

.top{
 position:sticky;
 top:0;
 z-index:40;
 display:flex;
 justify-content:space-between;
 align-items:center;
 gap:12px;
 margin:0 -14px 16px;
 padding:12px 14px;
 background:rgba(3,7,18,.82);
 backdrop-filter:blur(26px);
 border-bottom:1px solid rgba(255,255,255,.06);
}

body.light .top{
 background:rgba(255,255,255,.88);
}

.brand{
 display:flex;
 align-items:center;
 gap:11px;
}

.logo-box{
 width:44px;
 height:44px;
 border-radius:17px;
 background:rgba(255,255,255,.06);
 border:1px solid var(--stroke);
 display:flex;
 align-items:center;
 justify-content:center;
 box-shadow:0 0 34px rgba(0,217,255,.18);
}

.logo-core{
 width:17px;
 height:17px;
 border:3px solid var(--primary);
 transform:rotate(45deg);
 border-radius:4px;
 box-shadow:0 0 20px rgba(0,217,255,.7);
}

.logo{
 font-size:20px;
 font-weight:950;
 letter-spacing:3px;
 background:linear-gradient(90deg,#fff,#00d9ff,#2563ff);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

body.light .logo{
 background:linear-gradient(90deg,#0f172a,#2563ff,#00a6ff);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.top-actions{
 display:flex;
 gap:8px;
}

.btn{
 height:42px;
 padding:0 13px;
 border-radius:15px;
 border:1px solid var(--stroke);
 background:var(--card);
 color:var(--text);
 font-weight:950;
 font-size:12px;
}

.primary{
 border:none;
 background:linear-gradient(90deg,var(--blue),var(--primary));
 color:#fff;
 box-shadow:0 18px 46px rgba(0,217,255,.20);
}

.hero{
 border-radius:32px;
 padding:22px;
 margin-bottom:14px;
 background:
 linear-gradient(135deg,rgba(37,99,255,.30),rgba(0,217,255,.10)),
 rgba(255,255,255,.035);
 border:1px solid var(--stroke);
 backdrop-filter:blur(24px);
 box-shadow:var(--shadow);
}

.title{
 font-size:32px;
 font-weight:950;
 line-height:1;
 margin-bottom:10px;
 letter-spacing:-1px;
}

.title span{
 background:linear-gradient(90deg,#fff,#00d9ff,#2563ff);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.sub{
 color:#dbeafe;
 font-size:13px;
 line-height:1.65;
 max-width:560px;
}

.stats{
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:10px;
 margin:14px 0 16px;
}

.stat{
 border-radius:22px;
 padding:14px;
 background:var(--card);
 border:1px solid var(--stroke);
 backdrop-filter:blur(22px);
}

.stat small{
 display:block;
 font-size:10px;
 font-weight:950;
 color:var(--muted);
 text-transform:uppercase;
 letter-spacing:.08em;
}

.stat strong{
 display:block;
 margin-top:7px;
 font-size:20px;
 font-weight:950;
}

.actionsTop{
 display:flex;
 gap:9px;
 margin:16px 0;
 flex-wrap:wrap;
}

.small{
 height:40px;
 padding:0 12px;
 border-radius:14px;
 font-size:12px;
 font-weight:950;
 background:var(--card);
 border:1px solid var(--stroke);
 color:var(--text);
}

.small.active{
 background:linear-gradient(90deg,var(--blue),var(--primary));
 color:white;
 border:none;
}

.clean{
 background:rgba(255,77,109,.14);
 color:var(--red);
}

.list{
 display:flex;
 flex-direction:column;
 gap:12px;
}

.item{
 background:var(--card);
 border:1px solid var(--stroke);
 border-radius:26px;
 padding:14px;
 display:flex;
 gap:13px;
 align-items:flex-start;
 position:relative;
 transition:.18s ease;
 backdrop-filter:blur(22px);
 box-shadow:0 18px 55px rgba(0,0,0,.24);
 animation:enter .25s ease both;
}

.item:hover{
 transform:translateY(-2px);
 border-color:rgba(0,217,255,.24);
}

.nicon{
 width:48px;
 height:48px;
 border-radius:18px;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:11px;
 font-weight:950;
 background:linear-gradient(135deg,var(--blue),var(--primary));
 box-shadow:0 0 30px rgba(0,217,255,.18);
 flex-shrink:0;
 color:white;
}

.content{
 flex:1;
 min-width:0;
}

.text{
 font-weight:950;
 margin-bottom:5px;
 font-size:14px;
 line-height:1.35;
}

.meta{
 font-size:12px;
 color:var(--muted);
 font-weight:800;
 line-height:1.45;
}

.preview{
 margin-top:10px;
 padding:10px;
 border-radius:16px;
 background:rgba(255,255,255,.055);
 border:1px solid rgba(255,255,255,.06);
 color:#cbd5e1;
 font-size:12px;
 font-weight:800;
 line-height:1.5;
}

body.light .preview{
 color:#475569;
 background:rgba(15,23,42,.04);
}

.ndot{
 width:9px;
 height:9px;
 border-radius:50%;
 background:var(--primary);
 position:absolute;
 right:14px;
 top:14px;
 box-shadow:0 0 16px var(--primary);
}

.item.read{
 opacity:.66;
}

.item.read .ndot{
 display:none;
}

.item-actions{
 display:flex;
 gap:8px;
 margin-top:10px;
 flex-wrap:wrap;
}

.link-btn{
 height:34px;
 padding:0 11px;
 border-radius:13px;
 background:rgba(255,255,255,.07);
 border:1px solid var(--stroke);
 color:var(--text);
 font-size:11px;
 font-weight:950;
 display:flex;
 align-items:center;
}

.empty{
 padding:28px;
 border-radius:28px;
 background:var(--card);
 border:1px solid var(--stroke);
 color:var(--muted);
 text-align:center;
 font-size:13px;
 line-height:1.6;
}

.toast{
 position:fixed;
 left:50%;
 bottom:102px;
 transform:translateX(-50%) translateY(18px);
 z-index:200;
 max-width:92%;
 padding:13px 16px;
 border-radius:18px;
 background:rgba(0,0,0,.76);
 border:1px solid rgba(255,255,255,.14);
 backdrop-filter:blur(22px);
 color:#fff;
 font-size:12px;
 font-weight:950;
 opacity:0;
 pointer-events:none;
 transition:.22s ease;
}

.toast.show{
 opacity:1;
 transform:translateX(-50%) translateY(0);
}

.bottom{
 position:fixed;
 left:50%;
 bottom:10px;
 transform:translateX(-50%);
 width:calc(100% - 20px);
 max-width:760px;
 z-index:100;
 background:rgba(0,0,0,.78);
 backdrop-filter:blur(30px);
 border:1px solid rgba(255,255,255,.08);
 padding:8px;
 border-radius:26px;
}

body.light .bottom{
 background:rgba(255,255,255,.88);
}

.bottom-wrap{
 display:grid;
 grid-template-columns:repeat(5,1fr);
 gap:8px;
}

.nav{
 height:58px;
 border-radius:18px;
 background:var(--card);
 border:1px solid var(--stroke);
 display:flex;
 flex-direction:column;
 align-items:center;
 justify-content:center;
 gap:5px;
 color:var(--muted);
 font-size:10px;
 font-weight:950;
 position:relative;
}

.nav.active{
 background:linear-gradient(180deg,#2563ff,#00d9ff);
 color:white;
 border:none;
}

.icon{
 width:17px;
 height:17px;
 border-radius:7px;
 border:2px solid currentColor;
}

.nav-badge{
 position:absolute;
 top:6px;
 right:10px;
 min-width:18px;
 height:18px;
 border-radius:999px;
 background:#ff2f7d;
 color:white;
 font-size:9px;
 font-weight:950;
 display:flex;
 align-items:center;
 justify-content:center;
 padding:0 5px;
}

@keyframes enter{
 from{opacity:0;transform:translateY(8px)}
 to{opacity:1;transform:translateY(0)}
}

@media(max-width:620px){
 .top{
  align-items:flex-start;
 }

 .top-actions{
  flex-wrap:wrap;
  justify-content:flex-end;
 }

 .title{
  font-size:29px;
 }

 .stats{
  grid-template-columns:1fr 1fr 1fr;
 }

 .stat{
  padding:12px;
 }

 .stat strong{
  font-size:17px;
 }
}

@media(max-width:430px){
 .top-actions .btn:first-child{
  display:none;
 }

 .item{
  border-radius:23px;
 }

 .logo{
  font-size:18px;
 }

 .actionsTop{
  overflow:auto;
  flex-wrap:nowrap;
 }

 .actionsTop::-webkit-scrollbar{
  display:none;
 }

 .small{
  white-space:nowrap;
 }
}
</style>
</head>

<body>

<div class="app">

<header class="top">
 <a class="brand" href="/feed">
  <div class="logo-box"><div class="logo-core"></div></div>
  <div class="logo">FLUX ALERTS</div>
 </a>

 <div class="top-actions">
  <button class="btn" onclick="toggleTheme()">Tema</button>
  <button class="btn primary" onclick="markAllRead()">Marcar lidas</button>
 </div>
</header>

<section class="hero">
 <div class="title">NotificaÃ§Ãµes <span>Flux</span></div>
 <div class="sub">
  Sinais reais da sua conta: comentÃ¡rios, curtidas, vendas, pedidos, seguidores, posts e radar da plataforma.
 </div>
</section>

<section class="stats">
 <div class="stat">
  <small>Total</small>
  <strong id="totalCount">0</strong>
 </div>

 <div class="stat">
  <small>NÃ£o lidas</small>
  <strong id="unreadCount">0</strong>
 </div>

 <div class="stat">
  <small>Online</small>
  <strong id="onlineCount">0</strong>
 </div>
</section>

<section class="actionsTop">
 <button class="small clean" onclick="clearAll()">Limpar tudo</button>
 <button class="small active" data-filter="all" onclick="setFilter('all',this)">Todas</button>
 <button class="small" data-filter="unread" onclick="setFilter('unread',this)">NÃ£o lidas</button>
 <button class="small" data-filter="comments" onclick="setFilter('comments',this)">ComentÃ¡rios</button>
 <button class="small" data-filter="likes" onclick="setFilter('likes',this)">Curtidas</button>
 <button class="small" data-filter="sales" onclick="setFilter('sales',this)">Vendas</button>
 <button class="small" data-filter="orders" onclick="setFilter('orders',this)">Pedidos</button>
 <button class="small" data-filter="radar" onclick="setFilter('radar',this)">Radar IA</button>
</section>

<main class="list" id="list"></main>

</div>

<nav class="bottom">
 <div class="bottom-wrap">
  <a class="nav" href="/feed"><span class="icon"></span><span>Feed</span></a>
  <a class="nav" href="/fluxo"><span class="icon"></span><span>Fluxo</span></a>
  <a class="nav" href="/painel"><span class="icon"></span><span>Criar</span></a>
  <a class="nav active" href="/alertas"><span class="icon"></span><span>Alertas</span><span class="nav-badge" id="navBadge">0</span></a>
  <a class="nav" href="/empresa.html"><span class="icon"></span><span>Perfil</span></a>
 </div>
</nav>

<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>

<script>
const list = document.getElementById("list");
const toast = document.getElementById("toast");

let filterType = "all";
let notifications = [];

try{
 notifications = JSON.parse(localStorage.getItem("flux_notifications") || "[]");
}catch(e){
 notifications = [];
}

if(!notifications.length){
 notifications = [
  {
   id:"welcome",
   type:"system",
   title:"Bem-vindo aos alertas da Flux",
   meta:"Aqui aparecerÃ£o sinais reais da plataforma.",
   preview:"Acompanhe curtidas, comentÃ¡rios, vendas, pedidos e avisos inteligentes.",
   read:false,
   url:"/feed",
   createdAt:Date.now()
  },
  {
   id:"radar-demo",
   type:"radar",
   title:"Radar IA ativo",
   meta:"A Flux estÃ¡ analisando sinais do feed e do marketplace.",
   preview:"Quando um produto, post ou vÃ­deo tiver aumento de interesse, vocÃª serÃ¡ avisado aqui.",
   read:false,
   url:"/leads",
   createdAt:Date.now() - 60000
  }
 ];
 save();
}

function save(){
 localStorage.setItem("flux_notifications",JSON.stringify(notifications.slice(0,100)));
 updateBadge();
}

function compact(num){
 num = Number(num || 0);
 if(num >= 1000000) return (num / 1000000).toFixed(num % 1000000 ? 1 : 0) + "M";
 if(num >= 1000) return (num / 1000).toFixed(num % 1000 ? 1 : 0) + "k";
 return String(num);
}

function safe(text){
 return String(text || "")
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;")
  .replace(/"/g,"&quot;")
  .replace(/'/g,"&#039;");
}

function timeAgo(ts){
 const diff = Math.floor((Date.now() - Number(ts || Date.now())) / 1000);

 if(diff < 60) return "agora";
 if(diff < 3600) return Math.floor(diff / 60) + " min";
 if(diff < 86400) return Math.floor(diff / 3600) + " h";
 return Math.floor(diff / 86400) + " d";
}

function iconType(type){
 if(type === "like") return "LIKE";
 if(type === "comment") return "COM";
 if(type === "post") return "POST";
 if(type === "online") return "ON";
 if(type === "sale") return "SALE";
 if(type === "order") return "PED";
 if(type === "follower") return "SEG";
 if(type === "radar") return "IA";
 return "FX";
}

function addNotification(item){
 const id = item.id || String(Date.now()) + Math.random();

 const exists = notifications.some(function(n){
  return String(n.id) === String(id);
 });

 if(exists) return;

 notifications.unshift({
  id:id,
  type:item.type || "system",
  title:item.title || "Nova notificaÃ§Ã£o",
  meta:item.meta || "",
  preview:item.preview || "",
  read:false,
  url:item.url || "/feed",
  createdAt:Date.now()
 });

 notifications = notifications.slice(0,100);
 save();
 render();
 showToast(item.toast || "Nova notificaÃ§Ã£o");
}

function render(){
 let data = notifications.slice();

 if(filterType === "unread"){
  data = data.filter(function(n){
   return !n.read;
  });
 }

 if(filterType === "comments"){
  data = data.filter(function(n){
   return n.type === "comment";
  });
 }

 if(filterType === "likes"){
  data = data.filter(function(n){
   return n.type === "like";
  });
 }

 if(filterType === "sales"){
  data = data.filter(function(n){
   return n.type === "sale";
  });
 }

 if(filterType === "orders"){
  data = data.filter(function(n){
   return n.type === "order";
  });
 }

 if(filterType === "radar"){
  data = data.filter(function(n){
   return n.type === "radar";
  });
 }

 document.getElementById("totalCount").textContent = compact(notifications.length);

 document.getElementById("unreadCount").textContent =
 compact(notifications.filter(function(n){
  return !n.read;
 }).length);

 updateBadge();

 if(!data.length){
  list.innerHTML = `
   <div class="empty">
    Nenhuma notificaÃ§Ã£o por aqui.
   </div>
  `;
  return;
 }

 list.innerHTML = data.map(function(n){
  return `
  <article class="item ${n.read ? "read" : ""}" data-id="${safe(n.id)}">
   <div class="nicon">${safe(iconType(n.type))}</div>

   <div class="content">
    <div class="text">${safe(n.title)}</div>
    <div class="meta">${safe(n.meta)} â€¢ ${safe(timeAgo(n.createdAt))}</div>

    ${n.preview ? `<div class="preview">${safe(n.preview)}</div>` : ""}

    <div class="item-actions">
     <a class="link-btn" href="${safe(n.url || "/feed")}" onclick="markOne('${safe(n.id)}')">Abrir</a>
     <button class="link-btn" onclick="markOne('${safe(n.id)}')">Lida</button>
     <button class="link-btn" onclick="removeOne('${safe(n.id)}')">Remover</button>
    </div>
   </div>

   <div class="ndot"></div>
  </article>
 `;
 }).join("");
}

function updateBadge(){
 const unread = notifications.filter(function(n){
  return !n.read;
 }).length;

 const badge = document.getElementById("navBadge");

 if(!badge) return;

 badge.textContent = unread > 99 ? "99+" : unread;
 badge.style.display = unread ? "flex" : "none";
}

function markOne(id){
 const item = notifications.find(function(n){
  return String(n.id) === String(id);
 });

 if(item){
  item.read = true;
 }

 save();
 render();
}

function removeOne(id){
 notifications = notifications.filter(function(n){
  return String(n.id) !== String(id);
 });

 save();
 render();
 showToast("NotificaÃ§Ã£o removida");
}

function markAllRead(){
 notifications.forEach(function(n){
  n.read = true;
 });

 save();
 render();
 showToast("NotificaÃ§Ãµes marcadas como lidas");
}

function clearAll(){
 notifications = [];
 save();
 render();
 showToast("NotificaÃ§Ãµes limpas");
}

function setFilter(type,btn){
 filterType = type;

 document.querySelectorAll("[data-filter]").forEach(function(b){
  b.classList.remove("active");
 });

 btn.classList.add("active");

 render();
}

function showToast(msg){
 toast.textContent = msg;
 toast.classList.add("show");

 clearTimeout(window.toastTimer);

 window.toastTimer = setTimeout(function(){
  toast.classList.remove("show");
 },1500);
}

function toggleTheme(){
 document.body.classList.toggle("light");

 localStorage.setItem(
  "theme",
  document.body.classList.contains("light") ? "light" : "dark"
 );
}

if(localStorage.getItem("theme") === "light"){
 document.body.classList.add("light");
}

async function loadOnline(){
 try{
  const res = await fetch("/online");
  const data = await res.json();

  document.getElementById("onlineCount").textContent =
  compact(data.onlineUsers || 0);
 }catch(e){
  document.getElementById("onlineCount").textContent = "0";
 }
}

function loadLocalOrders(){
 let orders = [];

 try{
  orders = JSON.parse(localStorage.getItem("flux_orders") || "[]");
 }catch(e){
  orders = [];
 }

 orders.slice(0,3).forEach(function(order){
  addNotification({
   id:"order-" + order.id,
   type:"order",
   title:"Pedido criado no Marketplace",
   meta:"Pedido " + order.id + " gerado com total de R$ " + Number(order.total || 0).toLocaleString("pt-BR",{minimumFractionDigits:2}),
   preview:"Status: " + (order.status || "pendente"),
   url:"/checkout",
   toast:"Pedido detectado"
  });
 });
}

function startSocket(){
 try{
  const socket = io();

  socket.on("online",function(total){
   document.getElementById("onlineCount").textContent = compact(total);
  });

  socket.on("novo_post",function(post){
   addNotification({
    type:"post",
    title:"Novo post publicado",
    meta:(post.empresaNome || "Empresa Flux") + " publicou no " + (post.tipo || "feed"),
    preview:post.descricao || "Nova publicaÃ§Ã£o disponÃ­vel.",
    url:post.tipo === "fluxo" ? "/fluxo" : "/feed"
   });
  });

  socket.on("post_like",function(data){
   addNotification({
    type:"like",
    title:"Seu post recebeu curtida",
    meta:"Total atualizado: " + compact(data.likes || 0) + " curtidas",
    preview:"Seu conteÃºdo estÃ¡ ganhando sinal dentro da Flux.",
    url:"/posts"
   });
  });

  socket.on("novo_comentario",function(comment){
   addNotification({
    type:"comment",
    title:"Novo comentÃ¡rio",
    meta:(comment.usuarioNome || "UsuÃ¡rio Flux") + ": " + (comment.texto || ""),
    preview:comment.texto || "Novo comentÃ¡rio recebido.",
    url:"/posts"
   });
  });

  socket.on("novo_lead",function(lead){
   addNotification({
    type:"radar",
    title:"Novo lead detectado",
    meta:(lead.nome || "Lead Flux") + " entrou pelo " + (lead.origem || "feed"),
    preview:lead.interesse || "Interesse detectado pela IA.",
    url:"/leads"
   });
  });

  socket.on("nova_venda",function(sale){
   addNotification({
    type:"sale",
    title:"Nova venda no Marketplace",
    meta:(sale.produto || "Produto") + " vendido.",
    preview:"Valor: R$ " + Number(sale.valor || 0).toLocaleString("pt-BR",{minimumFractionDigits:2}),
    url:"/marketplace"
   });
  });
 }catch(e){}
}

loadOnline();
loadLocalOrders();
render();
startSocket();
setInterval(loadOnline,5000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Produto • FLUX</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
 --bg:#050816;
 --card:rgba(255,255,255,.06);
 --stroke:rgba(255,255,255,.10);
 --text:#fff;
 --muted:#94a3b8;
 --primary:#00d9ff;
 --blue:#2563ff;
 --green:#18f2a3;
 --shadow:0 30px 80px rgba(0,0,0,.45);
}

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:Inter,Arial,sans-serif;
 -webkit-tap-highlight-color:transparent;
}

body{
 min-height:100vh;
 background:
 radial-gradient(circle at top left,rgba(37,99,255,.32),transparent 32%),
 radial-gradient(circle at top right,rgba(0,217,255,.20),transparent 30%),
 linear-gradient(180deg,#00194d 0%,#050816 48%,#000 100%);
 color:var(--text);
 padding-bottom:120px;
}

a{
 color:inherit;
 text-decoration:none;
}

.top{
 position:sticky;
 top:0;
 z-index:100;
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:14px;
 background:rgba(3,7,18,.84);
 backdrop-filter:blur(24px);
 border-bottom:1px solid rgba(255,255,255,.06);
}

.brand{
 display:flex;
 align-items:center;
 gap:12px;
}

.logo-box{
 width:44px;
 height:44px;
 border-radius:16px;
 background:rgba(255,255,255,.06);
 border:1px solid var(--stroke);
 display:flex;
 align-items:center;
 justify-content:center;
 box-shadow:0 0 30px rgba(0,217,255,.22);
}

.logo-core{
 width:17px;
 height:17px;
 border:3px solid var(--primary);
 transform:rotate(45deg);
 border-radius:4px;
 box-shadow:0 0 18px rgba(0,217,255,.7);
}

.logo{
 font-size:22px;
 font-weight:950;
 letter-spacing:3px;
 background:linear-gradient(90deg,#fff,#00d9ff,#2563ff);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.back{
 height:44px;
 padding:0 16px;
 border-radius:16px;
 border:1px solid var(--stroke);
 background:var(--card);
 color:var(--text);
 display:flex;
 align-items:center;
 font-size:12px;
 font-weight:950;
}

.wrap{
 width:100%;
 max-width:1220px;
 margin:auto;
 padding:18px;
}

.product{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:18px;
 align-items:start;
}

.gallery{
 background:var(--card);
 border:1px solid var(--stroke);
 border-radius:34px;
 padding:16px;
 overflow:hidden;
 backdrop-filter:blur(22px);
 box-shadow:var(--shadow);
}

.image{
 width:100%;
 height:580px;
 object-fit:contain;
 border-radius:24px;
 background:white;
 display:block;
}

.info{
 background:var(--card);
 border:1px solid var(--stroke);
 border-radius:34px;
 padding:24px;
 backdrop-filter:blur(22px);
 box-shadow:var(--shadow);
}

.badge{
 display:inline-flex;
 align-items:center;
 justify-content:center;
 height:34px;
 padding:0 14px;
 border-radius:999px;
 background:rgba(0,217,255,.12);
 border:1px solid rgba(0,217,255,.20);
 color:#c9f7ff;
 font-size:11px;
 font-weight:950;
 margin-bottom:14px;
}

.title{
 font-size:34px;
 line-height:1.15;
 font-weight:950;
 margin-bottom:14px;
}

.price{
 font-size:42px;
 color:var(--green);
 font-weight:950;
 margin-bottom:14px;
}

.seller{
 color:var(--muted);
 font-size:14px;
 line-height:1.7;
 margin-bottom:20px;
}

.seller strong{
 color:white;
}

.desc{
 color:#dbeafe;
 line-height:1.8;
 font-size:14px;
}

.actions{
 display:grid;
 gap:12px;
 margin-top:28px;
}

.btn{
 width:100%;
 height:58px;
 border:none;
 border-radius:20px;
 font-size:15px;
 font-weight:950;
 cursor:pointer;
}

.buy{
 background:linear-gradient(90deg,var(--blue),var(--primary));
 color:white;
 box-shadow:0 18px 44px rgba(0,217,255,.22);
}

.cart{
 background:rgba(255,255,255,.07);
 border:1px solid var(--stroke);
 color:white;
}

.whats{
 background:rgba(24,242,163,.12);
 border:1px solid rgba(24,242,163,.20);
 color:#b8ffe3;
}

.loading,
.error{
 padding:30px;
 border-radius:28px;
 background:var(--card);
 border:1px solid var(--stroke);
 color:var(--muted);
 text-align:center;
 font-size:14px;
 font-weight:900;
}

.bottom{
 position:fixed;
 left:50%;
 bottom:10px;
 transform:translateX(-50%);
 width:calc(100% - 20px);
 max-width:760px;
 z-index:100;
 background:rgba(0,0,0,.78);
 backdrop-filter:blur(30px);
 border:1px solid rgba(255,255,255,.08);
 padding:8px;
 border-radius:26px;
}

.bottom-wrap{
 display:grid;
 grid-template-columns:repeat(5,1fr);
 gap:8px;
}

.nav{
 height:58px;
 border-radius:18px;
 background:var(--card);
 border:1px solid var(--stroke);
 display:flex;
 flex-direction:column;
 align-items:center;
 justify-content:center;
 gap:5px;
 color:var(--muted);
 font-size:10px;
 font-weight:950;
}

.nav.active{
 background:linear-gradient(180deg,#2563ff,#00d9ff);
 color:white;
 border:none;
}

.icon{
 width:17px;
 height:17px;
 border-radius:7px;
 border:2px solid currentColor;
}

@media(max-width:900px){
 .product{
  grid-template-columns:1fr;
 }

 .image{
  height:420px;
 }

 .title{
  font-size:28px;
 }

 .price{
  font-size:38px;
 }
}

@media(max-width:520px){
 .image{
  height:340px;
 }

 .title{
  font-size:24px;
 }

 .price{
  font-size:34px;
 }

 .info,
 .gallery{
  border-radius:28px;
 }
}
</style>
</head>

<body>

<header class="top">

 <a class="brand" href="/marketplace">
  <div class="logo-box">
   <div class="logo-core"></div>
  </div>

  <div class="logo">FLUX</div>
 </a>

 <a class="back" href="/marketplace">
  Voltar
 </a>

</header>

<main class="wrap">
 <div id="produto" class="loading">
  Carregando produto...
 </div>
</main>

<nav class="bottom">
 <div class="bottom-wrap">
  <a class="nav" href="/feed"><span class="icon"></span><span>Feed</span></a>
  <a class="nav" href="/fluxo"><span class="icon"></span><span>Fluxo</span></a>
  <a class="nav active" href="/marketplace"><span class="icon"></span><span>Shop</span></a>
  <a class="nav" href="/painel"><span class="icon"></span><span>Criar</span></a>
  <a class="nav" href="/empresa.html"><span class="icon"></span><span>Perfil</span></a>
 </div>
</nav>

<script>
const WHATSAPP = "5517992042563";

function money(v){
 return "R$ " + Number(v || 0).toLocaleString("pt-BR",{
  minimumFractionDigits:2,
  maximumFractionDigits:2
 });
}

function safe(t){
 return String(t || "")
 .replace(/&/g,"&amp;")
 .replace(/</g,"&lt;")
 .replace(/>/g,"&gt;")
 .replace(/"/g,"&quot;")
 .replace(/'/g,"&#039;");
}

function fallback(img){
 img.onerror = null;
 img.src = "https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1200&auto=format&fit=crop";
}

async function carregar(){

 const box = document.getElementById("produto");

 try{

  const params = new URLSearchParams(location.search);

  const id =
   params.get("id") ||
   decodeURIComponent(location.pathname.split("/").pop());

  const r = await fetch("/api/ml/produtos");

  const data = await r.json();

  const lista = data.produtos || data || [];

  const p = lista.find(x =>
   String(x.mlId || x.id || x.itemId) === String(id)
  );

  if(!p){
   box.className = "error";
   box.innerHTML = "Produto năo encontrado.";
   return;
  }

  const titulo =
   p.titulo ||
   p.title ||
   "Produto Flux";

  const preco =
   p.preco ||
   p.price ||
   0;

  const imagem =
   p.imagem ||
   p.thumbnail ||
   p.picture ||
   "";

  const vendedor =
   p.vendedor?.nickname ||
   p.seller?.nickname ||
   "Empresa Flux";

  const descricao =
   p.descricao ||
   p.description ||
   "Produto disponível na plataforma Flux.";

  box.className = "product";

  box.innerHTML = `
   <section class="gallery">

    <img
     class="image"
     src="${safe(imagem)}"
     alt="${safe(titulo)}"
     onerror="fallback(this)"
    >

   </section>

   <section class="info">

    <div class="badge">
     Disponível
    </div>

    <h1 class="title">
     ${safe(titulo)}
    </h1>

    <div class="price">
     ${money(preco)}
    </div>

    <div class="seller">
     Vendido por <strong>${safe(vendedor)}</strong>
    </div>

    <div class="desc">
     ${safe(descricao)}
    </div>

    <div class="actions">

     <button
      class="btn buy"
      onclick="comprar('${safe(id)}')"
     >
      Comprar agora
     </button>

     <button
      class="btn cart"
      onclick="adicionarCarrinho(
       '${safe(id)}',
       '${safe(titulo)}',
       '${safe(imagem)}',
       '${safe(preco)}'
      )"
     >
      Adicionar ao carrinho
     </button>

     <button
      class="btn whats"
      onclick="whats(
       '${safe(titulo)}'
      )"
     >
      Chamar no WhatsApp
     </button>

    </div>

   </section>
  `;

 }catch(e){

  document.getElementById("produto").className = "error";

  document.getElementById("produto").innerHTML =
   "Erro ao carregar produto.";

 }

}

function comprar(id){
 location.href =
  "/go/ml/" + encodeURIComponent(id);
}

function adicionarCarrinho(id,nome,imagem,preco){

 let cart =
  JSON.parse(
   localStorage.getItem("flux_cart") || "[]"
  );

 const existe =
  cart.find(x => String(x.id) === String(id));

 if(existe){
  existe.qty += 1;
 }else{
  cart.push({
   id,
   name:nome,
   image:imagem,
   price:Number(preco),
   qty:1
  });
 }

 localStorage.setItem(
  "flux_cart",
  JSON.stringify(cart)
 );

 alert("Produto adicionado ao carrinho");
}

function whats(nome){

 const msg =
  encodeURIComponent(
   "Olá! Tenho interesse no produto:\n\n" +
   nome
  );

 location.href =
  "https://wa.me/" + WHATSAPP + "?text=" + msg;
}

carregar();
</script>

</body>
</html>

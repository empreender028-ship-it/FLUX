<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1.0,user-scalable=no">
<title>FLUX • Fluxo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:Inter,Arial,sans-serif;
 -webkit-tap-highlight-color:transparent;
}

html,body{
 width:100%;
 height:100%;
 overflow:hidden;
 background:#000;
 color:white;
}

body{
 position:fixed;
 inset:0;
}

a{
 text-decoration:none;
 color:inherit;
}

button,input{
 font-family:inherit;
}

button{
 border:0;
 background:none;
 color:inherit;
 cursor:pointer;
}

.app{
 width:100%;
 height:100dvh;
 overflow:hidden;
 background:#000;
 position:relative;
}

.top{
 position:fixed;
 top:0;
 left:0;
 right:0;
 z-index:50;
 padding:14px;
 padding-top:calc(14px + env(safe-area-inset-top));
 display:flex;
 justify-content:space-between;
 align-items:center;
 pointer-events:none;
}

.brand,
.top-actions{
 pointer-events:auto;
}

.brand{
 display:flex;
 align-items:center;
 gap:10px;
}

.mark{
 width:42px;
 height:42px;
 border-radius:17px;
 background:rgba(255,255,255,.08);
 border:1px solid rgba(255,255,255,.12);
 backdrop-filter:blur(22px);

 place-items:center;
}

.mark span{
 width:16px;
 height:16px;

}

.logo{

 font-weight:950;
 letter-spacing:5px;
 background:linear-gradient(90deg,#fff,#00d9ff,#2563ff);

 -webkit-text-fill-color:transparent;
}

.top-actions{
 display:flex;
 gap:8px;
}

.pill{
 height:42px;
 padding:0 13px;
 border-radius:999px;
 background:rgba(0,0,0,.48);
 border:1px solid rgba(255,255,255,.12);
 backdrop-filter:blur(24px);
 font-size:11px;
 font-weight:900;
 display:flex;
 align-items:center;
 gap:7px;
}

.dot{
 width:8px;
 height:8px;
 border-radius:50%;
 background:#18f2a3;
 box-shadow:0 0 16px #18f2a3;
}

.rail{
 width:100%;

 overflow-y:auto;

}

.rail::-webkit-scrollbar{

}

.card{
 position:relative;

 height:100dvh;

 background:#000;
}

.media,
.fake{
 position:absolute;
 inset:0;
 width:100%;
 height:100%;
 object-fit:cover;
 background:#000;
}

.fake{

 place-items:center;

}

.fakeBox{
 width:68vw;
 max-width:340px;
 aspect-ratio:1;
 border-radius:44px;
 display:grid;
 place-items:center;

 font-weight:950;

 border:1px solid rgba(255,255,255,.20);
 backdrop-filter:blur(22px);

}

.overlay{

}

.progress{

 top:0;

 height:3px;
 width:0%;
 z-index:60;
 background:linear-gradient(90deg,#2563ff,#00d9ff);
}

.sound{
 position:absolute;
 top:82px;
 right:14px;
 z-index:40;

 height:52px;
 border-radius:20px;
 background:rgba(0,0,0,.45);

 backdrop-filter:blur(24px);
 font-size:11px;
 font-weight:900;
}

.publish{
 position:absolute;
 top:142px;
 right:14px;
 z-index:40;
 width:52px;
 height:52px;
 border-radius:20px;
 background:linear-gradient(180deg,#2563ff,#00d9ff);
 box-shadow:0 18px 44px rgba(0,217,255,.25);

}

.info{

}

.profile{

}

.avatar{

}

.name{

.tag{

}

.desc{

.cta.dark{

.quick-comment input::placeholder{

.side{

.actBtn.active{

.act span{

.shop-card{

}

}

.shop-card span{

.shop-card button{

 background:linear-gradient(90deg,#2563ff,#00d9ff);

 font-size:11px;
 font-weight:950;
}

.bottom{
 position:fixed;
 left:50%;
 transform:translateX(-50%);
 bottom:9px;
 z-index:60;
 width:min(96%,500px);
 display:grid;
 grid-template-columns:repeat(5,1fr);
 gap:8px;
 padding:8px;
 padding-bottom:calc(8px + env(safe-area-inset-bottom));

 backdrop-filter:blur(34px);

}

.nav{
 min-height:57px;
 border-radius:21px;
 display:flex;
 flex-direction:column;
 align-items:center;
 justify-content:center;
 gap:5px;
 color:#94a3b8;
 font-size:10px;
 font-weight:950;

.nav.active{

 background:linear-gradient(180deg,#2563ff,#00d9ff);
}

.ico{

 height:18px;
 border:2px solid currentColor;

}

.toast{
 position:fixed;
 left:50%;
 bottom:102px;
 transform:translateX(-50%) translateY(14px);
 z-index:100;
 max-width:92%;
 padding:13px 16px;
 border-radius:18px;
 background:rgba(0,0,0,.78);
 border:1px solid rgba(255,255,255,.14);
 backdrop-filter:blur(22px);

.toast.show{

.loader{

 display:grid;

.skeleton{
 position:relative;

<body>

<div class="app">

<header class="top">
 <a class="brand" href="/feed">
  <div class="mark"><span></span></div>
  <div class="logo">FLUX</div>
 </a>

 <div class="top-actions">
  <div class="pill"><span class="dot"></span><span id="liveText">Fluxo</span></div>
 </div>
</header>

<main class="rail" id="rail">
 <div class="skeleton"></div>
</main>

<nav class="bottom">
 <a class="nav" href="/feed"><span class="ico"></span><span>Feed</span></a>
 <a class="nav active" href="/fluxo"><span class="ico"></span><span>Fluxo</span></a>
 <a class="nav" href="/explorar"><span class="ico"></span><span>Buscar</span></a>
 <a class="nav" href="/upload"><span class="ico"></span><span>Criar</span></a>
 <a class="nav" href="/perfil"><span class="ico"></span><span>Perfil</span></a>
</nav>

<div class="toast" id="toast"></div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const rail = document.getElementById("rail");
const toast = document.getElementById("toast");
const liveText = document.getElementById("liveText");

const token = localStorage.getItem("token") || "";

const state = {
 posts: [],
 muted: localStorage.getItem("fluxo_muted") !== "0",
 liked: new Set(JSON.parse(localStorage.getItem("fluxo_liked") || "[]")),
 saved: new Set(JSON.parse(localStorage.getItem("fluxo_saved") || "[]")),
 viewed: new Set(JSON.parse(localStorage.getItem("fluxo_viewed") || "[]"))
};

const fallbackPosts = [
 {
  _id:"demo-fluxo-1",
  empresaNome:"Premium Soles",
  descricao:"Drop premium liberado. Veja, salve e compre direto pela Flux.",
  tag:"STREETWEAR",
  media:"",
  likes:128,
  views:4300,
  link:"/empresa",
  produto:"Coleção Premium",
  preco:"A partir de R$49"
 },
 {
  _id:"demo-fluxo-2",
  empresaNome:"Flux Marketplace",
  descricao:"Transforme vídeos curtos em venda, leads e visibilidade local.",
  tag:"MARKETPLACE",
  media:"",
  likes:84,
  views:2100,
  link:"/marketplace",
  produto:"Vitrine empresarial",
  preco:"Planos Flux"
 }
];

function safe(v){
 return String(v || "")
 .replace(/&/g,"&amp;")
 .replace(/</g,"&lt;")
 .replace(/>/g,"&gt;")
 .replace(/"/g,"&quot;");
}

function compact(n){
 n = Number(n || 0);
 if(n >= 1000000) return (n/1000000).toFixed(1).replace(".0","")+"M";
 if(n >= 1000) return (n/1000).toFixed(1).replace(".0","")+"k";
 return String(n);
}

function initials(name){
 return String(name || "FX").split(" ").map(p=>p[0]).join("").slice(0,2).toUpperCase();
}

function headers(){
 return token ? { Authorization:"Bearer " + token } : {};
}

function mediaUrl(media){
 if(!media) return "";
 if(String(media).startsWith("http")) return media;
 return "/uploads/" + media;
}

function isVideo(src){
 return /\.(mp4|webm|mov|quicktime)$/i.test(src);
}

function showToast(msg){
 toast.textContent = msg;
 toast.classList.add("show");
 clearTimeout(window.toastTimer);
 window.toastTimer = setTimeout(()=>toast.classList.remove("show"),1500);
}

function mediaHTML(post){
 const src = mediaUrl(post.media || "");
 const ini = post.initials || initials(post.empresaNome);

 if(!src){
  return `<div class="fake"><div class="fakeBox">${safe(ini)}</div></div>`;
 }

 if(isVideo(src)){
  return `<video class="media" muted playsinline preload="none" data-src="${safe(src)}"></video>`;
 }

 return `<img class="media" src="${safe(src)}" loading="lazy" decoding="async" alt="${safe(post.empresaNome)}">`;
}

function cardHTML(post,index){
 const id = String(post._id || "post-" + index);
 const liked = state.liked.has(id);
 const saved = state.saved.has(id);
 const name = post.empresaNome || "Empresa Flux";
 const ini = post.initials || initials(name);

 return `
 <section class="card" data-id="${safe(id)}" data-index="${index}">
  <div class="progress"></div>

  ${mediaHTML({...post, initials:ini})}

  <div class="overlay"></div>

  <button class="sound" data-sound>${state.muted ? "OFF" : "ON"}</button>
  <button class="publish" onclick="location.href='/upload'">+</button>

  <div class="info">
   <div class="profile">
    <div class="avatar">${safe(ini)}</div>
    <div>
     <div class="name">${safe(name)}</div>
     <div class="tag">${safe(post.tag || "FLUXO")}</div>
    </div>
   </div>

   <div class="desc">${safe(post.descricao || "Novo conteúdo publicado na Flux.")}</div>

   <div class="ctas">
    <button class="cta" data-open="${safe(post.link || "/empresa")}">Abrir</button>
    <button class="cta dark" data-open="/marketplace">Comprar</button>
   </div>

   <form class="quick-comment" data-comment-form>
    <input placeholder="Comentar rápido" maxlength="90">
    <button type="submit">Enviar</button>
   </form>
  </div>

  <div class="side">
   <div class="act">
    <button class="actBtn ${liked ? "active" : ""}" data-like>${liked ? "♥" : "♡"}</button>
    <span data-like-count>${compact(post.likes || 0)}</span>
   </div>

   <div class="act">
    <button class="actBtn ${saved ? "active" : ""}" data-save>${saved ? "✓" : "+"}</button>
    <span>Salvar</span>
   </div>

   <div class="act">
    <button class="actBtn" data-share>↗</button>
    <span>Enviar</span>
   </div>

   <div class="act">
    <button class="actBtn" data-whats>W</button>
    <span>Whats</span>
   </div>
  </div>

  <div class="shop-card">
   <div>
    <b>${safe(post.produto || "Produto Flux")}</b>
    <span>${safe(post.preco || "Ver detalhes")}</span>
   </div>
   <button data-open="/marketplace">Comprar</button>
  </div>
 </section>`;
}

function render(){
 rail.innerHTML = state.posts.length
  ? state.posts.map(cardHTML).join("")
  : `<div class="loader">Nenhum vídeo no Fluxo ainda</div>`;

 bindCards();
 setupVideos();
}

async function loadFluxo(){
 rail.innerHTML = `<div class="skeleton"></div>`;

 try{
  const res = await fetch("/api/fluxo",{cache:"no-store"});

  if(!res.ok) throw new Error("offline");

  const data = await res.json();

  state.posts = Array.isArray(data) && data.length
   ? data.map(p=>({...p,initials:initials(p.empresaNome)}))
   : fallbackPosts;
 }catch{
  state.posts = fallbackPosts;
 }

 render();
}

function setupVideos(){
 const cards = Array.from(document.querySelectorAll(".card"));

 const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
   const card = entry.target;
   const index = Number(card.dataset.index || 0);
   const currentVideo = card.querySelector("video");

   if(entry.isIntersecting){

    cards.forEach((c,i)=>{
     const v = c.querySelector("video");
     if(!v) return;

     if(i < index - 1 || i > index + 1){
      v.pause();
      v.removeAttribute("src");
      v.load();
     }
    });

    cards.forEach((c,i)=>{
     const v = c.querySelector("video");
     if(!v) return;

     if(i === index || i === index + 1){
      const src = v.dataset.src;
      if(src && !v.src){
       v.src = src;
       v.load();
      }
     }
    });

    document.querySelectorAll("video").forEach(v=>{
     if(v !== currentVideo) v.pause();
    });

    if(currentVideo){
     currentVideo.muted = state.muted;
     currentVideo.play().catch(()=>{});

     const progress = card.querySelector(".progress");

     currentVideo.ontimeupdate = ()=>{
      if(currentVideo.duration && progress){
       progress.style.width = ((currentVideo.currentTime/currentVideo.duration)*100)+"%";
      }
     };
    }

    const id = card.dataset.id;

    if(id && !state.viewed.has(id)){
     state.viewed.add(id);
     localStorage.setItem("fluxo_viewed",JSON.stringify([...state.viewed]));
     hitApi("/api/view/" + id);
    }

   }else{
    if(currentVideo) currentVideo.pause();
   }
  });
 },{threshold:.72});

 cards.forEach(card=>observer.observe(card));
}

function bindCards(){
 document.querySelectorAll(".card").forEach(card=>{
  const id = card.dataset.id;

  const likeBtn = card.querySelector("[data-like]");
  const saveBtn = card.querySelector("[data-save]");
  const shareBtn = card.querySelector("[data-share]");
  const soundBtn = card.querySelector("[data-sound]");
  const whatsBtn = card.querySelector("[data-whats]");
  const openBtns = card.querySelectorAll("[data-open]");
  const form = card.querySelector("[data-comment-form]");

  likeBtn.onclick = async e=>{
   e.stopPropagation();

   if(state.liked.has(id)){
    showToast("Você já curtiu");
    return;
   }

   state.liked.add(id);
   localStorage.setItem("fluxo_liked",JSON.stringify([...state.liked]));

   likeBtn.classList.add("active");
   likeBtn.textContent = "♥";

   const count = card.querySelector("[data-like-count]");
   const res = await hitApi("/api/like/" + id);

   if(res && typeof res.likes !== "undefined" && count){
    count.textContent = compact(res.likes);
   }

   showToast("Curtida enviada");
  };

  saveBtn.onclick = e=>{
   e.stopPropagation();

   if(state.saved.has(id)){
    showToast("Já salvo");
    return;
   }

   state.saved.add(id);
   localStorage.setItem("fluxo_saved",JSON.stringify([...state.saved]));

   saveBtn.classList.add("active");
   saveBtn.textContent = "✓";

   hitApi("/api/save/" + id);
   showToast("Salvo");
  };

  shareBtn.onclick = async e=>{
   e.stopPropagation();

   await hitApi("/api/share/" + id);

   const url = location.origin + "/fluxo#" + id;

   try{
    if(navigator.share){
     await navigator.share({title:"Flux",text:"Veja no Fluxo",url});
    }else{
     await navigator.clipboard.writeText(url);
     showToast("Link copiado");
    }
   }catch{}
  };

  soundBtn.onclick = e=>{
   e.stopPropagation();

   state.muted = !state.muted;
   localStorage.setItem("fluxo_muted",state.muted ? "1" : "0");

   document.querySelectorAll("video").forEach(v=>{
    v.muted = state.muted;
   });

   document.querySelectorAll("[data-sound]").forEach(btn=>{
    btn.textContent = state.muted ? "OFF" : "ON";
   });

   showToast(state.muted ? "Som desligado" : "Som ligado");
  };

  whatsBtn.onclick = e=>{
   e.stopPropagation();
   showToast("WhatsApp da empresa será aberto");
  };

  openBtns.forEach(btn=>{
   btn.onclick = e=>{
    e.stopPropagation();
    location.href = btn.dataset.open || "/empresa";
   };
  });

  if(form){
   form.onsubmit = async e=>{
    e.preventDefault();

    const input = form.querySelector("input");
    const text = input.value.trim();

    if(!text) return;

    input.value = "";
    showToast("Comentário enviado");

    await fetch("/api/comments",{
     method:"POST",
     headers:{
      "Content-Type":"application/json",
      ...headers()
     },
     body:JSON.stringify({
      postId:id,
      usuarioNome:"Usuário Flux",
      texto:text
     })
    }).catch(()=>{});
   };
  }
 });
}

async function hitApi(url){
 try{
  const res = await fetch(url,{method:"POST",headers:headers()});
  return await res.json();
 }catch{
  return null;
 }
}

function startSocket(){
 try{
  const socket = io();

  socket.on("online",total=>{
   liveText.textContent = total + " online";
  });

  socket.on("novo_post",post=>{
   if(post.tipo && post.tipo !== "fluxo") return;

   state.posts.unshift({
    ...post,
    initials:initials(post.empresaNome)
   });

   state.posts = state.posts.slice(0,30);

   render();
   showToast("Novo vídeo no Fluxo");
  });
 }catch{}
}

document.addEventListener("gesturestart",e=>e.preventDefault());

loadFluxo();
startSocket();
</script>

</body>
</html>

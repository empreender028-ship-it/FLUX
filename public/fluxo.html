<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{

html,body{

body{

a{

button{

.app{

.top{

.mark{

.mark span{

.logo{

 font-weight:950;

 background:linear-gradient(90deg,#fff,#00d9ff,#2563ff);

}

.live-pill{

.live-dot{

.card{

.media,
.fake{

 height:100%;

}

.fake{

}

.fakeBox{

.overlay{

.side{

.actBtn.active{

.shop-card{

.bottom{

}

.nav{

 border:1px solid rgba(255,255,255,.08);
}

.nav.active{

.toast{
 position:fixed;
 left:50%;
 bottom:102px;
 transform:translateX(-50%) translateY(14px);
 z-index:100;
 max-width:92%;
 padding:13px 16px;
 border-radius:18px;
 background:rgba(0,0,0,.78);
 border:1px solid rgba(255,255,255,.14);
 backdrop-filter:blur(22px);

 font-weight:950;

}

.toast.show{

}

.loader,
.skeleton{
 height:100dvh;
 display:grid;
 place-items:center;
 font-size:13px;
 font-weight:950;

}

.skeleton{
 background:linear-gradient(90deg,rgba(255,255,255,.04),rgba(255,255,255,.10),rgba(255,255,255,.04));
 background-size:200% 100%;
 animation:shimmer 1.2s infinite;
}

@keyframes shimmer{
 to{background-position:-200% 0}
}

@keyframes commentIn{
 from{opacity:0;transform:translateY(8px)}
 to{opacity:1;transform:translateY(0)}
}

<body>

<div class="app">

<header class="top">
 <a class="brand" href="/feed">
  <div class="mark"><span></span></div>
  <div class="logo">FLUX</div>
 </a>

 <div class="live-pill">
  <span class="live-dot"></span>
  <span id="liveText">Fluxo</span>
 </div>
</header>

<main class="rail" id="rail">
 <div class="skeleton"></div>
</main>

<nav class="bottom">
 <a class="nav" href="/feed">Feed</a>
 <a class="nav active" href="/fluxo">Fluxo</a>
 <a class="nav" href="/explorar">Buscar</a>
 <a class="nav" href="/upload-commerce">Criar</a>
 <a class="nav" href="/empresa.html">Perfil</a>
</nav>

<div class="toast" id="toast"></div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const rail = document.getElementById("rail");
const toast = document.getElementById("toast");
const liveText = document.getElementById("liveText");
const token = localStorage.getItem("token") || "";

const state = {
 posts: [],
 muted: localStorage.getItem("fluxo_muted") !== "0",
 liked: new Set(JSON.parse(localStorage.getItem("fluxo_liked") || "[]")),
 saved: new Set(JSON.parse(localStorage.getItem("fluxo_saved") || "[]")),
 viewed: new Set(JSON.parse(localStorage.getItem("fluxo_viewed") || "[]"))
};

const fallbackPosts = [
 {
  _id:"demo-fluxo-1",
  empresaNome:"Premium Soles",
  descricao:"Drop premium liberado. Veja, salve e compre direto pela Flux.",
  tag:"STREETWEAR",
  media:"",
  likes:128,
  views:4300,
  link:"/empresa.html",
  produto:"ColeÃ§Ã£o Premium",
  preco:"A partir de R$49"
 },
 {
  _id:"demo-fluxo-2",
  empresaNome:"Flux Marketplace",
  descricao:"Transforme vÃ­deos curtos em venda, leads e visibilidade local.",
  tag:"MARKETPLACE",
  media:"",
  likes:84,
  views:2100,
  link:"/marketplace",
  produto:"Vitrine empresarial",
  preco:"Planos Flux"
 }
];

function safe(v){
 return String(v || "")
 .replace(/&/g,"&amp;")
 .replace(/</g,"&lt;")
 .replace(/>/g,"&gt;")
 .replace(/"/g,"&quot;");
}

function compact(n){
 n = Number(n || 0);
 if(n >= 1000000) return (n/1000000).toFixed(1).replace(".0","")+"M";
 if(n >= 1000) return (n/1000).toFixed(1).replace(".0","")+"k";
 return String(n);
}

function initials(name){
 return String(name || "FX").split(" ").map(p=>p[0]).join("").slice(0,2).toUpperCase();
}

function headers(){
 return token ? { Authorization:"Bearer " + token } : {};
}

function mediaUrl(media){
 if(!media) return "";
 if(String(media).startsWith("http") || String(media).startsWith("data:")) return media;
 return "/uploads/" + media;
}

function moneyBR(v){
 const n = Number(v || 0);
 if(!n) return "Ver preço";
 return n.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

function produtoRealHTML(post){
 const nome = post.produtoNome || post.produto || "";
 if(!post.produtoId && !nome) return "";

 const preco = moneyBR(post.produtoPreco);
 const img = post.produtoImagem || post.media || "";
 const link = post.produtoLink || (post.produtoId ? "/flux-produto/" + post.produtoId : "#");

 return `
  <div class="produto-real-fluxo">
   ${img ? `<img src="${safe(img)}">` : ""}
   <div>
    <strong>${safe(nome || "Produto Flux")}</strong>
    <span>${safe(preco)}</span>
   </div>
   <a href="${safe(link)}" target="_blank" rel="noopener">Comprar</a>
  </div>
 `;
}

function isVideo(src){
 return /\.(mp4|webm|mov|quicktime)$/i.test(src);
}

function showToast(msg){
 toast.textContent = msg;
 toast.classList.add("show");
 clearTimeout(window.toastTimer);
 window.toastTimer = setTimeout(()=>toast.classList.remove("show"),1500);
}

function mediaHTML(post){
 const src = mediaUrl(post.media || "");
 const ini = post.initials || initials(post.empresaNome);

 if(!src){
  return `<div class="fake"><div class="fakeBox">${safe(ini)}</div></div>`;
 }

 if(isVideo(src)){
  return `<video class="media" muted playsinline preload="none" data-src="${safe(src)}"></video>`;
 }

 return `<img class="media" src="${safe(src)}" loading="lazy" decoding="async" alt="${safe(post.empresaNome)}">`;
}

function cardHTML(post,index){
 const id = String(post._id || post.id || "post-" + index);
 const liked = state.liked.has(id);
 const saved = state.saved.has(id);
 const name = post.empresaNome || "Empresa Flux";
 const ini = post.initials || initials(name);

 return `
 <section class="card" data-id="${safe(id)}" data-index="${index}">
  <div class="progress"></div>

  ${mediaHTML({...post, initials:ini})}

  <div class="overlay"></div>

  <div class="info">
   <div class="profile">
    <div class="avatar">${safe(ini)}</div>
    <div>
     <div class="name">${safe(name)}</div>
     <div class="tag">${safe(post.tag || "FLUXO")}</div>
    </div>
   </div>

   <div class="desc">${safe(post.descricao || "Novo conteÃºdo publicado na Flux.")}</div>

   <div class="comment-live" data-comments="${safe(id)}"></div>

   <form class="quick-comment" data-comment-form>
    <input placeholder="Comentar rÃ¡pido" maxlength="90">
    <button type="submit">Enviar</button>
   </form>
  </div>

  <div class="side">
   <div class="act">
    <button class="actBtn ${liked ? "active" : ""}" data-like>Curtir</button>
    <span data-like-count>${compact(post.likes || 0)}</span>
   </div>

   <div class="act">
    <button class="actBtn ${saved ? "active" : ""}" data-save>Salvar</button>
    <span>Salvar</span>
   </div>

   <div class="act">
    <button class="actBtn" data-share>Enviar</button>
    <span>Enviar</span>
   </div>

   <div class="act">
    <button class="actBtn" data-sound>${state.muted ? "OFF" : "ON"}</button>
    <span>Som</span>
   </div>
  </div>

  <div class="shop-card">
   <div>
    <b>${safe(post.produtoNome || post.produto || "Produto Flux")}</b>${produtoRealHTML(post)}
    <span>${safe(post.preco || "Ver detalhes")}</span>
   </div>
   <button data-open="${safe(post.link || "/empresa.html")}">Abrir</button>
  </div>
 </section>`;
}

function render(){
 rail.innerHTML = state.posts.length
  ? state.posts.map(cardHTML).join("")
  : `<div class="loader">Nenhum vÃ­deo no Fluxo ainda</div>`;

 bindCards();
 setupVideos();
}

async function loadFluxo(){
 rail.innerHTML = `<div class="skeleton"></div>`;

 try{
  const res = await fetch("/api/for-you?limit=50",{cache:"no-store"});

  if(!res.ok) throw new Error("offline");

  const data = await res.json();

  state.posts = Array.isArray(data) && data.length
   ? data.map(p=>({...p,initials:initials(p.empresaNome)}))
   : fallbackPosts;
 }catch{
  state.posts = fallbackPosts;
 }

 render();
}


function registrarWatchTime(video,postId){

 if(!video || !postId) return;

 let sent = false;

 video.addEventListener("timeupdate",()=>{

  if(sent) return;

  if(!video.duration) return;

  const percent = Math.round(
   (video.currentTime / video.duration) * 100
  );

  if(percent >= 35){

   sent = true;

   fetch("/api/watch/" + postId,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      seconds:Math.round(video.currentTime),
      percent
    })
   }).catch(()=>{});

  }

 });

}

function setupVideos(){
 const cards = Array.from(document.querySelectorAll(".card"));

 const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
   const card = entry.target;
   const index = Number(card.dataset.index || 0);
   const currentVideo = card.querySelector("video");

const postId =
 card.dataset.postId ||
 card.getAttribute("data-post-id");

if(currentVideo && postId){
 registrarWatchTime(currentVideo,postId);
}

   if(entry.isIntersecting){
    cards.forEach((c,i)=>{
     const v = c.querySelector("video");
     if(!v) return;

     if(i < index - 1 || i > index + 1){
      v.pause();
      v.removeAttribute("src");
      v.load();
     }
    });

    cards.forEach((c,i)=>{
     const v = c.querySelector("video");
     if(!v) return;

     if(i === index || i === index + 1){
      const src = v.dataset.src;
      if(src && !v.src){
       v.src = src;
       v.load();
      }
     }
    });

    document.querySelectorAll("video").forEach(v=>{
     if(v !== currentVideo) v.pause();
    });

    if(currentVideo){
     currentVideo.muted = state.muted;
     currentVideo.play().catch(()=>{});

     const progress = card.querySelector(".progress");

     currentVideo.ontimeupdate = ()=>{
      if(currentVideo.duration && progress){
       progress.style.width = ((currentVideo.currentTime/currentVideo.duration)*100)+"%";
      }
     };
    }

    const id = card.dataset.id;

    if(id && !state.viewed.has(id)){
     state.viewed.add(id);
     localStorage.setItem("fluxo_viewed",JSON.stringify([...state.viewed]));
     hitApi("/api/view/" + id);
    }
   }else{
    if(currentVideo) currentVideo.pause();
   }
  });
 },{threshold:.72});

 cards.forEach(card=>observer.observe(card));
}

function adicionarComentarioNaTela(id,nome,texto){
 const box = document.querySelector(`[data-comments="${id}"]`);

 if(!box) return;

 const item = document.createElement("div");
 item.className = "comment-item";
 item.innerHTML = `<b>${safe(nome)}</b>${safe(texto)}`;

 box.prepend(item);

 while(box.children.length > 3){
  box.removeChild(box.lastChild);
 }
}

function bindCards(){
 document.querySelectorAll(".card").forEach(card=>{
  const id = card.dataset.id;

  const likeBtn = card.querySelector("[data-like]");
  const saveBtn = card.querySelector("[data-save]");
  const shareBtn = card.querySelector("[data-share]");
  const soundBtn = card.querySelector("[data-sound]");
  const openBtns = card.querySelectorAll("[data-open]");
  const form = card.querySelector("[data-comment-form]");

  likeBtn.onclick = async e=>{
   e.stopPropagation();

   if(state.liked.has(id)){
    showToast("VocÃª jÃ¡ curtiu");
    return;
   }

   state.liked.add(id);
   localStorage.setItem("fluxo_liked",JSON.stringify([...state.liked]));
   likeBtn.classList.add("active");

   const count = card.querySelector("[data-like-count]");
   const res = await hitApi("/api/like/" + id);

   if(res && typeof res.likes !== "undefined" && count){
    count.textContent = compact(res.likes);
   }

   showToast("Curtida enviada");
  };

  saveBtn.onclick = e=>{
   e.stopPropagation();

   if(state.saved.has(id)){
    showToast("JÃ¡ salvo");
    return;
   }

   state.saved.add(id);
   localStorage.setItem("fluxo_saved",JSON.stringify([...state.saved]));
   saveBtn.classList.add("active");

   hitApi("/api/save/" + id);
   showToast("Salvo");
  };

  shareBtn.onclick = async e=>{
   e.stopPropagation();

   await hitApi("/api/share/" + id);

   const url = location.origin + "/fluxo#" + id;

   try{
    if(navigator.share){
     await navigator.share({title:"Flux",text:"Veja no Fluxo",url});
    }else{
     await navigator.clipboard.writeText(url);
     showToast("Link copiado");
    }
   }catch{}
  };

  soundBtn.onclick = e=>{
   e.stopPropagation();

   state.muted = !state.muted;
   localStorage.setItem("fluxo_muted",state.muted ? "1" : "0");

   document.querySelectorAll("video").forEach(v=>{
    v.muted = state.muted;
   });

   document.querySelectorAll("[data-sound]").forEach(btn=>{
    btn.textContent = state.muted ? "OFF" : "ON";
   });

   showToast(state.muted ? "Som desligado" : "Som ligado");
  };

  openBtns.forEach(btn=>{
   btn.onclick = e=>{
    e.stopPropagation();
    location.href = btn.dataset.open || "/empresa.html";
   };
  });

  if(form){
   form.onsubmit = async e=>{
    e.preventDefault();

    const input = form.querySelector("input");
    const text = input.value.trim();

    if(!text) return;

    input.value = "";
    adicionarComentarioNaTela(id,"VocÃª",text);
    showToast("comentário enviado");

    await fetch("/api/comments",{
     method:"POST",
     headers:{
      "Content-Type":"application/json",
      ...headers()
     },
     body:JSON.stringify({
      postId:id,
      usuarioNome:"UsuÃ¡rio Flux",
      texto:text
     })
    }).catch(()=>{});
   };
  }
 });
}

async function hitApi(url){
 try{
  const res = await fetch(url,{method:"POST",headers:headers()});
  return await res.json();
 }catch{
  return null;
 }
}

function startSocket(){
 try{
  const socket = io();

  socket.on("online",total=>{
   liveText.textContent = total + " online";
  });

  socket.on("novo_post",post=>{
   if(post.tipo && post.tipo !== "fluxo") return;

   state.posts.unshift({
    ...post,
    initials:initials(post.empresaNome)
   });

   state.posts = state.posts.slice(0,30);

   render();
   showToast("Novo vÃ­deo no Fluxo");
  });

  socket.on("novo_comentario",comment=>{
   adicionarComentarioNaTela(
    String(comment.postId),
    comment.usuarioNome || "Flux",
    comment.texto || ""
   );
  });
 }catch{}
}

document.addEventListener("gesturestart",e=>e.preventDefault());

loadFluxo();
startSocket();

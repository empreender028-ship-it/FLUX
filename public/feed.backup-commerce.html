<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>FLUX • Feed</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
 --card:rgba(255,255,255,.055);
 --line:rgba(255,255,255,.09);
 --text:#fff;
 --muted:#94a3b8;
 --primary:#00d9ff;
 --blue:#2563ff;
 --green:#18f2a3;
 --red:#ff4d6d;
}

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 -webkit-tap-highlight-color:transparent;
 font-family:Inter,sans-serif;
}

html,body{
 width:100%;
 min-height:100%;
 overflow-x:hidden;
 scroll-behavior:smooth;
 background:#020617;
 color:white;
}

body{
 background:
 radial-gradient(circle at top left,rgba(37,99,255,.30),transparent 30%),
 radial-gradient(circle at top right,rgba(0,217,255,.16),transparent 30%),
 linear-gradient(180deg,#00194d,#020617 45%,#000);
 padding-bottom:115px;
}

body.light{
 --card:rgba(255,255,255,.92);
 --line:rgba(15,23,42,.10);
 --text:#0f172a;
 --muted:#475569;
 background:#f1f5f9;
 color:#0f172a;
}

button,input,textarea,select{
 font-family:inherit;
}

button{
 border:none;
 cursor:pointer;
}

a{
 color:inherit;
 text-decoration:none;
}

.bg{
 position:fixed;
 inset:0;
 overflow:hidden;
 z-index:0;
 pointer-events:none;
}

.glow{
 position:absolute;
 border-radius:50%;
 filter:blur(110px);
 opacity:.26;
}

.glow1{
 width:340px;
 height:340px;
 background:#2563ff;
 top:-120px;
 left:-120px;
}

.glow2{
 width:280px;
 height:280px;
 background:#00d9ff;
 right:-120px;
 bottom:-120px;
}

.app{
 position:relative;
 z-index:2;
 max-width:760px;
 margin:auto;
 padding:14px;
}

.header{
 position:sticky;
 top:0;
 z-index:100;
 margin:-14px -14px 18px;
 padding:12px 14px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 background:rgba(0,0,0,.52);
 backdrop-filter:blur(24px);
 border-bottom:1px solid rgba(255,255,255,.06);
}

body.light .header{
 background:rgba(255,255,255,.88);
}

.brand{
 display:flex;
 align-items:center;
 gap:12px;
 cursor:pointer;
}

.logo-core{
 width:22px;
 height:22px;
 border:3px solid var(--primary);
 transform:rotate(45deg);
 border-radius:6px;
 box-shadow:0 0 20px var(--primary);
}

.logo{
 font-size:22px;
 font-weight:950;
 letter-spacing:5px;
 background:linear-gradient(90deg,#fff,#00d9ff,#2563ff);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

body.light .logo{
 background:linear-gradient(90deg,#0f172a,#2563ff,#00d9ff);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.actions{
 display:flex;
 gap:8px;
}

.action{
 height:42px;
 padding:0 14px;
 border-radius:16px;
 background:rgba(255,255,255,.06);
 border:1px solid var(--line);
 color:var(--text);
 font-size:12px;
 font-weight:900;
}

.hero{
 margin-bottom:16px;
}

.hero h1{
 font-size:40px;
 font-weight:950;
 line-height:1;
 margin-bottom:10px;
 letter-spacing:-2px;
}

.hero h1 span{
 background:linear-gradient(90deg,#fff,#00d9ff,#2563ff);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

body.light .hero h1 span{
 background:linear-gradient(90deg,#0f172a,#2563ff,#00d9ff);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.hero p{
 color:var(--muted);
 line-height:1.7;
 font-size:14px;
}

.quick-nav{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:8px;
 margin:16px 0 18px;
}

.quick-nav a{
 height:48px;
 border-radius:18px;
 background:rgba(255,255,255,.06);
 border:1px solid var(--line);
 color:var(--text);
 font-size:11px;
 font-weight:950;
 display:flex;
 align-items:center;
 justify-content:center;
 text-align:center;
}

.quick-nav a.active{
 background:linear-gradient(90deg,#2563ff,#00d9ff);
 color:white;
 border:none;
}

.create{
 margin-bottom:18px;
 padding:16px;
 border-radius:30px;
 background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.035));
 border:1px solid rgba(255,255,255,.10);
 backdrop-filter:blur(22px);
 box-shadow:0 26px 80px rgba(0,0,0,.25);
}

body.light .create{
 background:rgba(255,255,255,.94);
 box-shadow:0 22px 60px rgba(15,23,42,.10);
}

.create-top{
 display:flex;
 gap:12px;
 margin-bottom:14px;
}

.avatar{
 width:54px;
 height:54px;
 border-radius:18px;
 object-fit:cover;
 border:1px solid rgba(255,255,255,.08);
 background:linear-gradient(135deg,#2563ff,#00d9ff);
 color:white;
 display:grid;
 place-items:center;
 font-weight:950;
 flex-shrink:0;
 overflow:hidden;
}

.avatar img{
 width:100%;
 height:100%;
 object-fit:cover;
}

.create textarea{
 flex:1;
 min-height:58px;
 max-height:160px;
 resize:none;
 border:none;
 outline:none;
 border-radius:20px;
 background:rgba(255,255,255,.055);
 border:1px solid var(--line);
 padding:16px;
 color:var(--text);
 font-size:14px;
 font-weight:700;
 line-height:1.5;
}

.create-tools{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
 margin-bottom:12px;
}

.create-tools input,
.create-tools select{
 height:48px;
 border:none;
 outline:none;
 border-radius:17px;
 background:rgba(255,255,255,.055);
 border:1px solid var(--line);
 color:var(--text);
 padding:0 13px;
 font-size:12px;
 font-weight:800;
}

.create-tools select option{
 background:#020617;
 color:white;
}

.product-fields{
 display:none;
 grid-template-columns:1fr 1fr;
 gap:10px;
 margin-bottom:12px;
}

.product-fields.show{
 display:grid;
}

.product-fields input{
 height:48px;
 border:none;
 outline:none;
 border-radius:17px;
 background:rgba(255,255,255,.055);
 border:1px solid var(--line);
 color:var(--text);
 padding:0 13px;
 font-size:12px;
 font-weight:800;
}

.preview-area{
 display:none;
 margin-bottom:14px;
 overflow:hidden;
 border-radius:24px;
 border:1px solid var(--line);
 background:rgba(255,255,255,.045);
}

.preview-area img,
.preview-area video{
 width:100%;
 max-height:430px;
 object-fit:cover;
 display:none;
 background:#000;
}

.preview-caption{
 padding:14px;
 color:var(--text);
 font-size:13px;
 line-height:1.6;
 display:none;
}

.create-bottom{
 display:flex;
 justify-content:space-between;
 align-items:center;
 gap:10px;
}

.upload{
 flex:1;
 height:48px;
 border-radius:17px;
 background:rgba(255,255,255,.06);
 border:1px solid var(--line);
 display:flex;
 align-items:center;
 justify-content:center;
 color:var(--text);
 font-size:12px;
 font-weight:900;
 cursor:pointer;
}

.upload input{
 display:none;
}

.publish{
 flex:1;
 height:48px;
 border-radius:17px;
 background:linear-gradient(90deg,#2563ff,#00d9ff);
 color:white;
 font-size:12px;
 font-weight:950;
 box-shadow:0 14px 38px rgba(0,217,255,.18);
}

.feed{
 display:flex;
 flex-direction:column;
 gap:18px;
}

.post{
 overflow:hidden;
 border-radius:34px;
 background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.035));
 border:1px solid rgba(255,255,255,.10);
 backdrop-filter:blur(22px);
 box-shadow:0 26px 80px rgba(0,0,0,.32);
 animation:fade .35s ease;
}

body.light .post{
 background:rgba(255,255,255,.94);
 box-shadow:0 22px 60px rgba(15,23,42,.12);
}

.post-top{
 display:flex;
 justify-content:space-between;
 align-items:center;
 gap:12px;
 padding:16px;
}

.post-user{
 display:flex;
 align-items:center;
 gap:12px;
 min-width:0;
}

.user-name{
 font-size:15px;
 font-weight:950;
 white-space:nowrap;
 overflow:hidden;
 text-overflow:ellipsis;
}

.user-small{
 font-size:11px;
 color:var(--muted);
 margin-top:4px;
 font-weight:800;
}

.badge{
 height:34px;
 padding:0 12px;
 border-radius:999px;
 background:rgba(0,217,255,.10);
 border:1px solid rgba(0,217,255,.24);
 color:var(--primary);
 font-size:10px;
 font-weight:950;
 display:flex;
 align-items:center;
}

.media{
 position:relative;
 width:100%;
 aspect-ratio:9/12.5;
 overflow:hidden;
 background:#000;
 border-top:1px solid rgba(255,255,255,.06);
 border-bottom:1px solid rgba(255,255,255,.06);
}

.media img,
.media video{
 width:100%;
 height:100%;
 object-fit:cover;
 display:block;
}

.media-empty{
 width:100%;
 height:100%;
 display:grid;
 place-items:center;
 background:
 radial-gradient(circle at top,rgba(0,217,255,.20),transparent 28%),
 linear-gradient(135deg,#06111f,#111827);
}

.media-empty span{
 width:68%;
 height:30%;
 border-radius:34px;
 display:grid;
 place-items:center;
 background:rgba(255,255,255,.08);
 border:1px solid rgba(255,255,255,.12);
 color:white;
 font-size:44px;
 font-weight:950;
 letter-spacing:4px;
}

.live,
.views{
 position:absolute;
 top:14px;
 height:32px;
 padding:0 12px;
 border-radius:999px;
 background:rgba(0,0,0,.48);
 backdrop-filter:blur(18px);
 border:1px solid rgba(255,255,255,.12);
 display:flex;
 align-items:center;
 color:white;
 font-size:10px;
 font-weight:950;
}

.live{left:14px}
.views{right:14px}

.product-box{
 margin:14px 16px 0;
 padding:13px;
 border-radius:20px;
 background:rgba(0,217,255,.08);
 border:1px solid rgba(0,217,255,.18);
 display:flex;
 justify-content:space-between;
 align-items:center;
 gap:10px;
}

.product-box b{
 display:block;
 font-size:13px;
}

.product-box span{
 display:block;
 margin-top:3px;
 color:var(--muted);
 font-size:11px;
 font-weight:800;
}

.product-box button{
 height:38px;
 padding:0 13px;
 border-radius:14px;
 background:linear-gradient(90deg,#2563ff,#00d9ff);
 color:white;
 font-size:11px;
 font-weight:950;
}

.post-content{
 padding:16px;
}

.actions-row{
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:9px;
 margin-bottom:14px;
}

.icon-btn{
 height:48px;
 border-radius:17px;
 background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.045));
 border:1px solid var(--line);
 color:var(--text);
 font-size:12px;
 font-weight:950;
}

.icon-btn.active{
 background:rgba(0,217,255,.13);
 border-color:rgba(0,217,255,.32);
 color:var(--primary);
}

.post-desc{
 color:var(--text);
 line-height:1.7;
 font-size:14px;
 margin-bottom:14px;
}

.post-desc b{
 font-weight:950;
}

.post-info{
 display:flex;
 gap:14px;
 flex-wrap:wrap;
 color:var(--muted);
 font-size:12px;
 font-weight:800;
}

.comments-live{
 margin-top:14px;
 display:flex;
 flex-direction:column;
 gap:8px;
}

.comment-item{
 padding:10px 12px;
 border-radius:16px;
 background:rgba(255,255,255,.055);
 border:1px solid rgba(255,255,255,.07);
 font-size:12px;
 line-height:1.5;
 animation:commentIn .22s ease;
}

body.light .comment-item{
 background:rgba(15,23,42,.045);
 border-color:rgba(15,23,42,.09);
}

.comment-item b{
 display:block;
 color:var(--primary);
 font-size:11px;
 margin-bottom:3px;
}

.comment-form{
 display:grid;
 grid-template-columns:1fr 72px;
 gap:8px;
 margin-top:12px;
}

.comment-form input{
 height:46px;
 border:none;
 outline:none;
 border-radius:16px;
 background:rgba(255,255,255,.055);
 border:1px solid var(--line);
 color:var(--text);
 padding:0 14px;
 font-size:13px;
 font-weight:700;
}

.comment-form button{
 border-radius:16px;
 background:linear-gradient(90deg,#2563ff,#00d9ff);
 color:white;
 font-size:11px;
 font-weight:950;
}

.toast{
 position:fixed;
 left:50%;
 bottom:92px;
 transform:translateX(-50%) translateY(14px);
 z-index:9999;
 background:rgba(0,0,0,.78);
 border:1px solid rgba(255,255,255,.12);
 color:white;
 padding:12px 16px;
 border-radius:999px;
 font-size:12px;
 font-weight:900;
 opacity:0;
 transition:.22s;
 pointer-events:none;
}

.toast.show{
 opacity:1;
 transform:translateX(-50%) translateY(0);
}

.bottom-nav{
 position:fixed;
 left:50%;
 bottom:10px;
 transform:translateX(-50%);
 width:calc(100% - 20px);
 max-width:680px;
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:8px;
 padding:9px;
 background:rgba(2,6,23,.92);
 backdrop-filter:blur(24px);
 border:1px solid rgba(255,255,255,.08);
 border-radius:26px;
 z-index:999;
}

.bottom-nav a{
 text-align:center;
 color:#94a3b8;
 text-decoration:none;
 font-size:10px;
 font-weight:950;
 padding:10px 4px;
 border-radius:16px;
}

.bottom-nav a.active{
 background:linear-gradient(90deg,#2563ff,#00d9ff);
 color:white;
}

@keyframes fade{
 from{opacity:0;transform:translateY(20px)}
 to{opacity:1;transform:none}
}

@keyframes commentIn{
 from{opacity:0;transform:translateY(8px)}
 to{opacity:1;transform:translateY(0)}
}

@media(max-width:760px){
 .hero h1{font-size:34px}
 .media{aspect-ratio:9/13}
 .create{border-radius:28px}
 .quick-nav{grid-template-columns:repeat(4,1fr)}
 .create-tools,.product-fields{grid-template-columns:1fr}
}

@media(min-width:900px){
 body{padding-bottom:40px}
 .bottom-nav{display:none}
}
</style>
</head>

<body>

<div class="bg">
 <div class="glow glow1"></div>
 <div class="glow glow2"></div>
</div>

<div class="app">

<header class="header">
 <div class="brand" onclick="location.href='/feed'">
  <div class="logo-core"></div>
  <div class="logo">FLUX</div>
 </div>

 <div class="actions">
  <button class="action" onclick="toggleTheme()">Tema</button>
  <button class="action" onclick="location.href='/alertas'">Notificação</button>
 </div>
</header>

<section class="hero">
 <h1>Feed <span>Flux</span></h1>
 <p>Poste conteúdo, produto no marketplace, legenda e comentários ao vivo.</p>
</section>

<nav class="quick-nav">
 <a href="/marketplace">Marketplace</a>
 <a href="/buscar">Buscar</a>
 <a href="/fluxo">Fluxo</a>
 <a href="/alertas">Notificação</a>
</nav>

<section class="create" id="createBox">
 <div class="create-top">
  <img class="avatar" id="myAvatar" src="https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?q=80&w=400&auto=format&fit=crop">

  <textarea
   id="postText"
   placeholder="Escreva uma legenda, oferta ou novidade..."
   oninput="previewLegenda()"></textarea>
 </div>

 <div class="create-tools">
  <select id="postType" onchange="toggleProductFields()">
   <option value="post">Post comum</option>
   <option value="produto">Produto no marketplace</option>
  </select>

  <input id="categoriaPost" placeholder="Categoria ou nicho">
 </div>

 <div class="product-fields" id="productFields">
  <input id="produtoNome" placeholder="Nome do produto">
  <input id="produtoPreco" placeholder="Preço">
 </div>

 <div class="preview-area" id="previewArea">
  <img id="previewImage">
  <video id="previewVideo" controls muted playsinline></video>
  <div class="preview-caption" id="previewCaption"></div>
 </div>

 <div class="create-bottom">
  <label class="upload">
   Selecionar mídia
   <input type="file" id="mediaInput" accept="image/*,video/*" onchange="previewMedia(event)">
  </label>

  <button class="publish" onclick="publicar()">Publicar</button>
 </div>
</section>

<section class="feed" id="feed"></section>

</div>

<nav class="bottom-nav">
 <a href="/marketplace">Marketplace</a>
 <a href="/buscar">Buscar</a>
 <a href="/fluxo" class="active">Fluxo</a>
 <a href="/alertas">Notificação</a>
</nav>

<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>

<script>
const FEED = document.getElementById("feed");
const token = localStorage.getItem("token") || "";

let POSTS = [];
let selectedMedia = "";
let selectedMediaType = "";
let liked = new Set(JSON.parse(localStorage.getItem("flux_liked") || "[]"));
let saved = new Set(JSON.parse(localStorage.getItem("flux_saved") || "[]"));

function toggleTheme(){
 document.body.classList.toggle("light");
 localStorage.setItem("flux_theme",document.body.classList.contains("light") ? "light" : "dark");
}

if(localStorage.getItem("flux_theme") === "light"){
 document.body.classList.add("light");
}

function toast(msg){
 const t = document.getElementById("toast");
 t.innerText = msg;
 t.classList.add("show");
 clearTimeout(window.toastTimer);
 window.toastTimer = setTimeout(()=>t.classList.remove("show"),1500);
}

function safe(text=""){
 return String(text)
 .replace(/&/g,"&amp;")
 .replace(/</g,"&lt;")
 .replace(/>/g,"&gt;")
 .replace(/"/g,"&quot;");
}

function compact(n=0){
 n = Number(n);
 if(n >= 1000000) return (n/1000000).toFixed(1)+"M";
 if(n >= 1000) return (n/1000).toFixed(1)+"k";
 return String(n);
}

function initials(name){
 return String(name || "FX").split(" ").filter(Boolean).map(p=>p[0]).join("").slice(0,2).toUpperCase();
}

function headers(){
 return token ? { Authorization:"Bearer " + token } : {};
}

function toggleProductFields(){
 const type = document.getElementById("postType").value;
 document.getElementById("productFields").classList.toggle("show",type === "produto");
}

function mediaHTML(post){
 const src = post.media || "";

 if(!src){
  return `<div class="media-empty"><span>${safe(initials(post.nome || post.empresaNome))}</span></div>`;
 }

 const video = /\.(mp4|mov|webm)$/i.test(src) || post.mediaType === "video";

 if(video){
  return `<video src="${safe(src)}" controls muted loop playsinline></video>`;
 }

 return `<img src="${safe(src)}" loading="lazy">`;
}

function productHTML(post){
 if(post.tipo !== "produto") return "";

 return `
  <div class="product-box">
   <div>
    <b>${safe(post.produtoNome || "Produto Flux")}</b>
    <span>${safe(post.produtoPreco || "Ver preço")}</span>
   </div>
   <button onclick="location.href='/marketplace'">Comprar</button>
  </div>
 `;
}

function postHTML(post){
 const id = String(post.id || post._id || Date.now());
 const isLiked = liked.has(id);
 const isSaved = saved.has(id);
 const nome = post.nome || post.empresaNome || "Usuário Flux";
 const badge = post.tipo === "produto" ? "MARKETPLACE" : "AO VIVO";

 return `
 <article class="post" data-id="${safe(id)}">
  <div class="post-top">
   <div class="post-user">
    <img class="avatar" src="${safe(post.logo || localStorage.getItem("empresa_avatar") || "https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?q=80&w=400&auto=format&fit=crop")}">

    <div>
     <div class="user-name">${safe(nome)}</div>
     <div class="user-small">${safe(post.segmento || post.categoria || "Creator")} • agora</div>
    </div>
   </div>

   <div class="badge">${badge}</div>
  </div>

  <div class="media">
   ${mediaHTML(post)}
   <div class="live">${badge}</div>
   <div class="views">${compact(post.views || 0)} views</div>
  </div>

  ${productHTML(post)}

  <div class="post-content">
   <div class="actions-row">
    <button class="icon-btn ${isLiked ? "active" : ""}" onclick="curtir('${safe(id)}',this)">Curtir</button>
    <button class="icon-btn" onclick="focarComentario(this)">Comentar</button>
    <button class="icon-btn ${isSaved ? "active" : ""}" onclick="salvar('${safe(id)}',this)">Salvar</button>
   </div>

   <div class="post-desc">
    <b>${safe(nome)}</b> ${safe(post.texto || "")}
   </div>

   <div class="post-info">
    <span>${compact(post.likes || 0)} curtidas</span>
    <span>${compact(post.comments || 0)} comentários</span>
    <span>${compact(post.views || 0)} visualizações</span>
   </div>

   <div class="comments-live" data-comments="${safe(id)}">
    <div class="comment-item">
     <b>Flux</b>
     ${post.tipo === "produto" ? "Produto publicado no marketplace" : "Postagem em alta agora"}
    </div>
   </div>

   <form class="comment-form" onsubmit="comentar(event,'${safe(id)}')">
    <input placeholder="Comentar ao vivo..." maxlength="120">
    <button type="submit">Enviar</button>
   </form>
  </div>
 </article>
 `;
}

function render(){
 FEED.innerHTML = POSTS.map(postHTML).join("");
}

function carregar(){
 const localPosts = JSON.parse(localStorage.getItem("flux_posts") || "[]");

function previewLegenda(){
 const text = document.getElementById("postText").value.trim();
 const area = document.getElementById("previewArea");
 const caption = document.getElementById("previewCaption");

 if(text){
  area.style.display = "block";
  caption.style.display = "block";
  caption.innerText = text;
 }else if(!selectedMedia){
  caption.style.display = "none";
  area.style.display = "none";
 }else{
  caption.style.display = "none";
 }
}

function previewMedia(event){
 const file = event.target.files[0];

 if(!file) return;

 const area = document.getElementById("previewArea");
 const img = document.getElementById("previewImage");
 const video = document.getElementById("previewVideo");
 const reader = new FileReader();

 area.style.display = "block";

 reader.onload = e=>{
  selectedMedia = e.target.result;

  if(file.type.startsWith("video")){
   selectedMediaType = "video";
   video.src = selectedMedia;
   video.style.display = "block";
   img.style.display = "none";
  }else{
   selectedMediaType = "image";
   img.src = selectedMedia;
   img.style.display = "block";
   video.style.display = "none";
  }

  previewLegenda();
 };

 reader.readAsDataURL(file);
}

function salvarProdutoMarketplace(produto){
 const produtos = JSON.parse(localStorage.getItem("empresa_produtos") || "[]");

 produtos.unshift({
  id:produto.id,
  nome:produto.produtoNome,
  preco:produto.produtoPreco,
  desc:produto.texto,
  img:produto.media,
  empresa:produto.nome,
  categoria:produto.categoria,
  createdAt:new Date().toISOString()
 });

 localStorage.setItem("empresa_produtos",JSON.stringify(produtos));

 fetch("/api/produtos",{
  method:"POST",
  headers:{
   "Content-Type":"application/json",
   ...headers()
  },
  body:JSON.stringify(produtos[0])
 }).catch(()=>{});
}

function publicar(){
 const texto = document.getElementById("postText").value.trim();
 const tipo = document.getElementById("postType").value;
 const categoria = document.getElementById("categoriaPost").value.trim();
 const produtoNome = document.getElementById("produtoNome").value.trim();
 const produtoPreco = document.getElementById("produtoPreco").value.trim();

 if(!texto && !selectedMedia){
  toast("Escreva algo ou selecione uma mídia");
  return;
 }

 if(tipo === "produto" && (!produtoNome || !produtoPreco)){
  toast("Preencha nome e preço do produto");
  return;
 }

 const novo = {
  id:"local-" + Date.now(),
  nome:localStorage.getItem("empresa_nome") || "Você",
  segmento:localStorage.getItem("empresa_segmento") || "Creator",
  categoria:categoria || localStorage.getItem("empresa_categoria") || "Marketplace",
  texto,
  tipo,
  produtoNome,
  produtoPreco,
  media:selectedMedia,
  mediaType:selectedMediaType,
  logo:localStorage.getItem("empresa_avatar") || "https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?q=80&w=400&auto=format&fit=crop",
  likes:0,
  comments:0,
  views:1,
  createdAt:new Date().toISOString()
 };

 POSTS.unshift(novo);
 localStorage.setItem("flux_posts",JSON.stringify(POSTS.slice(0,50)));

 if(tipo === "produto"){
  salvarProdutoMarketplace(novo);
 }

 render();

 fetch("/api/posts",{
  method:"POST",
  headers:{
   "Content-Type":"application/json",
   ...headers()
  },
  body:JSON.stringify(novo)
 }).catch(()=>{});

 limparPostagem();
 toast(tipo === "produto" ? "Produto publicado no marketplace" : "Publicado");
}

function limparPostagem(){
 selectedMedia = "";
 selectedMediaType = "";

 document.getElementById("postText").value = "";
 document.getElementById("mediaInput").value = "";
 document.getElementById("categoriaPost").value = "";
 document.getElementById("produtoNome").value = "";
 document.getElementById("produtoPreco").value = "";
 document.getElementById("postType").value = "post";
 document.getElementById("productFields").classList.remove("show");

 document.getElementById("previewArea").style.display = "none";
 document.getElementById("previewImage").style.display = "none";
 document.getElementById("previewVideo").style.display = "none";
 document.getElementById("previewImage").src = "";
 document.getElementById("previewVideo").src = "";
 document.getElementById("previewCaption").innerText = "";
 document.getElementById("previewCaption").style.display = "none";
}

function curtir(id,btn){
 if(liked.has(id)){
  toast("Você já curtiu");
  return;
 }

 liked.add(id);
 localStorage.setItem("flux_liked",JSON.stringify([...liked]));
 btn.classList.add("active");

 fetch("/api/like/" + id,{
  method:"POST",
  headers:headers()
 }).catch(()=>{});

 toast("Curtida enviada");
}

function salvar(id,btn){
 saved.add(id);
 localStorage.setItem("flux_saved",JSON.stringify([...saved]));
 btn.classList.add("active");
 toast("Post salvo");
}

function focarComentario(btn){
 const post = btn.closest(".post");
 const input = post.querySelector(".comment-form input");

 if(input) input.focus();
}

function adicionarComentarioNaTela(id,nome,texto){
 const box = document.querySelector(`[data-comments="${id}"]`);

 if(!box) return;

 const item = document.createElement("div");
 item.className = "comment-item";
 item.innerHTML = `<b>${safe(nome)}</b>${safe(texto)}`;

 box.prepend(item);

 while(box.children.length > 4){
  box.removeChild(box.lastChild);
 }
}

function comentar(e,id){
 e.preventDefault();

 const input = e.target.querySelector("input");
 const texto = input.value.trim();

 if(!texto) return;

 input.value = "";
 adicionarComentarioNaTela(id,"Você",texto);

 fetch("/api/comments",{
  method:"POST",
  headers:{
   "Content-Type":"application/json",
   ...headers()
  },
  body:JSON.stringify({
   postId:id,
   usuarioNome:"Usuário Flux",
   texto
  })
 }).catch(()=>{});

 toast("Comentário enviado");
}

function startSocket(){
 try{
  const socket = io();

  socket.on("novo_post",post=>{
   POSTS.unshift(post);
   localStorage.setItem("flux_posts",JSON.stringify(POSTS.slice(0,50)));
   render();
   toast("Nova postagem ao vivo");
  });

  socket.on("novo_comentario",comment=>{
   adicionarComentarioNaTela(
    String(comment.postId),
    comment.usuarioNome || "Flux",
    comment.texto || ""
   );
  });
 }catch(error){}
}

document.addEventListener("DOMContentLoaded",()=>{
 const avatar = localStorage.getItem("empresa_avatar");

 if(avatar){
  document.getElementById("myAvatar").src = avatar;
 }

 carregar();
 startSocket();
});
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Buscar • Flux</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
 --card:rgba(15,23,42,.78);
 --line:rgba(255,255,255,.09);
 --primary:#00d9ff;
 --secondary:#2563ff;
 --text:#fff;
 --muted:#94a3b8;
}

body.light{
 --card:rgba(255,255,255,.92);
 --line:rgba(15,23,42,.10);
 --text:#0f172a;
 --muted:#475569;
 background:#f1f5f9;
}

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 -webkit-tap-highlight-color:transparent;
 font-family:Inter,sans-serif;
}

html,body{
 width:100%;
 min-height:100%;
 overflow-x:hidden;
 background:#020617;
 color:var(--text);
}

body{
 padding-bottom:108px;
 background:
 radial-gradient(circle at 10% 0%,rgba(0,217,255,.18),transparent 28%),
 radial-gradient(circle at 90% 10%,rgba(37,99,255,.22),transparent 30%),
 linear-gradient(135deg,#020617,#000814,#000);
}

.bg{
 position:fixed;
 inset:0;
 pointer-events:none;
 z-index:0;
 overflow:hidden;
}

.glow{
 position:absolute;
 border-radius:50%;
 filter:blur(110px);
 opacity:.32;
}

.glow1{
 width:280px;
 height:280px;
 background:#2563ff;
 top:-120px;
 left:-120px;
}

.glow2{
 width:240px;
 height:240px;
 background:#00d9ff;
 right:-120px;
 bottom:-120px;
}

.app{
 position:relative;
 z-index:2;
 width:100%;
 max-width:1180px;
 margin:auto;
 padding:14px;
}

.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 gap:12px;
 margin-bottom:18px;
}

.brand{
 display:flex;
 align-items:center;
 gap:12px;
 cursor:pointer;
}

.flux-logo{
 width:24px;
 height:24px;
 display:flex;
 align-items:center;
 justify-content:center;
 transform:rotate(45deg);
 border:3px solid var(--primary);
 border-radius:7px;
 box-shadow:0 0 18px rgba(0,217,255,.75);
}

.flux-core{
 width:7px;
 height:7px;
 background:var(--primary);
 border-radius:2px;
 box-shadow:0 0 14px rgba(0,217,255,1);
}

.brand-text{
 font-size:23px;
 font-weight:900;
 letter-spacing:4px;
 background:linear-gradient(90deg,#fff,#00d9ff,#2563ff);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.actions{
 display:flex;
 gap:8px;
}

.btn{
 height:46px;
 padding:0 16px;
 border:none;
 border-radius:15px;
 cursor:pointer;
 font-size:13px;
 font-weight:900;
 color:#fff;
}

.btn-primary{
 background:linear-gradient(90deg,#2563ff,#00d9ff);
 box-shadow:0 12px 35px rgba(0,217,255,.18);
}

.btn-dark{
 background:rgba(255,255,255,.055);
 border:1px solid var(--line);
 color:var(--text);
}

.hero{
 padding:18px;
 border:1px solid var(--line);
 border-radius:28px;
 background:rgba(255,255,255,.035);
 backdrop-filter:blur(18px);
 box-shadow:0 18px 55px rgba(0,0,0,.25);
}

.kicker{
 display:inline-flex;
 padding:8px 12px;
 border-radius:999px;
 background:rgba(0,217,255,.08);
 border:1px solid rgba(0,217,255,.18);
 color:#c8f7ff;
 font-size:11px;
 font-weight:900;
 margin-bottom:14px;
}

.title{
 font-size:34px;
 font-weight:900;
 line-height:1.04;
 letter-spacing:-1.5px;
 max-width:720px;
}

.title span{
 background:linear-gradient(90deg,#fff,#00d9ff,#2563ff);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.subtitle{
 margin-top:12px;
 color:var(--muted);
 font-size:14px;
 line-height:1.7;
 max-width:720px;
}

.search-area{
 margin-top:20px;
 display:grid;
 grid-template-columns:1fr;
 gap:10px;
}

.search-wrap{
 position:relative;
}

.search{
 width:100%;
 height:58px;
 border:none;
 outline:none;
 border-radius:20px;
 padding:0 50px 0 18px;
 background:rgba(2,6,23,.68);
 border:1px solid rgba(255,255,255,.09);
 color:white;
 font-size:15px;
}

body.light .search{
 background:#fff;
 color:#0f172a;
}

.search:focus{
 border-color:rgba(0,217,255,.48);
 box-shadow:0 0 0 4px rgba(0,217,255,.08);
}

.clear{
 position:absolute;
 right:12px;
 top:50%;
 transform:translateY(-50%);
 width:32px;
 height:32px;
 border:none;
 border-radius:50%;
 background:rgba(255,255,255,.08);
 color:white;
 font-size:14px;
 display:none;
 cursor:pointer;
}

.result-info{
 margin:18px 2px 12px;
 color:var(--muted);
 font-size:13px;
 font-weight:700;
}

.grid{
 display:grid;
 grid-template-columns:1fr;
 gap:14px;
}

.card{
 background:var(--card);
 border:1px solid rgba(255,255,255,.075);
 border-radius:26px;
 overflow:hidden;
 backdrop-filter:blur(20px);
 box-shadow:0 16px 50px rgba(0,0,0,.28);
}

.cover{
 width:100%;
 height:190px;
 object-fit:cover;
 display:block;
 background:#0f172a;
}

.content{
 padding:16px;
}

.content h3{
 font-size:16px;
 margin-bottom:7px;
}

.content p{
 color:var(--muted);
 line-height:1.6;
 font-size:13px;
 margin-bottom:14px;
}

.tags{
 display:flex;
 flex-wrap:wrap;
 gap:7px;
 margin-bottom:14px;
}

.tags span{
 padding:7px 10px;
 border-radius:999px;
 background:rgba(255,255,255,.055);
 border:1px solid rgba(255,255,255,.07);
 color:var(--muted);
 font-size:11px;
 font-weight:800;
}

.card-actions{
 display:flex;
 gap:10px;
}

.card-btn{
 flex:1;
 height:46px;
 border:none;
 border-radius:15px;
 cursor:pointer;
 font-size:13px;
 font-weight:900;
}

.follow{
 background:linear-gradient(90deg,#2563ff,#00d9ff);
 color:white;
}

.follow.active{
 background:rgba(0,255,163,.12);
 color:#9fffd6;
 border:1px solid rgba(0,255,163,.22);
}

.profile{
 background:rgba(255,255,255,.055);
 border:1px solid var(--line);
 color:var(--text);
}

.empty{
 display:none;
 margin-top:16px;
 padding:26px;
 border-radius:24px;
 background:var(--card);
 border:1px solid var(--line);
 color:var(--muted);
 text-align:center;
 font-size:14px;
}

.bottom-nav{
 position:fixed;
 left:50%;
 transform:translateX(-50%);
 bottom:10px;
 width:calc(100% - 20px);
 max-width:680px;
 display:flex;
 justify-content:space-around;
 align-items:center;
 padding:9px;
 background:rgba(2,6,23,.92);
 backdrop-filter:blur(24px);
 border:1px solid rgba(255,255,255,.08);
 border-radius:26px;
 z-index:999;
}

.nav-item{
 display:flex;
 flex-direction:column;
 align-items:center;
 gap:6px;
 color:#94a3b8;
 text-decoration:none;
 font-size:10px;
 font-weight:900;
 padding:8px 7px;
 border-radius:15px;
 min-width:54px;
}

.nav-dot{
 width:6px;
 height:6px;
 border-radius:50%;
 background:rgba(148,163,184,.6);
}

.nav-item.active{
 color:var(--primary);
 background:rgba(0,217,255,.08);
}

.nav-item.active .nav-dot{
 background:var(--primary);
 box-shadow:0 0 12px rgba(0,217,255,.9);
}

.toast{
 position:fixed;
 left:50%;
 bottom:94px;
 transform:translateX(-50%) translateY(16px);
 z-index:1000;
 padding:12px 16px;
 border-radius:999px;
 background:rgba(2,6,23,.95);
 border:1px solid rgba(0,217,255,.20);
 color:#dff9ff;
 font-size:12px;
 font-weight:800;
 opacity:0;
 transition:.22s;
 pointer-events:none;
}

.toast.show{
 opacity:1;
 transform:translateX(-50%) translateY(0);
}

@media(min-width:760px){
 .app{padding:22px}
 .title{font-size:46px}
 .hero{padding:24px;border-radius:34px}
 .search-area{grid-template-columns:1fr auto}
 .search{height:64px;border-radius:23px}
 .btn{height:64px;border-radius:23px}
 .grid{grid-template-columns:repeat(2,1fr);gap:18px}
 .cover{height:210px}
}

@media(min-width:1100px){
 .grid{grid-template-columns:repeat(3,1fr)}
}

@media(max-width:760px){
 .actions{display:none}
}
</style>
</head>

<body>

<div class="bg">
 <div class="glow glow1"></div>
 <div class="glow glow2"></div>
</div>

<div class="app">

<header class="header">
 <div class="brand" onclick="location.href='/feed'">
  <div class="flux-logo">
   <div class="flux-core"></div>
  </div>
  <div class="brand-text">FLUX</div>
 </div>

 <div class="actions">
  <button class="btn btn-dark" onclick="location.href='/feed'">Feed</button>
  <button class="btn btn-dark" onclick="location.href='/fluxo'">Fluxo</button>
  <button class="btn btn-dark" onclick="toggleTheme()">Tema</button>
  <button class="btn btn-primary" onclick="location.href='/painel'">Publicar</button>
 </div>
</header>

<section class="hero">
 <div class="kicker">Busca inteligente da Flux</div>

 <h1 class="title">
  Descubra empresas, pessoas e <span>oportunidades.</span>
 </h1>

 <p class="subtitle">
  Encontre marcas, criadores, produtos, serviços e negócios dentro da plataforma Flux.
 </p>

 <div class="search-area">
  <div class="search-wrap">
   <input class="search" id="searchInput" placeholder="Buscar empresa, produto, serviço ou pessoa...">
   <button class="clear" id="clearBtn" onclick="limpar()">x</button>
  </div>

  <button class="btn btn-primary" onclick="buscar()">Buscar</button>
 </div>
</section>

<div class="result-info" id="resultInfo">Mostrando resultados em destaque</div>

<section class="grid" id="grid"></section>

<div class="empty" id="empty">
 Nenhum resultado encontrado.
</div>

</div>

<nav class="bottom-nav">
 <a href="/feed" class="nav-item">
  <span class="nav-dot"></span>
  <span>Feed</span>
 </a>

 <a href="/buscar" class="nav-item active">
  <span class="nav-dot"></span>
  <span>Buscar</span>
 </a>

 <a href="/fluxo" class="nav-item">
  <span class="nav-dot"></span>
  <span>Fluxo</span>
 </a>

 <a href="/painel" class="nav-item">
  <span class="nav-dot"></span>
  <span>Painel</span>
 </a>

 <a href="/empresa.html" class="nav-item">
  <span class="nav-dot"></span>
  <span>Perfil</span>
 </a>
</nav>

<div class="toast" id="toast"></div>

<script>
const itens = [
 {
  nome:"Premium Soles",
  desc:"Moda feminina streetwear premium.",
  imagem:"https://images.unsplash.com/photo-1529139574466-a303027c1d8b?q=70&w=900&auto=format&fit=crop",
  tags:["moda","streetwear","premium"],
  link:"/empresa.html?user=premiumsoles"
 },
 {
  nome:"Studio Viral",
  desc:"Marketing, vídeos curtos e campanhas virais.",
  imagem:"https://images.unsplash.com/photo-1557804506-669a67965ba0?q=70&w=900&auto=format&fit=crop",
  tags:["marketing","viral","serviço"],
  link:"/empresa.html?user=studioviral"
 },
 {
  nome:"Urban Kicks",
  desc:"Marca urbana em crescimento dentro da Flux.",
  imagem:"https://images.unsplash.com/photo-1491553895911-0055eca6402d?q=70&w=900&auto=format&fit=crop",
  tags:["urbano","moda","premium"],
  link:"/empresa.html?user=urbankicks"
 },
 {
  nome:"Fornecedor Premium",
  desc:"Fornecedores para lojas de moda, beleza e embalagem.",
  imagem:"https://images.unsplash.com/photo-1607082349566-187342175e2f?q=70&w=900&auto=format&fit=crop",
  tags:["fornecedor","embalagem","atacado"],
  link:"/fluxo"
 }
];

const grid = document.getElementById("grid");
const input = document.getElementById("searchInput");
const empty = document.getElementById("empty");
const resultInfo = document.getElementById("resultInfo");
const clearBtn = document.getElementById("clearBtn");

function render(lista){
 grid.innerHTML = "";

 lista.forEach(function(item){
  grid.innerHTML += `
   <article class="card">
    <img class="cover" src="${item.imagem}" loading="lazy" alt="${item.nome}">

    <div class="content">
     <h3>${item.nome}</h3>
     <p>${item.desc}</p>

     <div class="tags">
      ${item.tags.map(function(t){ return `<span>#${t}</span>`; }).join("")}
     </div>

     <div class="card-actions">
      <button class="card-btn follow" onclick="seguir(this,'${item.nome}')">Seguir</button>
      <button class="card-btn profile" onclick="abrir('${item.link}')">Abrir</button>
     </div>
    </div>
   </article>
  `;
 });

 empty.style.display = lista.length ? "none" : "block";

 resultInfo.innerText = lista.length
  ? lista.length + " resultado(s) encontrado(s)"
  : "Nenhum resultado encontrado";
}

function buscar(){
 const q = input.value.trim().toLowerCase();
 clearBtn.style.display = q ? "block" : "none";

 const filtrados = itens.filter(function(item){
  return [
   item.nome,
   item.desc,
   ...item.tags
  ].join(" ").toLowerCase().includes(q);
 });

 render(filtrados);
}

function limpar(){
 input.value = "";
 clearBtn.style.display = "none";
 render(itens);
 input.focus();
}

function seguir(btn,nome){
 btn.classList.toggle("active");
 btn.innerText = btn.classList.contains("active") ? "Seguindo" : "Seguir";
 toast(btn.classList.contains("active") ? "Seguindo " + nome : "Parou de seguir");
}

function abrir(link){
 location.href = link;
}

function toggleTheme(){
 document.body.classList.toggle("light");

 localStorage.setItem(
  "flux_theme",
  document.body.classList.contains("light") ? "light" : "dark"
 );
}

if(localStorage.getItem("flux_theme") === "light"){
 document.body.classList.add("light");
}

function toast(msg){
 const t = document.getElementById("toast");
 t.innerText = msg;
 t.classList.add("show");

 setTimeout(function(){
  t.classList.remove("show");
 },1600);
}

input.addEventListener("input",buscar);

input.addEventListener("keydown",function(e){
 if(e.key === "Enter"){
  buscar();
 }
});

render(itens);
</script>

</body>
</html>

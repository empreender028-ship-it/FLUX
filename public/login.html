<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1.0,user-scalable=no">
<title>Flux • Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif;-webkit-tap-highlight-color:transparent}
body{
 min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;color:#fff;overflow:hidden;
 background:#020617;
}
.bg{position:fixed;inset:0;background:
 radial-gradient(circle at 20% 10%,rgba(0,217,255,.32),transparent 32%),
 radial-gradient(circle at 85% 85%,rgba(37,99,255,.36),transparent 36%),
 linear-gradient(180deg,#020617,#000);z-index:0}
.bg:before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:44px 44px;mask-image:linear-gradient(to bottom,#000,transparent)}
.orb{position:fixed;width:260px;height:260px;border-radius:50%;filter:blur(80px);background:#00d9ff;opacity:.22;animation:float 7s ease-in-out infinite alternate;z-index:1}
.orb.two{right:-80px;bottom:-80px;background:#2563ff;animation-delay:1s}
@keyframes float{from{transform:translateY(-20px)}to{transform:translateY(25px)}}

.app{width:100%;max-width:440px;position:relative;z-index:5}
.logo{text-align:center;margin-bottom:24px}
.mark{width:92px;height:92px;margin:auto;border-radius:32px;display:grid;place-items:center;background:linear-gradient(145deg,rgba(255,255,255,.16),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.14);box-shadow:0 0 70px rgba(0,217,255,.25)}
.mark span{width:38px;height:38px;border:4px solid #00d9ff;transform:rotate(45deg);box-shadow:0 0 24px rgba(0,217,255,.55)}
.logo h1{margin-top:14px;font-size:42px;font-weight:900;letter-spacing:8px;background:linear-gradient(90deg,#fff,#7dd3fc,#2563ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo p{font-size:12px;color:#94a3b8;font-weight:900;letter-spacing:2px;text-transform:uppercase}

.card{
 background:rgba(3,8,23,.72);backdrop-filter:blur(28px);
 border:1px solid rgba(255,255,255,.13);border-radius:36px;padding:28px;
 box-shadow:0 35px 100px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.08)
}
.subtitle{text-align:center;color:#cbd5e1;font-size:15px;line-height:1.5;margin-bottom:24px}
label{display:block;font-size:11px;font-weight:900;color:#94a3b8;margin:0 0 8px;letter-spacing:1px}
.inputWrap{position:relative}
input{
 width:100%;height:62px;border:1px solid rgba(255,255,255,.10);outline:none;padding:0 18px;border-radius:22px;
 background:rgba(255,255,255,.06);color:white;font-size:15px;margin-bottom:16px;transition:.2s
}
input:focus{border-color:#00d9ff;box-shadow:0 0 0 4px rgba(0,217,255,.10)}
input::placeholder{color:#64748b}
.row{display:flex;justify-content:space-between;gap:12px;margin-bottom:18px}
.row a,.footer a{color:#67e8f9;font-size:13px;font-weight:900;text-decoration:none}

button{
 width:100%;height:62px;border:none;border-radius:22px;
 background:linear-gradient(90deg,#2563ff,#00d9ff);
 color:white;font-size:16px;font-weight:900;cursor:pointer;
 box-shadow:0 18px 48px rgba(0,217,255,.28);transition:.2s
}
button:active{transform:scale(.98)}
button:disabled{opacity:.75}
.footer{text-align:center;margin-top:20px;color:#94a3b8;font-size:13px}
.secure{margin-top:16px;text-align:center;color:#64748b;font-size:12px;font-weight:700}
.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:linear-gradient(90deg,#2563ff,#00d9ff);color:white;padding:14px 18px;border-radius:999px;font-weight:900;z-index:9999;box-shadow:0 15px 40px rgba(0,217,255,.35);display:none}
.toast.show{display:block}
@media(max-width:420px){body{padding:16px}.card{padding:24px;border-radius:32px}.logo h1{font-size:36px}}
</style>
</head>

<body>
<div class="bg"></div>
<div class="orb"></div>
<div class="orb two"></div>

<main class="app">
 <div class="logo">
  <div class="mark"><span></span></div>
  <h1>FLUX</h1>
  <p>Business Network</p>
 </div>

 <section class="card">
  <div class="subtitle">Entre na sua central inteligente e acompanhe tudo em tempo real.</div>

  <form id="loginForm">
   <label>EMAIL</label>
   <input id="email" type="email" placeholder="seu@email.com" autocomplete="email">

   <label>SENHA</label>
   <input id="senha" type="password" placeholder="••••••••" autocomplete="current-password">

   <div class="row">
    <a href="/recuperar">Esqueci minha senha</a>
    <a href="/cadastro">Criar conta</a>
   </div>

   <button type="submit" id="loginBtn">Entrar na Flux</button>
  </form>

  <div class="secure">Acesso protegido • Feed, Fluxo e Marketplace integrados</div>

  <div class="footer">Flux © 2026 • <a href="/feed">Ir para o Feed</a></div>
 </section>
</main>

<div class="toast" id="toast"></div>

<script>
const form = document.getElementById("loginForm");
const loginBtn = document.getElementById("loginBtn");
const emailInput = document.getElementById("email");
const senhaInput = document.getElementById("senha");
const toastBox = document.getElementById("toast");

const DESTINO_APOS_LOGIN = "/feed";

function toast(msg){
 toastBox.textContent = msg;
 toastBox.classList.add("show");
 setTimeout(()=>toastBox.classList.remove("show"),2200);
}

form.addEventListener("submit", async (e)=>{
 e.preventDefault();

 const email = emailInput.value.trim();
 const senha = senhaInput.value.trim();

 if(!email || !senha){
  toast("Preencha email e senha");
  return;
 }

 loginBtn.disabled = true;
 loginBtn.textContent = "Entrando...";

 try{
  const response = await fetch("/empresa/login",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({email, senha})
  });

  const data = await response.json();

  if(data && data.token){
   localStorage.setItem("token", data.token);
   localStorage.setItem("empresa", JSON.stringify(data.empresa || {}));

   toast("Login realizado");

   setTimeout(()=>{
    window.location.href = DESTINO_APOS_LOGIN;
   },600);

  }else{
   toast(data.erro || "Login inválido");
   loginBtn.disabled = false;
   loginBtn.textContent = "Entrar na Flux";
  }

 }catch(err){
  console.log(err);
  toast("Erro ao conectar");
  loginBtn.disabled = false;
  loginBtn.textContent = "Entrar na Flux";
 }
});
</script>
</body>
</html>

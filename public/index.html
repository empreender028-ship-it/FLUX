<!-- SUBSTITUA SOMENTE O SCRIPT FINAL -->

<script src="/socket.io/socket.io.js"></script>

<script>
const feed = document.querySelector(".feed");

let POSTS = [];
let page = 0;
let loadingPosts = false;
let ended = false;

const socket = io();

function safe(text=""){
 return String(text)
 .replace(/</g,"&lt;")
 .replace(/>/g,"&gt;");
}

function compact(num=0){
 num = Number(num);

 if(num >= 1000000){
  return (num/1000000).toFixed(1)+"M";
 }

 if(num >= 1000){
  return (num/1000).toFixed(1)+"k";
 }

 return num;
}

function mediaHTML(post){

 if(!post.media){
  return `
   <div style="
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
    linear-gradient(135deg,#2563ff,#00d9ff);
    font-size:48px;
    font-weight:900;
   ">
    FX
   </div>
  `;
 }

 const media =
 post.media.startsWith("http")
 ? post.media
 : "/uploads/" + post.media;

 const isVideo =
 /\.(mp4|webm|mov)$/i.test(media);

 if(isVideo){

  return `
   <video
   src="${media}"
   autoplay
   muted
   loop
   playsinline></video>
  `;

 }

 return `
  <img
  src="${media}"
  loading="lazy">
 `;
}

function postHTML(post){

 return `

 <article class="post" data-id="${post._id}">

  <div class="post-header">

   <div class="user">

    <img
    src="${
     post.avatar ||
     'https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?q=80&w=500&auto=format&fit=crop'
    }">

    <div>

     <div class="user-name">
      ${safe(post.nome || "Flux")}
     </div>

     <div class="user-small">
      ${safe(post.tempo || "Agora")}
     </div>

    </div>

   </div>

   <button class="post-menu">
    ⋯
   </button>

  </div>

  <div class="post-media">

   ${mediaHTML(post)}

   <div class="post-type">
    ${post.tipo || "Flux"}
   </div>

  </div>

  <div class="post-actions">

   <div class="actions-left">

    <button
    class="action like-btn"
    onclick="toggleLike('${post._id}',this)">

     ♥
    </button>

    <button
    class="action"
    onclick="commentPost('${post._id}')">

     ⌲
    </button>

    <button
    class="action"
    onclick="sharePost('${post._id}')">

     ↗
    </button>

   </div>

   <div class="views">

    ${compact(post.views || 0)} views

   </div>

  </div>

  <div class="post-content">

   <div class="likes">
    <span id="likes-${post._id}">
     ${compact(post.likes || 0)}
    </span>
    curtidas
   </div>

   <div class="caption">

    <strong>
     ${safe(post.nome || "Flux")}
    </strong>

    ${safe(post.descricao || "")}

   </div>

   <div
   class="comment-link"
   onclick="commentPost('${post._id}')">

    Ver comentários

   </div>

  </div>

 </article>

 `;
}

async function getFeed(){

 if(loadingPosts || ended) return;

 loadingPosts = true;

 try{

  const res =
  await fetch(`/api/feed?page=${page}`);

  const data =
  await res.json();

  if(!data.length){

   ended = true;
   return;

  }

  POSTS.push(...data);

  renderPosts(data,true);

  page++;

 }catch(err){

  console.log(err);

 }

 loadingPosts = false;
}

function renderPosts(posts,append=false){

 const html =
 posts.map(postHTML).join("");

 if(append){

  feed.insertAdjacentHTML(
   "beforeend",
   html
  );

 }else{

  feed.innerHTML = html;

 }

}

async function toggleLike(id,btn){

 btn.classList.toggle("active");

 try{

  const res =
  await fetch(`/api/like/${id}`,{
   method:"POST"
  });

  const data =
  await res.json();

  const likes =
  document.getElementById(
   `likes-${id}`
  );

  if(likes){

   likes.innerText =
   compact(data.likes || 0);

  }

 }catch(err){

  console.log(err);

 }

}

function commentPost(id){

 window.location.href =
 `/post/${id}`;

}

async function sharePost(id){

 const url =
 location.origin + "/post/" + id;

 try{

  if(navigator.share){

   await navigator.share({
    title:"Flux",
    url
   });

  }else{

   await navigator.clipboard
   .writeText(url);

   alert("Link copiado");

  }

 }catch{}

}

function loading(state){

 if(state){

  if(!feed) return; feed.innerHTML = `

  <div style="
   display:flex;
   flex-direction:column;
   gap:20px;
  ">

   ${Array(3).fill(`
    <div style="
     height:480px;
     border-radius:32px;
     background:
     linear-gradient(
      90deg,
      rgba(255,255,255,.04),
      rgba(255,255,255,.07),
      rgba(255,255,255,.04)
     );
     background-size:200% 100%;
     animation:shine 1.2s linear infinite;
    "></div>
   `).join("")}

  </div>

  `;

 }

}

window.addEventListener("scroll",()=>{

 if(
  window.innerHeight +
  window.scrollY >=
  document.body.offsetHeight - 900
 ){

  getFeed();

 }

});

socket.on("novo_post",post=>{

 POSTS.unshift(post);

 feed.insertAdjacentHTML(
  "afterbegin",
  postHTML(post)
 );

});

socket.on("like_update",data=>{

 const likes =
 document.getElementById(
  `likes-${data.postId}`
 );

 if(likes){

  likes.innerText =
  compact(data.likes);

 }

});

document.addEventListener(
 "DOMContentLoaded",
 async()=>{

  loading(true);

  await getFeed();

  loading(false);

 });

</script>

<style>

@keyframes shine{
 from{
  background-position:200% 0;
 }
 to{
  background-position:-200% 0;
 }
}

.post{
 animation:fade .35s ease;
}

@keyframes fade{
 from{
  opacity:0;
  transform:translateY(20px);
 }
 to{
  opacity:1;
  transform:none;
 }
}

.post-media video{
 width:100%;
 height:100%;
 object-fit:cover;
}

.like-btn.active{
 background:
 linear-gradient(
 180deg,
 #ff2f7d,
 #ff4d6d
 ) !important;
}

</style>

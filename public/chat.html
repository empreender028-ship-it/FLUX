<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Flux • Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:Inter,sans-serif;
 -webkit-tap-highlight-color:transparent;
}

:root{
 --bg:#020617;
 --panel:rgba(15,23,42,.82);
 --panel2:rgba(2,6,23,.92);
 --line:rgba(255,255,255,.08);
 --text:#fff;
 --muted:#94a3b8;
 --primary:#00d9ff;
 --blue:#2563ff;
 --green:#00ffa3;
 --danger:#ff4d6d;
}

body.light{
 --bg:#f1f5f9;
 --panel:rgba(255,255,255,.92);
 --panel2:rgba(255,255,255,.96);
 --line:rgba(15,23,42,.12);
 --text:#0f172a;
 --muted:#475569;
}

html,
body{
 width:100%;
 height:100%;
 overflow:hidden;
 background:#020617;
 color:var(--text);
}

body{
 background:
 radial-gradient(circle at 10% 0%,rgba(0,217,255,.16),transparent 30%),
 radial-gradient(circle at 90% 10%,rgba(37,99,255,.20),transparent 32%),
 linear-gradient(135deg,#020617,#000814,#000);
}

body.light{
 background:#f1f5f9;
}

.app{
 height:100dvh;
 display:flex;
 position:relative;
 overflow:hidden;
}

/* SIDEBAR */

.sidebar{
 width:360px;
 min-width:360px;
 background:rgba(2,6,23,.86);
 backdrop-filter:blur(20px);
 border-right:1px solid var(--line);
 display:flex;
 flex-direction:column;
 z-index:2;
}

body.light .sidebar{
 background:rgba(255,255,255,.92);
}

.sidebar-top{
 padding:18px;
 border-bottom:1px solid var(--line);
}

.brand-row{
 display:flex;
 align-items:center;
 justify-content:space-between;
 margin-bottom:16px;
}

.brand-left{
 display:flex;
 align-items:center;
 gap:12px;
 cursor:pointer;
}

.logo{
 width:25px;
 height:25px;
 border:3px solid var(--primary);
 border-radius:7px;
 transform:rotate(45deg);
 box-shadow:0 0 22px rgba(0,217,255,.75);
}

.brand{
 font-size:25px;
 font-weight:950;
 letter-spacing:4px;
 background:linear-gradient(90deg,#fff,var(--primary),var(--blue));
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

body.light .brand{
 background:linear-gradient(90deg,#0f172a,var(--primary),var(--blue));
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.top-actions{
 display:flex;
 gap:8px;
}

.new-btn,
.theme-btn{
 width:42px;
 height:42px;
 border:1px solid rgba(0,217,255,.22);
 border-radius:15px;
 background:rgba(255,255,255,.055);
 color:var(--text);
 cursor:pointer;
 font-weight:950;
}

.new-btn{
 font-size:22px;
}

.theme-btn{
 font-size:12px;
}

.search{
 height:48px;
 display:flex;
 align-items:center;
 gap:10px;
 padding:0 14px;
 border:1px solid var(--line);
 border-radius:17px;
 background:rgba(255,255,255,.045);
}

.search input{
 flex:1;
 border:none;
 outline:none;
 background:transparent;
 color:var(--text);
 font-size:14px;
}

.search span{
 color:var(--muted);
}

.chat-list{
 flex:1;
 overflow:auto;
 padding:10px;
}

.chat-list::-webkit-scrollbar,
.messages::-webkit-scrollbar{
 width:0;
 height:0;
}

.chat{
 display:flex;
 gap:12px;
 padding:13px;
 border-radius:20px;
 cursor:pointer;
 transition:.18s;
 border:1px solid transparent;
}

.chat:hover,
.chat.active{
 background:linear-gradient(135deg,rgba(0,217,255,.08),rgba(37,99,255,.08));
 border-color:rgba(0,217,255,.18);
}

.avatar-wrap{
 position:relative;
 flex:0 0 auto;
}

.avatar{
 width:50px;
 height:50px;
 border-radius:17px;
 object-fit:cover;
 background:#0f172a;
}

.status-dot{
 position:absolute;
 right:-1px;
 bottom:-1px;
 width:13px;
 height:13px;
 border-radius:50%;
 background:var(--green);
 border:3px solid #020617;
}

body.light .status-dot{
 border-color:#fff;
}

.chat-info{
 flex:1;
 min-width:0;
}

.chat-head{
 display:flex;
 justify-content:space-between;
 gap:8px;
}

.chat h4{
 font-size:14px;
 font-weight:900;
 white-space:nowrap;
 overflow:hidden;
 text-overflow:ellipsis;
}

.time{
 font-size:11px;
 color:var(--muted);
 white-space:nowrap;
}

.chat p{
 margin-top:5px;
 font-size:12px;
 color:var(--muted);
 white-space:nowrap;
 overflow:hidden;
 text-overflow:ellipsis;
}

.badge{
 margin-top:8px;
 min-width:20px;
 height:20px;
 padding:0 6px;
 border-radius:999px;
 background:linear-gradient(90deg,var(--blue),var(--primary));
 display:grid;
 place-items:center;
 font-size:11px;
 font-weight:900;
 color:#fff;
}

/* CHAT AREA */

.chat-area{
 flex:1;
 display:flex;
 flex-direction:column;
 background:rgba(2,6,23,.40);
 z-index:1;
}

body.light .chat-area{
 background:rgba(255,255,255,.35);
}

.header{
 height:72px;
 padding:12px 18px;
 display:flex;
 align-items:center;
 justify-content:space-between;
 border-bottom:1px solid var(--line);
 background:rgba(2,6,23,.78);
 backdrop-filter:blur(18px);
}

body.light .header{
 background:rgba(255,255,255,.88);
}

.user{
 display:flex;
 align-items:center;
 gap:12px;
 min-width:0;
}

.back{
 display:none;
 border:none;
 background:rgba(255,255,255,.07);
 color:var(--text);
 width:38px;
 height:38px;
 border-radius:13px;
 font-size:22px;
 cursor:pointer;
}

.user img{
 width:46px;
 height:46px;
 border-radius:16px;
 object-fit:cover;
 background:#0f172a;
}

.user h3{
 font-size:15px;
 font-weight:950;
 white-space:nowrap;
 overflow:hidden;
 text-overflow:ellipsis;
 max-width:190px;
}

.online{
 margin-top:2px;
 font-size:12px;
 color:var(--green);
}

.header-actions{
 display:flex;
 gap:8px;
}

.icon-btn{
 width:40px;
 height:40px;
 border-radius:14px;
 border:1px solid var(--line);
 background:rgba(255,255,255,.045);
 color:var(--text);
 cursor:pointer;
 font-weight:900;
}

.messages{
 flex:1;
 overflow:auto;
 padding:18px;
 display:flex;
 flex-direction:column;
 gap:10px;
 scroll-behavior:smooth;
}

.day{
 align-self:center;
 font-size:11px;
 color:var(--muted);
 padding:7px 12px;
 border:1px solid var(--line);
 border-radius:999px;
 background:rgba(255,255,255,.04);
 margin:4px 0 8px;
}

.msg{
 max-width:68%;
 padding:12px 14px;
 border-radius:20px;
 font-size:14px;
 line-height:1.45;
 word-break:break-word;
 animation:pop .18s ease;
}

@keyframes pop{
 from{opacity:0;transform:translateY(6px)}
 to{opacity:1;transform:translateY(0)}
}

.me{
 align-self:flex-end;
 background:linear-gradient(135deg,var(--blue),var(--primary));
 color:#fff;
 border-bottom-right-radius:6px;
 box-shadow:0 12px 35px rgba(0,217,255,.14);
}

.other{
 align-self:flex-start;
 background:rgba(255,255,255,.075);
 border:1px solid rgba(255,255,255,.08);
 border-bottom-left-radius:6px;
}

body.light .other{
 background:#fff;
}

.msg small{
 display:block;
 margin-top:6px;
 opacity:.66;
 font-size:10px;
 text-align:right;
}

.typing{
 display:none;
 align-self:flex-start;
 margin-left:18px;
 margin-bottom:6px;
 padding:10px 13px;
 border-radius:18px;
 background:rgba(255,255,255,.07);
 color:var(--muted);
 font-size:12px;
}

.composer{
 padding:12px 14px 14px;
 border-top:1px solid var(--line);
 background:rgba(2,6,23,.82);
 backdrop-filter:blur(18px);
}

body.light .composer{
 background:rgba(255,255,255,.90);
}

.preview{
 display:none;
 margin-bottom:9px;
 padding:10px 12px;
 border-radius:14px;
 background:rgba(0,217,255,.08);
 border:1px solid rgba(0,217,255,.16);
 color:#dff9ff;
 font-size:12px;
}

body.light .preview{
 color:#0f172a;
}

.input-box{
 display:flex;
 align-items:center;
 gap:8px;
}

.input-box input{
 flex:1;
 height:50px;
 padding:0 15px;
 border:none;
 border-radius:18px;
 outline:none;
 background:rgba(255,255,255,.07);
 color:var(--text);
 font-size:15px;
}

body.light .input-box input{
 background:rgba(15,23,42,.06);
}

.send-btn{
 height:50px;
 padding:0 18px;
 border:none;
 border-radius:18px;
 cursor:pointer;
 background:linear-gradient(90deg,var(--blue),var(--primary));
 color:#fff;
 font-weight:950;
}

/* INFO */

.info-panel{
 width:300px;
 background:rgba(2,6,23,.88);
 border-left:1px solid var(--line);
 backdrop-filter:blur(20px);
 padding:18px;
 display:flex;
 flex-direction:column;
 gap:16px;
 z-index:2;
}

body.light .info-panel{
 background:rgba(255,255,255,.92);
}

.profile-card{
 padding:18px;
 border-radius:26px;
 background:rgba(255,255,255,.055);
 border:1px solid var(--line);
 text-align:center;
}

.profile-card img{
 width:78px;
 height:78px;
 object-fit:cover;
 border-radius:26px;
 margin-bottom:12px;
}

.profile-card h3{
 font-size:17px;
 font-weight:950;
}

.profile-card p{
 color:var(--muted);
 font-size:12px;
 margin-top:6px;
}

.stat-grid{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
}

.stat{
 padding:14px;
 border-radius:18px;
 background:rgba(255,255,255,.05);
 border:1px solid var(--line);
}

.stat b{
 font-size:18px;
}

.stat span{
 display:block;
 margin-top:4px;
 color:var(--muted);
 font-size:11px;
}

.ai-box{
 padding:16px;
 border-radius:22px;
 background:rgba(0,217,255,.06);
 border:1px solid rgba(0,217,255,.14);
}

.ai-box h4{
 font-size:13px;
 margin-bottom:8px;
}

.ai-box p{
 font-size:12px;
 color:#c8f7ff;
 line-height:1.45;
}

body.light .ai-box p{
 color:#2563ff;
}

/* NAV MOBILE */

.bottom-nav{
 display:none;
}

@media(max-width:900px){

 .app{
  display:block;
 }

 .sidebar{
  position:absolute;
  inset:0;
  width:100%;
  min-width:100%;
  transform:translateX(0);
  transition:.24s ease;
 }

 .chat-area{
  position:absolute;
  inset:0;
  transform:translateX(100%);
  transition:.24s ease;
 }

 .app.open .sidebar{
  transform:translateX(-100%);
 }

 .app.open .chat-area{
  transform:translateX(0);
 }

 .back{
  display:block;
 }

 .info-panel{
  display:none;
 }

 .header{
  height:68px;
  padding:10px 12px;
 }

 .header-actions .icon-btn:first-child{
  display:none;
 }

 .messages{
  padding:14px;
  padding-bottom:12px;
 }

 .msg{
  max-width:84%;
  font-size:14px;
 }

 .composer{
  padding:10px;
  padding-bottom:82px;
 }

 .input-box input{
  height:50px;
 }

 .send-btn{
  height:50px;
  padding:0 15px;
 }

 .sidebar-top{
  padding:16px 14px;
 }

 .chat-list{
  padding:8px;
 }

 .chat{
  padding:12px;
 }

 .bottom-nav{
  position:fixed;
  left:50%;
  bottom:10px;
  transform:translateX(-50%);
  width:calc(100% - 20px);
  max-width:680px;
  display:flex;
  justify-content:space-around;
  gap:8px;
  padding:9px;
  border-radius:26px;
  background:rgba(2,6,23,.92);
  backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.08);
  z-index:50;
 }

 .bottom-nav a{
  flex:1;
  text-align:center;
  color:#94a3b8;
  text-decoration:none;
  font-size:11px;
  font-weight:900;
  padding:9px 4px;
  border-radius:16px;
 }

 .bottom-nav a.active{
  background:linear-gradient(90deg,var(--blue),var(--primary));
  color:white;
 }
}

@media(max-width:390px){
 .brand{
  font-size:22px;
 }

 .avatar{
  width:46px;
  height:46px;
 }

 .chat h4{
  font-size:13px;
 }

 .send-btn{
  padding:0 13px;
 }
}
</style>
</head>

<body>

<div class="app" id="app">

<aside class="sidebar">

 <div class="sidebar-top">

  <div class="brand-row">

   <div class="brand-left" onclick="location.href='/feed'">
    <div class="logo"></div>
    <div class="brand">FLUX</div>
   </div>

   <div class="top-actions">
    <button class="theme-btn" onclick="toggleTheme()">Tema</button>
    <button class="new-btn" onclick="newChat()">+</button>
   </div>

  </div>

  <div class="search">
   <span>⌕</span>
   <input id="search" placeholder="Buscar conversas..." oninput="filterChats()">
  </div>

 </div>

 <div class="chat-list" id="chatList"></div>

</aside>

<main class="chat-area">

 <header class="header">

  <div class="user">

   <button class="back" onclick="closeMobile()">‹</button>

   <img id="avatar" src="" alt="Contato">

   <div>
    <h3 id="name">Selecione uma conversa</h3>
    <div class="online" id="statusText">online agora</div>
   </div>

  </div>

  <div class="header-actions">
   <button class="icon-btn" onclick="location.href='/feed'">⌂</button>
   <button class="icon-btn" onclick="fakeCall()">☎</button>
   <button class="icon-btn" onclick="clearChat()">×</button>
  </div>

 </header>

 <section class="messages" id="messages">
  <div class="day">Hoje</div>
 </section>

 <div class="typing" id="typing">
  digitando...
 </div>

 <footer class="composer">

  <div class="preview" id="preview"></div>

  <div class="input-box">
   <input id="msg" placeholder="Digite sua mensagem..." oninput="showPreview()" onkeydown="enterSend(event)">
   <button class="send-btn" onclick="send()">Enviar</button>
  </div>

 </footer>

</main>

<aside class="info-panel">

 <div class="profile-card">
  <img id="panelAvatar" src="" alt="Perfil">
  <h3 id="panelName">Flux</h3>
  <p>Contato ativo dentro da Flux</p>
 </div>

 <div class="stat-grid">
  <div class="stat">
   <b id="totalMsgs">0</b>
   <span>mensagens</span>
  </div>

  <div class="stat">
   <b>98%</b>
   <span>engajamento</span>
  </div>
 </div>

 <div class="ai-box">
  <h4>Flux IA</h4>
  <p id="aiText">Essa conversa parece comercial. Responda rápido e tente fechar hoje.</p>
 </div>

</aside>

<nav class="bottom-nav">
 <a href="/feed">Feed</a>
 <a href="/buscar">Buscar</a>
 <a href="/chat" class="active">Chat</a>
 <a href="/fluxo">Fluxo</a>
 <a href="/perfil">Perfil</a>
</nav>

</div>

<script>
let socket;

try{
 socket = io();
}catch{
 socket = null;
}

function toggleTheme(){
 document.body.classList.toggle("light");

 localStorage.setItem(
  "flux_theme",
  document.body.classList.contains("light") ? "light" : "dark"
 );
}

if(localStorage.getItem("flux_theme") === "light"){
 document.body.classList.add("light");
}

const chats = {
 premium:{
  name:"Premium Soles",
  avatar:"https://images.unsplash.com/photo-1523398002811-999ca8dec234?auto=format&fit=crop&w=300&q=70",
  last:"Vamos fechar parceria hoje",
  online:true,
  unread:2
 },
 urban:{
  name:"Urban Street",
  avatar:"https://images.unsplash.com/photo-1529139574466-a303027c1d8b?auto=format&fit=crop&w=300&q=70",
  last:"Atualizar coleção urgente",
  online:true,
  unread:1
 },
 flux:{
  name:"Equipe Flux",
  avatar:"https://images.unsplash.com/photo-1551434678-e076c223a692?auto=format&fit=crop&w=300&q=70",
  last:"Seu feed está ficando muito bom",
  online:false,
  unread:0
 }
};

let currentChat = "premium";

function getMessages(id){
 const saved = localStorage.getItem("flux_chat_" + id);
 if(saved) return JSON.parse(saved);

 const demo = [
  {text:"Oi, tudo bem? Vi sua loja dentro da Flux.",from:"other",time:"22:01"},
  {text:"Tudo sim. Quero entender melhor como funciona.",from:"me",time:"22:02"},
  {text:chats[id].last,from:"other",time:"22:03"}
 ];

 localStorage.setItem("flux_chat_" + id,JSON.stringify(demo));
 return demo;
}

function saveMessages(id,data){
 localStorage.setItem("flux_chat_" + id,JSON.stringify(data));
}

function renderChats(){
 const list = document.getElementById("chatList");
 list.innerHTML = "";

 Object.keys(chats).forEach(id=>{
  const c = chats[id];

  const div = document.createElement("div");
  div.className = "chat " + (id === currentChat ? "active":"");
  div.dataset.name = c.name.toLowerCase();
  div.onclick = () => openChat(id);

  div.innerHTML = `
   <div class="avatar-wrap">
    <img class="avatar" src="${c.avatar}" loading="lazy" alt="${c.name}">
    ${c.online ? '<div class="status-dot"></div>' : ''}
   </div>

   <div class="chat-info">
    <div class="chat-head">
     <h4>${c.name}</h4>
     <span class="time">agora</span>
    </div>
    <p>${c.last}</p>
   </div>

   ${c.unread ? `<div class="badge">${c.unread}</div>` : ""}
  `;

  list.appendChild(div);
 });
}

function openChat(id){
 currentChat = id;
 chats[id].unread = 0;

 const c = chats[id];

 document.getElementById("name").innerText = c.name;
 document.getElementById("avatar").src = c.avatar;
 document.getElementById("panelAvatar").src = c.avatar;
 document.getElementById("panelName").innerText = c.name;
 document.getElementById("statusText").innerText = c.online ? "online agora" : "visto recentemente";

 document.getElementById("app").classList.add("open");

 renderChats();
 loadMessages();
}

function closeMobile(){
 document.getElementById("app").classList.remove("open");
}

function loadMessages(){
 const box = document.getElementById("messages");
 const data = getMessages(currentChat);

 box.innerHTML = `<div class="day">Hoje</div>`;

 data.forEach(m=>addMsg(m.text,m.from === "me",m.time,false));

 document.getElementById("totalMsgs").innerText = data.length;

 scrollBottom();
}

function addMsg(text,me,time,save=true){
 const box = document.getElementById("messages");
 const div = document.createElement("div");

 div.className = "msg " + (me ? "me":"other");
 div.innerHTML = `${escapeHtml(text)}<small>${time || now()} ${me ? "✓✓" : ""}</small>`;

 box.appendChild(div);
 scrollBottom();

 if(save){
  const data = getMessages(currentChat);

  data.push({
   text,
   from:me ? "me":"other",
   time:time || now()
  });

  saveMessages(currentChat,data);

  chats[currentChat].last = text;

  document.getElementById("totalMsgs").innerText = data.length;

  renderChats();
 }
}

function send(){
 const input = document.getElementById("msg");
 const text = input.value.trim();

 if(!text) return;

 addMsg(text,true);

 input.value = "";
 document.getElementById("preview").style.display = "none";

 if(socket){
  socket.emit("message:send",{chatId:currentChat,text});
 }

 fakeReply();
}

function fakeReply(){
 const typing = document.getElementById("typing");
 typing.style.display = "block";

 setTimeout(()=>{
  typing.style.display = "none";

  const replies = [
   "Perfeito. Me manda mais detalhes.",
   "Gostei disso. Podemos fechar hoje.",
   "A Flux está ficando muito forte.",
   "Isso vai ajudar bastante nas vendas.",
   "Ficou bem profissional."
  ];

  const reply = replies[Math.floor(Math.random()*replies.length)];

  addMsg(reply,false);
 },700);
}

if(socket){
 socket.on("message:receive",(msg)=>{
  if(msg.chatId === currentChat){
   addMsg(msg.text,false);
  }
 });
}

function showPreview(){
 const val = document.getElementById("msg").value.trim();
 const preview = document.getElementById("preview");

 if(!val){
  preview.style.display = "none";
  return;
 }

 preview.style.display = "block";
 preview.innerText = "Prévia: " + val;
}

function enterSend(e){
 if(e.key === "Enter"){
  e.preventDefault();
  send();
 }
}

function filterChats(){
 const q = document.getElementById("search").value.toLowerCase();

 document.querySelectorAll(".chat").forEach(chat=>{
  chat.style.display = chat.dataset.name.includes(q) ? "flex":"none";
 });
}

function clearChat(){
 if(!currentChat) return;

 if(!confirm("Limpar esta conversa?")) return;

 localStorage.removeItem("flux_chat_" + currentChat);

 loadMessages();
}

function newChat(){
 const id = "chat_" + Date.now();

 chats[id] = {
  name:"Novo contato",
  avatar:"https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=300&q=70",
  last:"Conversa criada agora",
  online:true,
  unread:0
 };

 currentChat = id;

 renderChats();
 openChat(id);
}

function fakeCall(){

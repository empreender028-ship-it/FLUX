<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>FLUX â€¢ Lives</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
 --bg:#050816;
 --card:rgba(255,255,255,.065);
 --line:rgba(255,255,255,.09);
 --text:#fff;
 --muted:#94a3b8;
 --blue:#2563ff;
 --cyan:#00d9ff;
 --green:#18f2a3;
 --red:#ff2f7d;
}

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 -webkit-tap-highlight-color:transparent;
 font-family:Inter,sans-serif;
}

html,body{
 width:100%;
 min-height:100%;
 overflow-x:hidden;
 background:#050816;
 color:white;
}

body{
 padding-bottom:112px;
 background:
 radial-gradient(circle at top left,rgba(37,99,255,.35),transparent 30%),
 radial-gradient(circle at top right,rgba(0,217,255,.20),transparent 30%),
 linear-gradient(180deg,#00194d,#050816 48%,#000);
}

a{
 text-decoration:none;
 color:inherit;
}

button,input{
 font-family:inherit;
}

button{
 border:none;
 cursor:pointer;
}

.app{
 width:100%;
 max-width:760px;
 margin:auto;
 padding:14px;
}

.top{
 position:sticky;
 top:0;
 z-index:50;
 margin:0 -14px 16px;
 padding:12px 14px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 background:rgba(3,7,18,.82);
 backdrop-filter:blur(26px);
 border-bottom:1px solid var(--line);
}

.brand{
 display:flex;
 align-items:center;
 gap:12px;
}

.logo-core{
 width:22px;
 height:22px;
 border:3px solid var(--cyan);
 transform:rotate(45deg);
 border-radius:6px;
 box-shadow:0 0 22px var(--cyan);
}

.logo{
 font-size:24px;
 font-weight:950;
 letter-spacing:5px;
 background:linear-gradient(90deg,#fff,#00d9ff,#2563ff);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.online{
 height:40px;
 padding:0 13px;
 border-radius:999px;
 background:rgba(255,255,255,.06);
 border:1px solid var(--line);
 display:flex;
 align-items:center;
 gap:8px;
 font-size:10px;
 font-weight:950;
}

.online:before{
 content:"";
 width:8px;
 height:8px;
 border-radius:50%;
 background:var(--green);
 box-shadow:0 0 16px var(--green);
}

.hero{
 border-radius:32px;
 padding:22px;
 background:
 linear-gradient(135deg,rgba(37,99,255,.32),rgba(0,217,255,.12)),
 rgba(255,255,255,.04);
 border:1px solid var(--line);
 box-shadow:0 26px 80px rgba(0,0,0,.42);
 margin-bottom:16px;
}

.badge{
 display:inline-flex;
 align-items:center;
 gap:8px;
 height:34px;
 padding:0 12px;
 border-radius:999px;
 background:rgba(255,47,125,.14);
 border:1px solid rgba(255,47,125,.24);
 color:#ffd6e6;
 font-size:10px;
 font-weight:950;
 margin-bottom:14px;
}

.badge:before{
 content:"";
 width:7px;
 height:7px;
 border-radius:50%;
 background:var(--red);
 box-shadow:0 0 14px var(--red);
}

.title{
 font-size:36px;
 font-weight:950;
 line-height:1;
 margin-bottom:10px;
}

.title span{
 background:linear-gradient(90deg,#fff,#00d9ff,#2563ff);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.sub{
 color:#cbd5e1;
 font-size:13px;
 line-height:1.65;
}

.actions{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
 margin-top:18px;
}

.btn{
 height:54px;
 border-radius:20px;
 font-size:13px;
 font-weight:950;
 color:white;
 background:rgba(255,255,255,.08);
 border:1px solid var(--line);
}

.primary{
 background:linear-gradient(90deg,var(--blue),var(--cyan));
 border:none;
 box-shadow:0 18px 44px rgba(0,217,255,.22);
}

.search{
 margin-bottom:16px;
 height:54px;
 border-radius:20px;
 background:rgba(255,255,255,.06);
 border:1px solid var(--line);
 display:flex;
 align-items:center;
 gap:10px;
 padding:0 14px;
}

.search span{
 color:#94a3b8;
 font-weight:950;
}

.search input{
 flex:1;
 border:none;
 outline:none;
 background:transparent;
 color:white;
 font-size:13px;
 font-weight:800;
}

.search input::placeholder{
 color:#94a3b8;
}

.rank{
 display:flex;
 gap:10px;
 overflow:auto;
 padding-bottom:14px;
 margin-bottom:4px;
}

.rank::-webkit-scrollbar{
 display:none;
}

.rank-card{
 min-width:150px;
 padding:14px;
 border-radius:22px;
 background:rgba(255,255,255,.055);
 border:1px solid var(--line);
}

.rank-card b{
 display:block;
 font-size:13px;
 margin-bottom:6px;
}

.rank-card span{
 color:#94a3b8;
 font-size:11px;
 font-weight:800;
}

.grid{
 display:flex;
 flex-direction:column;
 gap:14px;
}

.live-card{
 overflow:hidden;
 border-radius:30px;
 background:rgba(255,255,255,.065);
 border:1px solid var(--line);
 box-shadow:0 22px 70px rgba(0,0,0,.34);
}

.thumb{
 position:relative;
 height:280px;
 background:
 radial-gradient(circle at top,rgba(255,255,255,.18),transparent 28%),
 linear-gradient(135deg,#2563ff,#020617 72%);
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:58px;
 font-weight:950;
 overflow:hidden;
}

.thumb img,
.thumb video{
 width:100%;
 height:100%;
 object-fit:cover;
 display:block;
}

.live-badge{
 position:absolute;
 top:14px;
 left:14px;
 height:36px;
 padding:0 14px;
 border-radius:999px;
 background:rgba(255,47,125,.92);
 display:flex;
 align-items:center;
 gap:8px;
 font-size:10px;
 font-weight:950;
}

.live-badge:before{
 content:"";
 width:7px;
 height:7px;
 border-radius:50%;
 background:white;
 box-shadow:0 0 12px white;
}

.viewers{
 position:absolute;
 top:14px;
 right:14px;
 height:36px;
 padding:0 14px;
 border-radius:999px;
 background:rgba(0,0,0,.45);
 backdrop-filter:blur(18px);
 border:1px solid rgba(255,255,255,.12);
 font-size:10px;
 font-weight:950;
 display:flex;
 align-items:center;
}

.live-overlay{
 position:absolute;
 inset:0;
 background:linear-gradient(180deg,rgba(0,0,0,.02),transparent 45%,rgba(0,0,0,.64));
 pointer-events:none;
}

.info{
 padding:16px;
}

.name{
 font-size:16px;
 font-weight:950;
 margin-bottom:5px;
}

.desc{
 color:var(--muted);
 font-size:13px;
 line-height:1.55;
}

.row{
 display:flex;
 gap:10px;
 margin-top:14px;
}

.open{
 flex:1;
 height:50px;
 border-radius:18px;
 background:linear-gradient(90deg,var(--blue),var(--cyan));
 color:white;
 font-weight:950;
}

.ghost{
 width:56px;
 height:50px;
 border-radius:18px;
 background:rgba(255,255,255,.08);
 color:white;
 font-weight:950;
 border:1px solid var(--line);
}

.empty{
 display:none;
 padding:24px;
 border-radius:24px;
 background:rgba(255,255,255,.055);
 border:1px solid var(--line);
 color:#94a3b8;
 text-align:center;
 line-height:1.6;
 font-size:13px;
}

.bottom{
 position:fixed;
 left:50%;
 transform:translateX(-50%);
 bottom:10px;
 width:calc(100% - 20px);
 max-width:540px;
 z-index:100;
 background:rgba(0,0,0,.78);
 backdrop-filter:blur(30px);
 border:1px solid var(--line);
 padding:8px;
 border-radius:26px;
}

.bottom-wrap{
 display:grid;
 grid-template-columns:repeat(5,1fr);
 gap:8px;
}

.nav{
 height:58px;
 border-radius:18px;
 background:rgba(255,255,255,.055);
 border:1px solid var(--line);
 display:flex;
 flex-direction:column;
 align-items:center;
 justify-content:center;
 gap:5px;
 color:var(--muted);
 font-size:10px;
 font-weight:950;
}

.nav.active{
 background:linear-gradient(180deg,var(--blue),var(--cyan));
 color:white;
 border:none;
}

.icon{
 width:17px;
 height:17px;
 border:2px solid currentColor;
 border-radius:7px;
}

.toast{
 position:fixed;
 left:50%;
 bottom:96px;
 transform:translateX(-50%) translateY(18px);
 z-index:200;
 padding:13px 16px;
 border-radius:18px;
 background:rgba(0,0,0,.76);
 border:1px solid rgba(255,255,255,.14);
 color:white;
 font-size:12px;
 font-weight:950;
 opacity:0;
 transition:.22s;
 pointer-events:none;
}

.toast.show{
 opacity:1;
 transform:translateX(-50%) translateY(0);
}

@media(max-width:430px){
 .title{font-size:31px}
 .thumb{height:250px}
 .actions{grid-template-columns:1fr}
 .logo{font-size:22px}
 .hero{padding:20px}
}

@media(max-width:360px){
 .rank-card{min-width:135px}
 .nav{font-size:9px}
 .thumb{height:225px}
}
</style>
</head>

<body>

<div class="app">

<header class="top">
 <a class="brand" href="/feed">
  <div class="logo-core"></div>
  <div class="logo">FLUX</div>
 </a>

 <div class="online" id="online">0 online</div>
</header>

<section class="hero">
 <div class="badge">AO VIVO AGORA</div>

 <div class="title">Lives <span>Flux</span></div>

 <div class="sub">
  TransmissÃµes ao vivo de marcas, lanÃ§amentos, vendas rÃ¡pidas e eventos dentro da Flux.
 </div>

 <div class="actions">
  <button class="btn primary" onclick="startLive()">Iniciar live</button>
  <button class="btn" onclick="loadLives()">Atualizar</button>
 </div>
</section>

<div class="search">
 <span>ðŸ”Ž</span>
 <input id="searchInput" placeholder="Buscar live, marca ou produto...">
</div>

<section class="rank">
 <div class="rank-card">
  <b>Premium Soles</b>
  <span>128 assistindo</span>
 </div>

 <div class="rank-card">
  <b>Flux Store</b>
  <span>84 assistindo</span>
 </div>

 <div class="rank-card">
  <b>Marketplace</b>
  <span>vendas ao vivo</span>
 </div>
</section>

<main class="grid" id="grid"></main>

<div class="empty" id="empty">
 Nenhuma live encontrada.
</div>

</div>

<nav class="bottom">
 <div class="bottom-wrap">
  <a class="nav" href="/feed"><span class="icon"></span><span>Feed</span></a>
  <a class="nav" href="/fluxo"><span class="icon"></span><span>Fluxo</span></a>
  <a class="nav active" href="/lives"><span class="icon"></span><span>Lives</span></a>
  <a class="nav" href="/painel"><span class="icon"></span><span>Criar</span></a>
  <a class="nav" href="/empresa.html"><span class="icon"></span><span>Perfil</span></a>
 </div>
</nav>

<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>

<script>
const grid = document.getElementById("grid");
const online = document.getElementById("online");
const toast = document.getElementById("toast");
const empty = document.getElementById("empty");
const searchInput = document.getElementById("searchInput");

let lives = [
 {
  id:"live1",
  nome:"Premium Soles",
  desc:"LanÃ§amento ao vivo com peÃ§as limitadas e ofertas rÃ¡pidas.",
  viewers:128,
  initials:"PS"
 },
 {
  id:"live2",
  nome:"Flux Store",
  desc:"Ofertas rÃ¡pidas, novidades da plataforma e vitrine ao vivo.",
  viewers:84,
  initials:"FX"
 },
 {
  id:"live3",
  nome:"Marketplace Flux",
  desc:"Produtos em destaque com atendimento imediato.",
  viewers:62,
  initials:"MK"
 }
];

function safe(text){
 return String(text || "")
 .replace(/&/g,"&amp;")
 .replace(/</g,"&lt;")
 .replace(/>/g,"&gt;")
 .replace(/"/g,"&quot;")
 .replace(/'/g,"&#039;");
}

function showToast(msg){
 toast.textContent = msg;
 toast.classList.add("show");
 clearTimeout(window.toastTimer);
 window.toastTimer = setTimeout(function(){
  toast.classList.remove("show");
 },1500);
}

function renderLives(list){
 list = Array.isArray(list) ? list : lives;

 if(!list.length){
  grid.innerHTML = "";
  empty.style.display = "block";
  return;
 }

 empty.style.display = "none";

 grid.innerHTML = list.map(function(live){
  return `
  <article class="live-card">
   <div class="thumb">
    ${safe(live.initials || "FX")}
    <div class="live-overlay"></div>
    <div class="live-badge">AO VIVO</div>
    <div class="viewers">${safe(live.viewers)} assistindo</div>
   </div>

   <div class="info">
    <div class="name">${safe(live.nome)}</div>
    <div class="desc">${safe(live.desc)}</div>

    <div class="row">
     <button class="open" onclick="openLive('${safe(live.id)}')">Entrar na live</button>
     <button class="ghost" onclick="shareLive('${safe(live.id)}')">â†—</button>
    </div>
   </div>
  </article>
 `;
 }).join("");
}

function openLive(id){
 showToast("Player de live serÃ¡ conectado ao backend");
}

async function shareLive(id){
 const url = location.origin + "/lives#" + id;

 try{
  if(navigator.share){
   await navigator.share({
    title:"Flux Live",
    text:"Veja essa live na Flux",
    url:url
   });
  }else if(navigator.clipboard){
   await navigator.clipboard.writeText(url);
   showToast("Link copiado");
  }else{
   showToast("Compartilhamento indisponÃ­vel");
  }
 }catch(e){}
}

function startLive(){
 const token = localStorage.getItem("token");

 if(!token){
  location.href = "/login";
  return;
 }

 location.href = "/painel";
}

async function loadOnline(){
 try{
  const res = await fetch("/online");
  const data = await res.json();
  online.textContent = (data.onlineUsers || 0) + " online";
 }catch(e){
  online.textContent = "0 online";
 }
}

function loadLives(){
 renderLives(lives);
 showToast("Lives atualizadas");
}

searchInput.addEventListener("input",function(){
 const q = searchInput.value.toLowerCase().trim();

 const filtered = lives.filter(function(live){
  return [
   live.nome,
   live.desc,
   live.initials
  ].join(" ").toLowerCase().includes(q);
 });

 renderLives(filtered);
});

function startSocket(){
 try{
  const socket = io();

  socket.on("online",function(total){
   online.textContent = total + " online";
  });

  socket.on("nova_live",function(live){
   lives.unshift(live);
   renderLives(lives);
   showToast("Nova live no ar");
  });
 }catch(e){}
}

renderLives();
loadOnline();
startSocket();
setInterval(loadOnline,5000);
</script>

</body>
</html>

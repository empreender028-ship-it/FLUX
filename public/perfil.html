<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>Flux • Perfil</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
 --bg:#040816;
 --card:#0b1220;
 --soft:rgba(255,255,255,.055);
 --line:rgba(255,255,255,.07);
 --primary:#00d9ff;
 --secondary:#2563ff;
 --text:#fff;
 --muted:#94a3b8;
 --green:#18f2a3;
 --red:#ff4d6d;
}

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 -webkit-tap-highlight-color:transparent;
}

html,body{
 width:100%;
 min-height:100%;
 overflow-x:hidden;
 font-family:Inter,sans-serif;
 background:
  radial-gradient(circle at top,#00184a 0%,#040816 50%,#000 100%);
 color:white;
}

body{
 padding-bottom:120px;
}

a{
 color:inherit;
 text-decoration:none;
}

button{
 font-family:Inter,sans-serif;
 cursor:pointer;
 touch-action:manipulation;
}

button:active{
 transform:scale(.96);
}

.app{
 width:100%;
 max-width:540px;
 margin:auto;
}

.top{
 position:sticky;
 top:0;
 z-index:100;
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:14px 16px;
 background:rgba(4,8,22,.78);
 backdrop-filter:blur(25px);
 border-bottom:1px solid rgba(255,255,255,.05);
}

.brand{
 display:flex;
 align-items:center;
 gap:12px;
}

.logo{
 width:18px;
 height:18px;
 border:3px solid var(--primary);
 transform:rotate(45deg);
 border-radius:4px;
 box-shadow:0 0 18px rgba(0,217,255,.8);
}

.brand-text{
 font-size:22px;
 font-weight:900;
 letter-spacing:4px;
 background:linear-gradient(90deg,#fff,#00d9ff,#2563ff);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.menu-btn{
 width:46px;
 height:46px;
 border:none;
 border-radius:16px;
 background:rgba(255,255,255,.05);
 border:1px solid rgba(255,255,255,.06);
 color:white;
 font-size:18px;
}

.cover{
 position:relative;
 width:100%;
 height:230px;
 overflow:hidden;
 background:
  radial-gradient(circle at top,rgba(255,255,255,.15),transparent 30%),
  linear-gradient(135deg,#2563ff,#020617 70%);
}

.cover img{
 width:100%;
 height:100%;
 object-fit:cover;
 display:block;
}

.cover::after{
 content:"";
 position:absolute;
 inset:0;
 background:linear-gradient(to top,rgba(4,8,22,1),transparent 52%);
}

.avatar-wrap{
 position:relative;
 margin-top:-62px;
 padding:0 18px;
 z-index:5;
 display:flex;
 align-items:flex-end;
 justify-content:space-between;
 gap:12px;
}

.avatar{
 width:118px;
 height:118px;
 border-radius:34px;
 border:5px solid #040816;
 box-shadow:0 20px 50px rgba(0,0,0,.5);
 background:linear-gradient(135deg,#2563ff,#00d9ff);
 display:flex;
 align-items:center;
 justify-content:center;
 color:white;
 font-size:31px;
 font-weight:900;
 overflow:hidden;
}

.avatar img{
 width:100%;
 height:100%;
 object-fit:cover;
 display:block;
}

.plan-badge{
 height:38px;
 padding:0 14px;
 border-radius:999px;
 background:rgba(0,217,255,.12);
 border:1px solid rgba(0,217,255,.20);
 display:flex;
 align-items:center;
 color:#c9f7ff;
 font-size:11px;
 font-weight:900;
 margin-bottom:8px;
}

.profile{
 padding:14px 18px 0;
}

.name{
 font-size:30px;
 font-weight:900;
}

.user{
 margin-top:4px;
 font-size:14px;
 color:var(--muted);
}

.bio{
 margin-top:14px;
 color:#dbe4ef;
 line-height:1.65;
 font-size:14px;
}

.stats{
 display:flex;
 gap:10px;
 margin-top:22px;
}

.stat{
 flex:1;
 padding:16px 10px;
 border-radius:23px;
 background:rgba(255,255,255,.045);
 border:1px solid rgba(255,255,255,.06);
 text-align:center;
}

.stat-number{
 font-size:21px;
 font-weight:900;
}

.stat-label{
 margin-top:4px;
 font-size:11px;
 color:var(--muted);
 font-weight:800;
}

.actions{
 display:flex;
 gap:10px;
 margin-top:18px;
}

.action{
 flex:1;
 height:54px;
 border:none;
 border-radius:20px;
 font-size:14px;
 font-weight:900;
}

.primary{
 background:linear-gradient(90deg,#2563ff,#00d9ff);
 color:white;
 box-shadow:0 15px 45px rgba(0,217,255,.25);
}

.dark{
 background:rgba(255,255,255,.05);
 border:1px solid rgba(255,255,255,.06);
 color:white;
}

.tabs{
 position:sticky;
 top:75px;
 z-index:90;
 display:flex;
 margin-top:28px;
 background:rgba(4,8,22,.92);
 backdrop-filter:blur(25px);
 border-top:1px solid rgba(255,255,255,.05);
 border-bottom:1px solid rgba(255,255,255,.05);
}

.tab{
 flex:1;
 height:58px;
 border:none;
 background:none;
 color:var(--muted);
 font-size:13px;
 font-weight:900;
}

.tab.active{
 color:white;
 border-bottom:2px solid var(--primary);
}

.grid{
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:2px;
 margin-top:2px;
}

.post{
 position:relative;
 aspect-ratio:1/1.35;
 overflow:hidden;
 background:#000;
 cursor:pointer;
}

.post img,
.post video{
 width:100%;
 height:100%;
 object-fit:cover;
 display:block;
}

.fake-media{
 width:100%;
 height:100%;
 display:flex;
 align-items:center;
 justify-content:center;
 background:linear-gradient(135deg,#2563ff,#00d9ff);
 font-size:24px;
 font-weight:900;
 color:white;
}

.post-info{
 position:absolute;
 inset:0;
 background:linear-gradient(to top,rgba(0,0,0,.82),transparent 58%);
 display:flex;
 align-items:flex-end;
 justify-content:space-between;
 gap:6px;
 padding:9px;
 opacity:0;
 transition:.2s ease;
}

.post:hover .post-info{
 opacity:1;
}

.post-stat{
 font-size:10px;
 font-weight:900;
}

.empty{
 grid-column:1/-1;
 padding:28px 18px;
 color:var(--muted);
 font-size:13px;
 text-align:center;
 line-height:1.6;
 background:rgba(255,255,255,.04);
 border:1px solid rgba(255,255,255,.06);
 border-radius:22px;
 margin:12px;
}

.modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.82);
 z-index:999;
 display:none;
 align-items:flex-end;
 justify-content:center;
}

.modal.active{
 display:flex;
}

.modal-card{
 width:100%;
 max-width:540px;
 background:#0b1220;
 border-radius:32px 32px 0 0;
 overflow:hidden;
 animation:up .25s ease;
}

.modal-media{
 width:100%;
 max-height:68vh;
 background:#000;
 display:flex;
 align-items:center;
 justify-content:center;
 overflow:hidden;
}

.modal-media img,
.modal-media video{
 width:100%;
 max-height:68vh;
 object-fit:cover;
 display:block;
}

.modal-content{
 padding:20px;
}

.modal-top{
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.modal-name{
 font-size:18px;
 font-weight:900;
}

.close{
 width:44px;
 height:44px;
 border:none;
 border-radius:16px;
 background:rgba(255,255,255,.06);
 color:white;
 font-size:20px;
}

.modal-desc{
 margin-top:14px;
 color:#dbe4ef;
 line-height:1.7;
 font-size:14px;
}

.modal-actions{
 display:flex;
 gap:10px;
 margin-top:20px;
}

.modal-btn{
 flex:1;
 height:54px;
 border:none;
 border-radius:18px;
 background:rgba(255,255,255,.06);
 border:1px solid rgba(255,255,255,.06);
 color:white;
 font-weight:900;
}

.delete{
 background:rgba(255,0,0,.12);
 color:#ffbcbc;
}

.menu-panel{
 position:fixed;
 top:0;
 right:-100%;
 width:88%;
 max-width:370px;
 height:100vh;
 z-index:1000;
 background:#0b1220;
 transition:.32s ease;
 padding:22px;
 overflow:auto;
 border-left:1px solid rgba(255,255,255,.06);
}

.menu-panel.active{
 right:0;
}

.menu-title{
 font-size:26px;
 font-weight:900;
}

.menu-sub{
 margin-top:6px;
 color:var(--muted);
 font-size:13px;
}

.menu-group{
 margin-top:28px;
}

.menu-label{
 margin-bottom:12px;
 color:var(--muted);
 font-size:12px;
 font-weight:900;
 letter-spacing:1px;
}

.menu-item{
 width:100%;
 height:58px;
 display:flex;
 align-items:center;
 padding:0 18px;
 margin-bottom:10px;
 border:none;
 border-radius:20px;
 background:rgba(255,255,255,.045);
 border:1px solid rgba(255,255,255,.06);
 color:white;
 font-size:14px;
 font-weight:800;
}

.menu-item.danger{
 color:#ffbcbc;
 background:rgba(255,0,0,.10);
}

.backdrop{
 position:fixed;
 inset:0;
 z-index:999;
 background:rgba(0,0,0,.46);
 display:none;
}

.backdrop.active{
 display:block;
}

.bottom{
 position:fixed;
 left:0;
 bottom:0;
 width:100%;
 z-index:120;
 background:rgba(0,0,0,.78);
 backdrop-filter:blur(32px);
 border-top:1px solid rgba(255,255,255,.07);
 padding:8px 8px calc(8px + env(safe-area-inset-bottom));
}

.bottom-wrap{
 max-width:540px;
 margin:auto;
 display:grid;
 grid-template-columns:repeat(5,1fr);
 gap:8px;
}

.nav{
 height:62px;
 border-radius:22px;
 background:rgba(255,255,255,.055);
 border:1px solid rgba(255,255,255,.08);
 display:flex;
 flex-direction:column;
 align-items:center;
 justify-content:center;
 gap:5px;
 color:var(--muted);
 font-size:10px;
 font-weight:900;
}

.nav.active{
 background:linear-gradient(180deg,#2563ff,#00d9ff);
 color:white;
 border:none;
}

.icon{
 width:18px;
 height:18px;
 border-radius:7px;
 border:2px solid currentColor;
}

.toast{
 position:fixed;
 left:50%;
 bottom:104px;
 transform:translateX(-50%) translateY(18px);
 z-index:1300;
 max-width:92%;
 padding:13px 16px;
 border-radius:18px;
 background:rgba(0,0,0,.78);
 border:1px solid rgba(255,255,255,.14);
 backdrop-filter:blur(22px);
 color:#fff;
 font-size:12px;
 font-weight:900;
 opacity:0;
 pointer-events:none;
 transition:.22s ease;
}

.toast.show{
 opacity:1;
 transform:translateX(-50%) translateY(0);
}

@keyframes up{
 from{transform:translateY(100%)}
 to{transform:translateY(0)}
}

@media(max-width:768px){
 .cover{height:205px}
 .avatar{width:105px;height:105px;border-radius:30px}
 .name{font-size:26px}
 .post-info{opacity:1}
}

@media(max-width:380px){
 .stats{gap:7px}
 .stat{padding:13px 6px}
 .stat-number{font-size:18px}
 .action{font-size:12px}
}
</style>
</head>

<body>

<div class="app">

 <header class="top">
  <a class="brand" href="/feed">
   <div class="logo"></div>
   <div class="brand-text">FLUX</div>
  </a>

  <button class="menu-btn" onclick="abrirMenu()">☰</button>
 </header>

 <div class="cover" id="cover"></div>

 <div class="avatar-wrap">
  <div class="avatar" id="avatar">FX</div>
  <div class="plan-badge" id="planBadge">Plano Free</div>
 </div>

 <section class="profile">
  <div class="name" id="profileName">Empresa Flux</div>
  <div class="user" id="profileUser">@empresa_flux</div>
  <div class="bio" id="profileBio">Perfil oficial da empresa dentro da Flux.</div>

  <div class="stats">
   <div class="stat">
    <div class="stat-number" id="postsCount">0</div>
    <div class="stat-label">Posts</div>
   </div>

   <div class="stat">
    <div class="stat-number" id="viewsCount">0</div>
    <div class="stat-label">Views</div>
   </div>

   <div class="stat">
    <div class="stat-number" id="likesCount">0</div>
    <div class="stat-label">Curtidas</div>
   </div>
  </div>

  <div class="actions">
   <button class="action primary" onclick="abrirWhats()">WhatsApp</button>
   <button class="action dark" onclick="abrirSite()">Site</button>
  </div>
 </section>

 <section class="tabs">
  <button class="tab active" data-filter="all">Publicações</button>
  <button class="tab" data-filter="fluxo">Fluxo</button>
  <button class="tab" data-filter="feed">Feed</button>
 </section>

 <main class="grid" id="grid"></main>

</div>

<div class="modal" id="modal">
 <div class="modal-card">
  <div class="modal-media" id="modalMedia"></div>

  <div class="modal-content">
   <div class="modal-top">
    <div class="modal-name" id="modalName">Empresa Flux</div>
    <button class="close" onclick="fecharPost()">×</button>
   </div>

   <div class="modal-desc" id="modalDesc"></div>

   <div class="modal-actions">
    <button class="modal-btn" onclick="likeModal()">Curtir</button>
    <button class="modal-btn" onclick="copyModal()">Copiar</button>
    <button class="modal-btn delete" id="deleteBtn" onclick="deleteModal()">Apagar</button>
   </div>
  </div>
 </div>
</div>

<div class="backdrop" id="backdrop" onclick="fecharMenu()"></div>

<aside class="menu-panel" id="menuPanel">
 <div class="menu-title">Painel</div>
 <div class="menu-sub">Ferramentas premium da Flux</div>

 <div id="donoArea">
  <div class="menu-group">
   <div class="menu-label">CONTA</div>
   <button class="menu-item" onclick="location.href='/editar-perfil'">Editar perfil</button>
   <button class="menu-item" onclick="toastMsg('Upload de avatar será conectado no backend')">Trocar avatar</button>
   <button class="menu-item" onclick="toastMsg('Upload de capa será conectado no backend')">Trocar capa</button>
  </div>

  <div class="menu-group">
   <div class="menu-label">PUBLICAÇÕES</div>
   <button class="menu-item" onclick="location.href='/painel'">Criar publicação</button>
   <button class="menu-item" onclick="location.href='/posts'">Gerenciar posts</button>
   <button class="menu-item" onclick="location.href='/ranking'">Analytics</button>
  </div>

  <div class="menu-group">
   <div class="menu-label">FLUXO</div>
   <button class="menu-item" onclick="location.href='/planos'">Impulsionar posts</button>
   <button class="menu-item" onclick="location.href='/trends'">Ver tendências</button>
   <button class="menu-item" onclick="location.href='/marketplace'">Marketplace</button>
  </div>
 </div>

 <div class="menu-group">
  <div class="menu-label">GERAL</div>
  <button class="menu-item" onclick="shareProfile()">Compartilhar perfil</button>
  <button class="menu-item" onclick="copyProfile()">Copiar link</button>
  <button class="menu-item" onclick="location.href='/suporte'">Suporte</button>
 </div>

 <div class="menu-group">
  <button class="menu-item" onclick="fecharMenu()">Fechar menu</button>
  <button class="menu-item danger" onclick="logout()">Sair</button>
 </div>
</aside>

<nav class="bottom">
 <div class="bottom-wrap">
  <a class="nav" href="/feed"><span class="icon"></span><span>Feed</span></a>
  <a class="nav" href="/fluxo"><span class="icon"></span><span>Fluxo</span></a>
  <a class="nav" href="/painel"><span class="icon"></span><span>Criar</span></a>
  <a class="nav" href="/posts"><span class="icon"></span><span>Posts</span></a>
  <a class="nav active" href="/perfil"><span class="icon"></span><span>Perfil</span></a>
 </div>
</nav>

<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>

<script>
const grid = document.getElementById("grid");
const toast = document.getElementById("toast");

const token = localStorage.getItem("token") || "";
const plano = localStorage.getItem("plano_flux") || "free";

let posts = [];
let currentFilter = "all";
let currentPost = null;

const profile = {
 nome: localStorage.getItem("empresa_nome") || "Empresa Flux",
 user: localStorage.getItem("empresa_user") || "@empresa_flux",
 bio: localStorage.getItem("empresa_bio") || "Perfil oficial da empresa dentro da Flux.",
 whatsapp: localStorage.getItem("empresa_whatsapp") || "",
 site: localStorage.getItem("empresa_site") || ""
};

if(!token){
 document.getElementById("deleteBtn").style.display = "none";
 document.getElementById("donoArea").style.display = "none";
}

function safe(text){
 return String(text || "")
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;")
  .replace(/"/g,"&quot;");
}

function compact(num){
 num = Number(num || 0);
 if(num >= 1000000) return (num / 1000000).toFixed(num % 1000000 ? 1 : 0) + "M";
 if(num >= 1000) return (num / 1000).toFixed(num % 1000 ? 1 : 0) + "k";
 return String(num);
}

function initials(name){
 return String(name || "FX").split(" ").map(p=>p[0]).join("").slice(0,2).toUpperCase();
}

function mediaSrc(media){
 if(!media) return "";
 return media.startsWith("http") ? media : "/uploads/" + media;
}

function setProfile(){
 document.getElementById("profileName").textContent = profile.nome;
 document.getElementById("profileUser").textContent = profile.user;
 document.getElementById("profileBio").textContent = profile.bio;
 document.getElementById("avatar").textContent = initials(profile.nome);
 document.getElementById("planBadge").textContent = "Plano " + plano.toUpperCase();

 document.getElementById("cover").innerHTML = `
  <img src="https://images.unsplash.com/photo-1523398002811-999ca8dec234?q=80&w=1200&auto=format&fit=crop" alt="Capa">
 `;
}

function postMedia(post){
 const src = mediaSrc(post.media || "");

 if(!src){
  return `<div class="fake-media">${safe(initials(post.empresaNome))}</div>`;
 }

 const video = /\.(mp4|webm|mov|quicktime)$/i.test(src);

 if(video){
  return `<video src="${safe(src)}" muted playsinline preload="metadata"></video>`;
 }

 return `<img src="${safe(src)}" alt="${safe(post.empresaNome)}" loading="lazy">`;
}

function updateStats(data){
 document.getElementById("postsCount").textContent = compact(data.length);
 document.getElementById("viewsCount").textContent = compact(data.reduce((s,p)=>s + Number(p.views || 0),0));
 document.getElementById("likesCount").textContent = compact(data.reduce((s,p)=>s + Number(p.likes || 0),0));
}

function render(){
 const filtered = posts.filter(p=>currentFilter === "all" || p.tipo === currentFilter);

 updateStats(filtered);

 if(!filtered.length){
  grid.innerHTML = `
   <div class="empty">
    Nenhuma publicação ainda. Crie seu primeiro post pelo painel.
   </div>
  `;
  return;
 }

 grid.innerHTML = filtered.map((post,index)=>`
  <article class="post" onclick="abrirPost('${safe(post._id)}')">
   ${postMedia(post)}
   <div class="post-info">
    <div class="post-stat">${compact(post.likes || 0)} curtidas</div>
    <div class="post-stat">${compact(post.views || 0)} views</div>
   </div>
  </article>
 `).join("");
}

async function loadPosts(){
 try{
  const [feedRes, fluxoRes] = await Promise.all([
   fetch("/api/feed"),
   fetch("/api/fluxo")
  ]);

  const feed = feedRes.ok ? await feedRes.json() : [];
  const fluxo = fluxoRes.ok ? await fluxoRes.json() : [];

  posts = [
   ...feed.map(p=>({...p,tipo:"feed"})),
   ...fluxo.map(p=>({...p,tipo:"fluxo"}))
  ].sort((a,b)=>new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
 }catch{
  posts = [];
 }

 render();
}

function abrirPost(id){
 currentPost = posts.find(p=>String(p._id) === String(id));

 if(!currentPost) return;

 document.getElementById("modalName").textContent = currentPost.empresaNome || "Empresa Flux";
 document.getElementById("modalDesc").textContent = currentPost.descricao || "";
 document.getElementById("modalMedia").innerHTML = postMedia(currentPost);
 document.getElementById("modal").classList.add("active");
}

function fecharPost(){
 document.getElementById("modal").classList.remove("active");
 currentPost = null;
}

async function likeModal(){
 if(!currentPost) return;

 await fetch("/api/like/" + currentPost._id,{ method:"POST" }).catch(()=>{});
 toastMsg("Curtida enviada");
}

async function copyModal(){
 if(!currentPost) return;

 const target = currentPost.tipo === "fluxo" ? "/fluxo" : "/feed";
 const url = location.origin + target + "#" + currentPost._id;

 try{
  await navigator.clipboard.writeText(url);
  toastMsg("Link copiado");
 }catch{
  toastMsg("Não foi possível copiar");
 }
}

function deleteModal(){
 toastMsg("Para apagar de verdade, conecte DELETE /api/posts/:id no servidor");
}

function abrirMenu(){
 document.getElementById("menuPanel").classList.add("active");
 document.getElementById("backdrop").classList.add("active");
}

function fecharMenu(){
 document.getElementById("menuPanel").classList.remove("active");
 document.getElementById("backdrop").classList.remove("active");
}

function toastMsg(msg){
 toast.textContent = msg;
 toast.classList.add("show");
 clearTimeout(window.toastTimer);
 window.toastTimer = setTimeout(()=>toast.classList.remove("show"),1600);
}

function abrirWhats(){
 if(profile.whatsapp){
  window.open(profile.whatsapp,"_blank");
 }else{
  toastMsg("WhatsApp ainda não configurado");
 }
}

function abrirSite(){
 if(profile.site){
  window.open(profile.site,"_blank");
 }else{
  toastMsg("Site ainda não configurado");
 }
}

async function shareProfile(){
 const url = location.origin + "/perfil";

 try{
  if(navigator.share){
   await navigator.share({title:"Flux",text:"Veja esse perfil na Flux",url});
  }else{
   await navigator.clipboard.writeText(url);
   toastMsg("Link copiado");
  }
 }catch{}
}

async function copyProfile(){
 try{
  await navigator.clipboard.writeText(location.origin + "/perfil");
  toastMsg("Link do perfil copiado");
 }catch{}
}

function logout(){
 localStorage.removeItem("token");
 location.href = "/login";
}

document.querySelectorAll(".tab").forEach(tab=>{
 tab.addEventListener("click",()=>{
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  tab.classList.add("active");
  currentFilter = tab.dataset.filter;
  render();
 });
});

function startSocket(){
 try{
  const socket = io();

  socket.on("novo_post",post=>{
   posts.unshift(post);
   render();
   toastMsg("Nova publicação no perfil");
  });

  socket.on("post_like",data=>{
   const post = posts.find(p=>String(p._id) === String(data.postId));
   if(post){
    post.likes = data.likes;
    render();
   }
  });
 }catch{}
}

setProfile();
loadPosts();
startSocket();
</script>
